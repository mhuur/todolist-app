<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌊 Ma Todolist</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#0E1B2E;min-height:100vh;padding:0;color:#E2E8F0;font-size:12px;display:flex}
.sidebar{width:56px;min-height:100vh;background:#0F1D32;border-right:1px solid #1E3050;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;position:fixed;left:0;top:0;z-index:50}
.sb-btn{width:42px;height:38px;border:none;border-radius:8px;background:transparent;color:#4B6480;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-family:inherit;font-size:7px;font-weight:700;transition:all .12s;padding:2px}
.sb-btn:hover{background:#1A2D47;color:#94B4D0}
.sb-btn.on{background:#112944;color:#5CB8F0}
.sb-btn svg{flex-shrink:0}
.sb-spacer{flex:1}
.avatar-wrap{position:relative;cursor:pointer;margin-top:4px}
.avatar-wrap img{width:32px;height:32px;border-radius:50%;border:2px solid #2A3A52;transition:border-color .15s}
.avatar-wrap:hover img{border-color:#38BDF8}
.avatar-menu{display:none;position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:#1C2A3F;border:1px solid #374863;border-radius:8px;padding:8px 12px;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:100}
.avatar-wrap:hover .avatar-menu{display:block}
.avatar-menu .am-name{font-size:10px;color:#94A3B8;margin-bottom:4px}
.avatar-menu .am-sync{font-size:8px;margin-bottom:6px}
.avatar-menu button{border:none;background:transparent;color:#F87171;cursor:pointer;font-size:10px;font-family:inherit;font-weight:600;padding:2px 0}
.avatar-menu button:hover{text-decoration:underline}
.main{margin-left:56px;flex:1;padding:14px 12px 30px;max-width:720px}
.main.main-wide{max-width:none;padding-right:20px}
.bar{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.bar-l{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.bar-r{display:flex;gap:3px;flex-wrap:wrap}
.bp{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:6px;border:none;background:linear-gradient(135deg,#0284C7,#0EA5E9);color:#fff;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;box-shadow:0 1px 4px rgba(14,165,233,.2);transition:all .15s}
.bp:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.bp:hover{box-shadow:0 2px 8px rgba(14,165,233,.3)}
.bs{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid #2A3A52;background:#162032;color:#64748B;transition:all .15s}
.bs:hover{border-color:#38BDF8;color:#38BDF8}
.bs.on{border-color:#38BDF8;background:rgba(56,189,248,.1);color:#38BDF8}
/* Project */
.pc{background:#162032;border-radius:10px;border:1px solid #2A3A52;margin-bottom:6px;overflow:hidden}
.pc.dragging{opacity:.35}
.pc.dot{box-shadow:0 -2px 0 0 #38BDF8}.pc.dob{box-shadow:0 2px 0 0 #38BDF8}
.ph{padding:6px 10px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.dh{cursor:grab;color:#4B5563;display:flex;align-items:center;flex-shrink:0;opacity:0;transition:opacity .12s}.ar:hover .dh{opacity:.4}.dh:hover{opacity:.85}
.ph input{flex:1;border:none;background:transparent;font-size:12px;font-weight:700;font-family:inherit;color:#E2E8F0;outline:none;min-width:0}
.ph-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ph-date{border-radius:4px;padding:0 4px;font-size:10px;font-family:inherit;font-weight:600;outline:none;cursor:pointer;background:#1E293B;border:1px solid #2A3A52;color:#94A3B8}
.dt{font-weight:700;font-size:9px}
.ph-btn{cursor:pointer;font-size:13px;color:#64748B;transition:all .12s;display:flex;align-items:center;padding:1px 2px;border-radius:3px}
.ph-btn:hover{color:#38BDF8}
.ph-del{color:#64748B;font-size:11px}.ph-del:hover{color:#F87171;background:rgba(248,113,113,.1)}
.tg-add-btn{cursor:pointer;font-size:12px;color:#38BDF8;opacity:.6;transition:all .12s;padding:0 2px}
.tg-add-btn:hover{opacity:1}
.al{padding:0 10px 6px;display:flex;flex-direction:column;gap:3px}

/* Task group */
.tg{margin-bottom:4px;background:rgba(56,189,248,.03);border-radius:6px;border:1px solid rgba(56,189,248,.08);padding:3px}
.tg-hd{display:flex;align-items:center;gap:5px;padding:2px 4px;cursor:pointer;user-select:none}
.tg-hd .tg-title{flex:1;border:none;background:transparent;font-size:11px;font-weight:700;color:#38BDF8;font-family:inherit;outline:none}
.tg-hd .tg-title::placeholder{color:#2A5A7A}
.tg-actions{padding:2px 0 0 16px;display:flex;flex-direction:column;gap:2px}
.tg.drop-target{background:rgba(92,184,240,.08);border-color:rgba(92,184,240,.2)}
.tg-del{border:none;background:transparent;color:#64748B;cursor:pointer;font-size:10px;padding:1px 3px;border-radius:3px;opacity:.6;transition:all .12s}
.tg-del:hover{color:#F87171;opacity:1}
.tg.dragging{opacity:.3}
.tg.tg-dot{box-shadow:0 -2px 0 0 #38BDF8}.tg.tg-dob{box-shadow:0 2px 0 0 #38BDF8}

/* Action row */
.ar{display:flex;flex-direction:column;padding:6px 10px;border-radius:6px;margin-bottom:3px;position:relative;border:1px solid transparent;transition:all .2s ease;animation:fadeSlideIn .25s ease}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ar:hover{background:rgba(92,184,240,.06)}
.ar.ec{background:rgba(148,163,184,.025);border-color:transparent}
.ar.ec .as{color:#E2E8F0}
.ar.rap{background:rgba(34,197,94,.07)}.ar.rap .as{color:#86EFAC}
.ar.urg{background:rgba(248,113,113,.08)}.ar.urg .as{color:#FCA5A5}
.ar.wt .as{font-style:italic;color:#64B5D0}.ar.wt .ac{color:#2A6A80}.ar.wt .a-tk{color:#2A6A80}.ar.wt .a-sub{color:#1E5060}.ar.wt .adi,.ar.wt .ati,.ar.wt .atl,.ar.wt .adtg,.ar.wt .asd,.ar.wt .asdtg{color:#2A6A80}.ar.wt .sdwrap svg{color:#2A6A80;opacity:.5}
.ar.dn .as{text-decoration:line-through;color:#475569}.ar.dn .ac{color:#334155}.ar.dn .a-tk{color:#334155}.ar.dn .a-sub{color:#293548}.ar.dn .adi,.ar.dn .ati,.ar.dn .atl,.ar.dn .adtg{color:#334155}.ar.dn .bi{opacity:.35}
.ar.dragging{opacity:.15}
/* Task drop zones in Par tâche view */
.tk-zone{border-radius:6px;padding:2px 0;margin-bottom:2px;transition:background .15s,box-shadow .15s}
.tk-zone.drop-hi{background:rgba(92,184,240,.06);box-shadow:inset 0 0 0 1px rgba(92,184,240,.2)}
.tk-hd{padding:4px 8px;display:flex;align-items:center;gap:4px}
/* During drag, disable pointer events on task header children so drop works */
body.dragging-active .tk-hd *{pointer-events:none}
/* Flash feedback */
.ar.flash-done{animation:flashDone .4s ease}
.ar.flash-wt{animation:flashWt .4s ease}
@keyframes flashDone{0%{background:rgba(34,197,94,.2)}100%{background:transparent}}
@keyframes flashWt{0%{background:rgba(100,181,208,.2)}100%{background:transparent}}
.ar.dot{box-shadow:0 -2px 0 0 #5CB8F0}.ar.dob{box-shadow:0 2px 0 0 #5CB8F0}
.at{display:flex;align-items:center;gap:5px;width:100%}
.ac{cursor:pointer;color:#5CB8F0;display:flex;align-items:center;transition:transform .2s ease;flex-shrink:0}
.ar.ao .ac{transform:rotate(90deg)}
.a-info{flex:1;min-width:0;display:flex;flex-wrap:wrap;align-items:baseline;gap:0 5px}
.as{border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:600;color:#CBD5E1;outline:none;min-width:60px;padding:0;flex:1}
.as::placeholder{color:#4B5563;font-weight:400}
.a-tk{font-size:9px;color:#64748B;font-weight:600;white-space:nowrap;flex-shrink:0}
.a-tkpick{cursor:pointer;border-radius:3px;padding:0 3px;transition:all .12s}
.a-tkpick:hover{color:#38BDF8;background:rgba(56,189,248,.1)}
.a-tksel{font-size:9px;font-family:inherit;background:#152236;color:#94A3B8;border:1px solid #2A3A52;border-radius:4px;padding:1px 4px;outline:none;cursor:pointer;max-width:160px;flex-shrink:0}
.tk-new{font-size:9px;font-family:inherit;background:#152236;color:#E2E8F0;border:1px solid #38BDF8;border-radius:4px;padding:1px 5px;outline:none;max-width:160px;flex-shrink:0}
.a-sub{font-size:7.5px;color:#4B6480;font-weight:500;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center}
.a-wait{width:100%;display:flex;align-items:center;gap:3px;margin-top:1px}.a-wait svg{color:#F59E0B;opacity:.85;flex-shrink:0}.a-wait input{flex:1;min-width:0;border:none;background:transparent;font-family:inherit;font-size:8.5px;color:#FBBF24;font-style:italic;outline:none}
.a-tri{width:100%;margin-top:2px;display:flex;align-items:center;gap:4px}
.tri-new{font-size:9px;font-family:inherit;background:#152236;color:#38BDF8;border:1px solid rgba(56,189,248,.5);border-radius:4px;padding:2px 6px;outline:none;max-width:160px}.tri-new::placeholder{color:#475569}
.tri-x{cursor:pointer;color:#64748B;font-size:12px;line-height:1}.tri-x:hover{color:#F87171}
/* Filters */
.flt-wrap{position:relative;display:inline-flex}
.flt-btn{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid #1E3050;background:transparent;color:#5CB8F0;transition:all .12s;display:flex;align-items:center;gap:3px}
.flt-btn:hover{border-color:#5CB8F0;background:rgba(92,184,240,.05)}
.flt-btn svg{width:8px;height:8px}
.flt-dd{display:none;position:absolute;top:100%;right:0;margin-top:3px;background:#152236;border:1px solid #1E3050;border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.5);z-index:90;min-width:110px;overflow:hidden}
.flt-wrap.open .flt-dd{display:block}
.flt-opt{padding:5px 10px;font-size:10px;color:#94A3B8;cursor:pointer;transition:background .08s;display:flex;align-items:center;gap:5px}
.flt-opt:hover{background:#1A2D47;color:#E2E8F0}
.flt-opt.on{color:#5CB8F0;font-weight:700}
.flt-opt.on::before{content:"✓";font-size:8px}
/* Sort buttons */
.sort-row{display:flex;gap:3px;margin-bottom:6px;align-items:center}
.sort-lbl{font-size:8px;color:#334155;margin-right:2px}
.sort-btn{padding:2px 8px;border-radius:10px;font-size:8px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid #1E3050;background:transparent;color:#4B6480;transition:all .12s}
.sort-btn:hover{border-color:#5CB8F0;color:#94A3B8}
.sort-btn.on{background:rgba(92,184,240,.08);border-color:#5CB8F0;color:#5CB8F0}
/* Inline add row */
.add-row{display:flex;gap:4px;align-items:center;padding:6px 8px;margin-bottom:6px;position:sticky;top:0;z-index:30;background:rgba(14,27,46,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid #1E3050;border-radius:0 0 6px 6px}
.add-row input[type="text"],.add-row>input:not([type]){flex:1;border:1px solid #1E3050;border-radius:5px;padding:4px 8px;font-size:11px;font-family:inherit;background:#0F1D32;color:#E2E8F0;outline:none}
.add-row input:focus{border-color:#5CB8F0}
.add-row input::placeholder{color:#334155}
.add-row button{border:none;border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;background:#22C55E;color:#fff;flex-shrink:0}
.add-row button:hover{background:#16A34A}
/* ── Quick-add card (style "todo" Google Tasks, néon) ── */
.qa-bar{padding:4px 8px 6px;margin-bottom:4px;position:sticky;top:0;z-index:30;background:rgba(14,27,46,.92);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);display:flex;align-items:center;gap:8px}
.qa-stack-hd{display:flex;align-items:center;gap:8px}
.qa-stack-hd .qa-trigger-open{flex:1}
.qa-trigger{flex:1;display:inline-flex;align-items:center;gap:7px;justify-content:flex-start;padding:5px 4px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;color:#5CB8F0;background:transparent;border:none;transition:color .12s}
.qa-trigger:hover{color:#7DD3FC}
.qa-trigger b{font-size:16px;font-weight:400;line-height:0}
.qa-card{flex:1;display:flex;flex-direction:column;gap:3px;padding:6px 8px;border-radius:7px;background:#0F1D32;border:1px solid #1E3050;box-shadow:inset 0 0 0 1px rgba(56,189,248,.14),0 0 10px rgba(56,189,248,.08)}
.qa-arow{display:flex;align-items:center;gap:7px}
.qa-cbx{width:18px;height:18px;border-radius:50%;border:1.6px solid #3A4D68;flex-shrink:0;background:transparent}
.qa-body{margin-left:25px;display:flex;flex-direction:column;gap:5px;margin-top:5px}
.qa-card input[type="text"],.qa-card textarea{border:none;background:transparent;color:#E2E8F0;font-family:inherit;outline:none;padding:1px 2px}
.qa-card .qa-as{flex:1;min-width:0;font-size:13px;font-weight:700}
.qa-card .qa-details{width:100%;font-size:11px;resize:vertical;min-height:18px;line-height:1.4;color:#94A3B8}
.qa-card input::placeholder,.qa-card textarea::placeholder{color:#475569}
.qa-det-toggle{align-self:flex-start;font-size:10px;color:#475569;cursor:pointer;padding:0 2px;transition:color .12s}
.qa-det-toggle:hover{color:#7DD3FC}
.qa-pickers{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.qa-card .ac-wrap{width:122px}
.qa-inline{margin:3px 0 5px}
.qa-stack{flex:1;display:flex;flex-direction:column;gap:3px}
.qa-trigger-open{display:inline-flex;align-items:center;gap:7px;padding:3px 4px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;color:#7DD3FC}
.qa-trigger-open b{font-size:16px;font-weight:400;line-height:0}
.qa-chips{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:1px}
.qa-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 11px;border-radius:12px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;color:#94A3B8;background:transparent;border:1px solid #2A3A52;transition:all .12s}
.qa-chip:hover{border-color:#38BDF8;color:#E2E8F0}
.qa-chip.on{background:rgba(56,189,248,.15);border-color:#38BDF8;color:#7DD3FC}
.qa-chip-cal{position:relative}
.qa-chip-cal input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;padding:0}
.qa-chip-cal svg{width:11px;height:11px}
.pa-add{display:inline-flex;align-items:center;gap:7px;margin:3px 2px;padding:4px;font-size:11px;font-weight:600;color:#5CB8F0;cursor:pointer;border:none;background:transparent;transition:color .12s}
.pa-add:hover{color:#7DD3FC}
.pa-add b{font-size:15px;font-weight:400;line-height:0}
/* Autocomplete */
.ac-wrap{position:relative;flex-shrink:0;width:140px}
.ac-wrap input{width:100%;border:1px solid #1E3050;border-radius:5px;padding:4px 8px;font-size:10px;font-family:inherit;font-weight:600;background:#152236;color:#94A3B8;outline:none}
.ac-wrap input:focus{border-color:#5CB8F0;color:#E2E8F0}
.ac-wrap input::placeholder{color:#334155}
.ac-list{display:none;position:absolute;top:100%;left:0;right:auto;width:max-content;min-width:100%;max-width:min(520px,92vw);background:#152236;border:1px solid #1E3050;border-top:none;border-radius:0 0 5px 5px;max-height:160px;overflow-y:auto;z-index:80;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.ac-wrap.open .ac-list{display:block}
.ac-item{padding:4px 8px;font-size:10px;color:#94A3B8;cursor:pointer;transition:background .08s}
.ac-item:hover{background:#1A2D47;color:#E2E8F0}
.ac-item.create{color:#5CB8F0;font-style:italic}
/* Done table view */
.done-tbl{width:100%;border-collapse:collapse}
.done-tbl td{padding:3px 6px;font-size:11px;border-bottom:1px solid #152236;vertical-align:middle}
.done-tbl .dt-proj{color:#4B6480;font-weight:700;font-size:10px;width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.done-tbl .dt-title{color:#CBD5E1;font-weight:600}
.done-tbl .dt-date{color:#64748B;font-size:9px;text-align:right;width:80px;white-space:nowrap}
.done-tbl .dt-hrs{color:#5CB8F0;font-size:9px;text-align:right;width:45px;font-weight:600}
.done-tbl .dt-act{width:44px;text-align:right;white-space:nowrap}
.ari{display:flex;align-items:center;gap:2px;flex-shrink:0}.ari .bi{visibility:hidden}.ar:hover .ari .bi,.ar:focus-within .ari .bi,.ar.ao .ari .bi,.ari .bi.active{visibility:visible}
.aw-inline{font-size:9px;color:#64B5D0;font-style:italic;white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis;flex-shrink:1}
.aw-inline input{border:none;background:transparent;font-family:inherit;font-size:9px;color:#64B5D0;font-style:italic;outline:none;width:80px}
.adi{border-radius:3px;padding:0 3px;font-size:8px;font-family:inherit;font-weight:600;outline:none;cursor:pointer;border:1px solid #1E3050;color:#64748B;background:#152236}
.adtg{font-weight:700;font-size:7px;flex-shrink:0}
.sdwrap{display:inline-flex;align-items:center;gap:2px;flex-shrink:0}
.sdwrap svg{color:#38BDF8;opacity:.7;flex-shrink:0}
.asd{border-radius:3px;padding:0 3px;font-size:8px;font-family:inherit;font-weight:600;outline:none;cursor:pointer;border:1px solid rgba(56,189,248,.4);color:#38BDF8;background:transparent;box-shadow:inset 0 0 0 1px rgba(56,189,248,.18)}
.asdtg{font-weight:700;font-size:7px;flex-shrink:0}
.dchip{position:relative;display:inline-flex;align-items:center;flex-shrink:0;width:54px;height:19px;border-radius:5px;cursor:pointer;color:#3A4D68}
.dchip-input{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:none;padding:0;margin:0;cursor:pointer}
.dchip-face{display:inline-flex;align-items:center;justify-content:center;gap:3px;pointer-events:none;width:100%;height:100%;padding:0 4px;box-sizing:border-box}
.dchip-face svg{flex-shrink:0}
.dchip-lbl{font-size:8px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dchip:hover{background:rgba(148,163,184,.10)}.dchip.set{background:rgba(148,163,184,.05)}
.plan-hd{display:flex;align-items:center;gap:6px;padding:5px 8px;margin:8px 0 3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:rgba(148,163,184,.05);border-radius:0 4px 4px 0}
.plan-ct{font-size:9px;font-weight:600;color:#94A3B8;background:rgba(100,116,139,.18);padding:0 6px;border-radius:8px;flex-shrink:0}
.plan-bucket{border-radius:0 6px 6px 0;transition:background .1s}
.plan-bucket.drop-hi{background:rgba(56,189,248,.07);box-shadow:inset 0 0 0 1px rgba(56,189,248,.35)}
.plan-empty{font-size:9px;color:#3A4D68;font-style:italic;padding:3px 10px 6px}
.subtab-bar{display:flex;gap:2px;border-bottom:1px solid #1E3050;margin-bottom:8px}
.subtab{padding:6px 12px;font-size:12px;font-weight:600;color:#64748B;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.subtab:hover{color:#94A3B8}.subtab.on{color:#38BDF8;border-bottom-color:#38BDF8}
.tri-sel{font-size:9px;font-family:inherit;background:#152236;color:#F59E0B;border:1px solid rgba(245,158,11,.4);border-radius:4px;padding:1px 4px;outline:none;cursor:pointer;max-width:130px;flex-shrink:0}
.ga-search-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:0 8px;background:#152236;border:1px solid #1E3050;border-radius:6px}
.ga-search-row svg{color:#475569;flex-shrink:0}
.ga-search-row:focus-within{border-color:#38BDF8}.ga-search-row:focus-within svg{color:#38BDF8}
.ga-search{flex:1;background:transparent;border:none;padding:6px 0;font-size:11px;font-family:inherit;color:#CBD5E1;outline:none}
.ga-search::placeholder{color:#475569}
.ga-search-clear{cursor:pointer;color:#64748B;font-size:13px;line-height:1;padding:2px 4px;flex-shrink:0}.ga-search-clear:hover{color:#F87171}
.ati{width:36px;border:1px solid transparent;border-radius:3px;padding:1px 2px;font-size:8px;font-family:inherit;font-weight:600;background:transparent;color:#5CB8F0;outline:none;text-align:right}.ati:hover,.ati:focus{border-color:#1E3050;background:#152236}
/* Pas de spinner up/down sur les inputs number (charte) */
input[type="number"]{-moz-appearance:textfield;appearance:textfield}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.atl{font-size:7px;color:#4B6480}
.bi{border:none;border-radius:4px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .12s}
.bdn{background:#22C55E;color:#fff}.bdn:hover{background:#16A34A}
.bwt{background:transparent;color:#4B6480;border:1px solid #1E3050}.bwt:hover{color:#64B5D0}.bwt.active{color:#64B5D0;border-color:#64B5D0;background:rgba(100,181,208,.1)}
.brap,.burg{background:transparent;color:#4B6480;border:1px solid #1E3050}.brap:hover{color:#22C55E}.brap.active{color:#22C55E;border-color:#22C55E;background:rgba(34,197,94,.12);box-shadow:0 0 8px rgba(34,197,94,.35)}.burg:hover{color:#F87171}.burg.active{color:#F87171;border-color:#F87171;background:rgba(248,113,113,.14);box-shadow:0 0 8px rgba(248,113,113,.4)}
.bud{background:#334155;color:#94A3B8}
.btr{background:transparent;color:#334155;opacity:.4}.btr:hover{background:rgba(248,113,113,.12);color:#F87171;opacity:1}
.cbx{width:19px;height:19px;border-radius:50%;border:1.6px solid #3A4D68;background:transparent;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;padding:0;color:transparent;transition:all .15s}
.cbx:hover{border-color:#22C55E;color:#22C55E;box-shadow:0 0 9px rgba(34,197,94,.45)}
.cbx svg{width:11px;height:11px}
.ar.flash-done .cbx{background:#22C55E;border-color:#22C55E;color:#fff;box-shadow:0 0 14px rgba(34,197,94,.7)}

/* Detail */
.adl{display:none;padding:4px 0 0 20px;animation:slideDown .2s ease}
.ar.ao .adl{display:block}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:500px}}
.ab{display:flex;flex-direction:column;gap:2px;position:relative}
.fb{display:none;align-items:center;gap:2px;flex-wrap:wrap;padding:2px 0;position:relative}
.ab.ed .fb{display:flex}
.fbtn{border:none;border-radius:3px;width:22px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;color:#64748B;font-size:11px;font-family:inherit;padding:0;transition:all .12s}
.fbtn:hover{background:rgba(56,189,248,.12);color:#38BDF8}
.fsp{width:1px;height:14px;background:#2A3A52;margin:0 1px}
.ffs{border:1px solid #2A3A52;border-radius:3px;padding:0 3px;font-size:9px;font-family:inherit;color:#94A3B8;background:#1E293B;outline:none;cursor:pointer;height:20px;max-width:80px}
.hp{position:absolute;top:24px;left:0;background:#1C2A3F;border:1px solid #374863;border-radius:6px;padding:5px;box-shadow:0 4px 12px rgba(0,0,0,.4);display:none;z-index:100;width:170px}
.hp.show{display:block}
.hl{font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;margin-bottom:2px;margin-top:3px}.hl:first-child{margin-top:0}
.hr{display:flex;gap:2px;flex-wrap:wrap}
.hs{width:17px;height:17px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:all .12s}
.hs:hover{transform:scale(1.15);border-color:#38BDF8}
.hs.none{background:#334155;position:relative}.hs.none::after{content:"✕";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:#64748B}
.atx{border:none;background:transparent;font-family:inherit;font-size:11px;line-height:1.4;outline:none;min-height:16px;color:#94A3B8;word-break:break-word}
.atx:empty::before{content:attr(data-placeholder);color:#4B5563}
.atx img{max-width:100%;max-height:180px;border-radius:5px;margin:3px 0;display:block}
.ar.dn .atx{color:#4B5563;text-decoration:line-through}
.aw{font-size:10px;color:#64B5D0;font-style:italic;padding:2px 0;display:flex;align-items:center;gap:3px}
.baa{display:flex;align-items:center;justify-content:center;gap:4px;border:1px dashed #2A3A52;border-radius:6px;padding:3px 0;background:transparent;color:#4B5563;cursor:pointer;font-family:inherit;font-size:10px;font-weight:600;transition:all .15s}
.baa:hover{border-color:#38BDF8;color:#38BDF8}
.es{text-align:center;padding:24px 14px;color:#4B6480;border:1.5px dashed #1E3050;border-radius:8px;font-size:11px;line-height:1.6}
.done-toggle{display:flex;align-items:center;gap:4px;padding:3px 6px;cursor:pointer;font-size:10px;font-weight:600;color:#4B6480;user-select:none;border-radius:4px;transition:background .12s}
.done-toggle:hover{background:#1A2D47}

/* Groups */
.ugt{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:8px 0 2px;display:flex;align-items:center;gap:5px}
.ugt .ln{flex:1;height:1px}
.ug{min-height:4px;padding-bottom:3px}
.ug.dz{background:rgba(56,189,248,.05);border-radius:6px}
.pgl{display:flex;align-items:center;gap:6px;padding:5px 8px;margin:10px 0 3px;background:rgba(148,163,184,.05);border-radius:0 4px 4px 0;border-left:3px solid transparent;cursor:pointer}
.pgl:hover{background:rgba(148,163,184,.09)}
.pgl-chev{flex-shrink:0;display:inline-flex;align-items:center;color:#64748B;transform:rotate(-90deg);transition:transform .15s}
.pgl.open .pgl-chev{transform:rotate(0)}
.pgl-chev svg{width:8px;height:5px}
.pgl-grip{cursor:grab;color:#475569;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;padding:6px 7px;margin:-6px 1px -6px -4px;opacity:0;transition:opacity .12s,color .12s}
.pgl:hover .pgl-grip{opacity:.5}.pgl-grip:hover{opacity:1;color:#7DD3FC}
.pgl.dot{box-shadow:0 -2px 0 0 #5CB8F0}.pgl.dob{box-shadow:0 2px 0 0 #5CB8F0}
.pgl-del{border:none;background:transparent;color:#475569;cursor:pointer;padding:1px 4px;border-radius:3px;display:inline-flex;align-items:center;flex-shrink:0;transition:color .12s}
.pgl-del:hover{color:#F87171}
.pgl-del svg{width:11px;height:11px}
.pgl-confirm{font-size:9px;font-weight:700;color:#F87171;flex-shrink:0;text-shadow:0 0 6px rgba(248,113,113,.5)}
.pgl-del-ok,.pgl-del-no{border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:700;line-height:1;padding:0 4px;border-radius:3px;flex-shrink:0;font-family:inherit}
.pgl-del-ok{color:#F87171}.pgl-del-ok:hover{color:#FCA5A5;text-shadow:0 0 8px #F87171}
.pgl-del-no{color:#64748B}.pgl-del-no:hover{color:#94A3B8}
.pgl-name,.pgl-lbl{flex:1;min-width:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-family:inherit;color:#38BDF8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pgl-name{border:1px solid transparent;background:transparent;outline:none;padding:1px 4px;border-radius:4px}
.pgl-name:hover,.pgl-name:focus{border-color:#1E3050;background:#152236}.pgl-name::placeholder{color:#334155;text-transform:none}
.dn-date{border:1px solid #2A3A52;background:#152236;border-radius:4px;padding:1px 5px;font-size:10px;font-family:inherit;font-weight:700;color:#94A3B8;outline:none;cursor:pointer;flex-shrink:0}.dn-date:hover,.dn-date:focus{border-color:#38BDF8;color:#E2E8F0}
.cv{transition:transform .15s;display:inline-flex}.cv.op{transform:rotate(90deg)}

/* Sub-views */
.vt{display:flex;gap:2px;background:#0F1A2E;border-radius:6px;padding:2px;margin-bottom:6px}
.vtb{flex:1;padding:3px 0;border:none;border-radius:4px;font-family:inherit;font-size:9px;font-weight:700;cursor:pointer;background:transparent;color:#4B5563;transition:all .12s}
.vtb.on{background:#1E293B;color:#38BDF8}

/* Done date */
.ddh{font-size:10px;font-weight:700;color:#64748B;padding:8px 0 3px;text-transform:uppercase;letter-spacing:.3px}

/* Trash */
.tri{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#162032;border:1px solid #2A3A52;border-radius:6px;margin-bottom:4px}
.tri .tii{flex:1;min-width:0;font-size:10px;color:#64748B}.tri b{color:#E2E8F0}
.brs{border:none;border-radius:4px;padding:3px 8px;font-size:9px;font-weight:700;font-family:inherit;cursor:pointer;background:#10B981;color:#fff}
.bpu{border:none;border-radius:4px;padding:3px 8px;font-size:9px;font-weight:700;font-family:inherit;cursor:pointer;background:#EF4444;color:#fff;margin-left:3px}

/* Time table */
.tt{width:100%;border-collapse:collapse;font-size:10px}
.tt th{text-align:left;padding:4px 6px;color:#64748B;font-weight:700;border-bottom:1px solid #2A3A52;font-size:9px;text-transform:uppercase}
.tt td{padding:4px 6px;border-bottom:1px solid #1E293B;color:#94A3B8}
.tt .pn{color:#E2E8F0;font-weight:600}
.tt .ttr td{border-top:2px solid #2A3A52;color:#38BDF8;font-weight:700}
.wn{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.wn button{border:1px solid #2A3A52;background:#162032;color:#64748B;border-radius:4px;padding:2px 8px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:600}
.wn button:hover{border-color:#38BDF8;color:#38BDF8}
.wn span{font-size:11px;color:#94A3B8;font-weight:600}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0B1120}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}

/* Login */
.login-screen{position:fixed;inset:0;background:#0B1120;display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:16px}
.login-box{background:#162032;border:1px solid #2A3A52;border-radius:16px;padding:32px 28px;text-align:center;max-width:320px;width:90%}
.login-box h1{font-size:24px;font-weight:800;color:#fff;margin-bottom:4px}
.login-box p{color:#64748B;font-size:12px;margin-bottom:20px}
.btn-google{display:inline-flex;align-items:center;gap:10px;padding:10px 24px;border-radius:8px;border:1px solid #2A3A52;background:#1E293B;color:#E2E8F0;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-google:hover{border-color:#38BDF8;background:#243347}
.btn-google img{width:20px;height:20px}
.login-loading{color:#64748B;font-size:11px;margin-top:8px}
.login-err{color:#F87171;font-size:11px;margin-top:8px}
.sync-indicator{font-size:8px;color:#34D399;margin-left:4px}
.sync-indicator.saving{color:#FBBF24}
.sync-indicator.error{color:#F87171}

/* ── Mobile responsive ── */
@media(max-width:600px){
  body{flex-direction:column}
  .sidebar{width:100%;min-height:auto;height:48px;flex-direction:row;position:fixed;bottom:0;top:auto;left:0;border-right:none;border-top:1px solid #1E293B;padding:0 4px;gap:0;justify-content:space-around;z-index:100}
  .sb-btn{width:auto;height:auto;padding:4px 8px;gap:0;flex:1}
  .sb-btn span{font-size:7px}
  .sb-spacer{display:none}
  .avatar-wrap{order:10}
  .avatar-wrap img{width:26px;height:26px}
  .avatar-menu{bottom:auto;top:-80px;right:0;left:auto;transform:none}
  .main{margin-left:0;padding:8px 8px 60px;max-width:100%}
  .ph{padding:8px;gap:5px;flex-wrap:wrap}
  .ph input{font-size:13px;min-width:80px}
  .ph-right{gap:6px}
  .ph-date{font-size:11px;padding:2px 6px}
  .ph-btn{font-size:16px;padding:4px}
  .dt{font-size:10px}
  .at{flex-wrap:wrap;gap:4px}
  .as{font-size:12px}
  .bi{width:26px;height:26px;font-size:13px}
  .adi,.asd{font-size:10px;padding:2px 6px}
  .ati{width:44px;font-size:10px;padding:2px 4px}
  .adl{padding:6px 0 0 12px}
  .atx{font-size:13px;line-height:1.5}
  .fbtn{width:28px;height:26px;font-size:13px}
  .ffs{height:26px;font-size:10px}
  .tg-hd{padding:4px 6px}
  .tg-title{font-size:12px}
  .tg-add-btn{font-size:16px;padding:2px 6px}
  .tg-del{font-size:13px;padding:4px}
  .bp{padding:7px 14px;font-size:12px}
  .bs{padding:5px 10px;font-size:11px}
  .baa{padding:6px 0;font-size:11px}
  .tt{font-size:11px}
  .tt th,.tt td{padding:5px 4px}
  .wn button{padding:4px 10px;font-size:11px}
  .wn span{font-size:12px}
  .login-box{padding:24px 20px}
  .btn-google{padding:12px 20px;font-size:14px}
  .tri{padding:8px}.tii{font-size:11px}
  .brs,.bpu{padding:5px 10px;font-size:10px}
  .aw{font-size:11px}.aw input{font-size:11px}
  .ugt{font-size:11px;padding:10px 0 4px}
  .pgl{font-size:10px}
  .ddh{font-size:11px}
  .vtb{padding:5px 0;font-size:10px}
}

/* CRM */
.crm-count{font-size:9px;color:#4B6480;padding:4px 10px;font-weight:600;letter-spacing:.3px}
.crm-create{padding:8px 12px;color:#5CB8F0;font-size:11px;cursor:pointer;border-radius:6px;transition:background .12s;font-style:italic}
.crm-create:hover{background:rgba(92,184,240,.06)}
.crm-card{border-radius:8px;margin-bottom:3px;border:1px solid #1E3050;transition:all .2s ease;animation:fadeSlideIn .2s ease}
.crm-card.open{background:#131F33;border-color:rgba(92,184,240,.12)}
.crm-card-hd{display:flex;align-items:center;gap:6px;padding:8px 12px;cursor:pointer;border-radius:8px;transition:background .12s}
.crm-card-hd:hover{background:rgba(92,184,240,.04)}
.crm-card-name{font-size:12px;font-weight:700;color:#E2E8F0;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crm-card-name-input{font-family:inherit;font-size:12px;font-weight:700;color:#E2E8F0;flex:1;min-width:0;background:transparent;border:1px solid transparent;outline:none;padding:2px 6px;border-radius:4px;transition:all .12s}
.crm-card-hd:hover .crm-card-name-input{border-color:rgba(92,184,240,.15)}
.crm-card-name-input:focus{background:rgba(11,17,32,.6);border-color:rgba(92,184,240,.35);cursor:text}
.crm-card-badge{font-size:8px;color:#5CB8F0;background:rgba(92,184,240,.1);padding:2px 7px;border-radius:10px;font-weight:700;flex-shrink:0}
.crm-card-del{border:none;background:transparent;color:#293548;cursor:pointer;font-size:10px;flex-shrink:0;padding:2px 4px;border-radius:4px;transition:all .12s;opacity:0}
.crm-card-hd:hover .crm-card-del{opacity:1}
.crm-card-del:hover{color:#F87171;background:rgba(248,113,113,.08)}
.crm-card-body{padding:4px 12px 10px 28px;border-top:1px solid #1A2840}
.crm-card-add{margin-bottom:6px}
.crm-item{display:flex;align-items:center;gap:5px;padding:4px 8px;font-size:10px;color:#94A3B8;border-radius:5px;transition:all .1s}
.crm-item:hover{background:rgba(92,184,240,.04);color:#CBD5E1}
.crm-item span{flex:1;min-width:0}
.crm-item-del{border:none;background:transparent;color:#334155;cursor:pointer;font-size:9px;opacity:0;transition:all .12s;padding:1px 3px;border-radius:3px}
.crm-item:hover .crm-item-del{opacity:1}
.crm-item-del:hover{color:#F87171;background:rgba(248,113,113,.08)}
.crm-pref{border:none;background:transparent;color:#293548;cursor:pointer;font-size:11px;flex-shrink:0;padding:0 2px;transition:all .15s;line-height:1}
.crm-pref:hover{color:#F59E0B}
.crm-pref.on{color:#F59E0B;text-shadow:0 0 4px rgba(245,158,11,.3)}
.crm-item.pref span{font-weight:700;color:#E2E8F0}
/* CRM contacts (Google sync) */
.crm-topbar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.crm-topbar .vt{flex:1;margin-bottom:0}
.crm-resync{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid #22C55E;color:#22C55E;font-family:inherit;font-size:9px;font-weight:700;padding:5px 10px;border-radius:6px;cursor:pointer;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(34,197,94,.32),0 0 12px rgba(34,197,94,.22);transition:all .14s}
.crm-resync:hover{background:rgba(34,197,94,.08);color:#86EFAC;box-shadow:inset 0 0 12px rgba(34,197,94,.22),0 0 18px rgba(34,197,94,.5),0 0 32px rgba(34,197,94,.22)}
.crm-resync svg{width:11px;height:11px}
.crm-syncmsg{font-size:9px;color:#4B6480;padding:0 10px 5px;font-weight:600}
.crm-syncmsg.err{color:#F87171}
.crm-card-badge.cts{color:#86EFAC;background:rgba(34,197,94,.1);margin-left:4px}
.crm-contacts-hd{font-size:8px;color:#4B6480;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:7px 8px 2px;margin-top:4px;border-top:1px solid #16233a}
.crm-contact{display:flex;align-items:center;gap:8px;padding:4px 8px;font-size:10px;border-radius:5px;flex-wrap:wrap}
.crm-contact:hover{background:rgba(34,197,94,.04)}
.crm-contact-name{color:#CBD5E1;font-weight:700;flex-shrink:0}
.crm-contact-link{display:inline-flex;align-items:center;gap:3px;color:#5CB8F0;text-decoration:none;font-size:9px;opacity:.85}
.crm-contact-link:hover{color:#7DD3FC;opacity:1;text-decoration:underline}
.crm-contact-link svg{width:9px;height:9px;opacity:.7;flex-shrink:0}
/* CRM contacts: à rattacher */
.gc-pending{background:#0F1A2E;border:1px solid rgba(245,158,11,.3);border-radius:8px;margin-bottom:8px;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(245,158,11,.12),0 0 12px rgba(245,158,11,.1)}
.gc-pending-hd{display:flex;align-items:center;gap:7px;padding:8px 10px;cursor:pointer;user-select:none}
.gc-pending-hd .cv{display:inline-flex;color:#F59E0B;transition:transform .15s}
.gc-pending-hd .cv.op{transform:rotate(90deg)}
.gc-pending-title{font-size:11px;font-weight:800;color:#FCD34D;text-shadow:0 0 8px rgba(245,158,11,.4)}
.gc-pending-sub{margin-left:auto;font-size:8px;font-weight:700;color:#92785A;background:rgba(245,158,11,.1);padding:2px 7px;border-radius:10px}
.gc-pending-body{padding:2px 8px 8px;border-top:1px solid rgba(245,158,11,.15)}
.gc-pend-row{padding:7px 4px;border-bottom:1px solid #16233a}
.gc-pend-row:last-child{border-bottom:none}
.gc-pend-top{display:flex;align-items:center;gap:8px}
.gc-pend-org{font-size:11px;font-weight:700;color:#E2E8F0}
.gc-pend-cnt{font-size:8px;font-weight:700;color:#86EFAC;background:rgba(34,197,94,.1);padding:1px 6px;border-radius:9px}
.gc-pend-names{font-size:9px;color:#5B7088;margin:2px 0 5px}
.gc-pend-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.gc-act{font-family:inherit;font-size:9px;font-weight:700;padding:4px 9px;border-radius:6px;cursor:pointer;background:transparent;transition:all .14s}
.gc-act.create{border:1px solid #22C55E;color:#22C55E;box-shadow:inset 0 0 0 1px rgba(34,197,94,.3),0 0 10px rgba(34,197,94,.18)}
.gc-act.create:hover{background:rgba(34,197,94,.08);color:#86EFAC}
.gc-act.ignore{border:1px solid #3A4658;color:#64748B}
.gc-act.ignore:hover{border-color:#F87171;color:#FCA5A5}
.gc-link{position:relative;flex:1;min-width:150px;width:auto}
.gc-link input{width:100%;background:#0B1422;border:1px solid #25324A;border-radius:6px;color:#CBD5E1;font-family:inherit;font-size:9px;padding:5px 8px;box-sizing:border-box}
.gc-link input:focus{outline:none;border-color:#38BDF8}
/* Feedback */
.fb-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.fb-title{color:#5CB8F0;font-size:13px;font-weight:800}
.fb-subtitle{color:#4B6480;font-size:10px;margin-bottom:8px}
.fb-card{background:#162032;border:1px solid #2A3A52;border-radius:8px;padding:8px 10px;margin-bottom:6px;animation:fadeSlideIn .2s ease;transition:opacity .15s}
.fb-card.fb-done{opacity:.55;background:#111B2C}
.fb-card.fb-done .fb-text{text-decoration:line-through;color:#64748B}
.fb-card.fb-done .fb-step-text{text-decoration:line-through;color:#475569}
.fb-hd{display:flex;align-items:center;gap:6px}
.fb-check{border:1.5px solid #2A3A52;background:transparent;color:transparent;width:18px;height:18px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;padding:0}
.fb-check:hover{border-color:#22C55E}
.fb-check.on{background:#22C55E;border-color:#22C55E;color:#fff}
.fb-text{flex:1;border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:600;color:#E2E8F0;outline:none;padding:3px 6px;border-radius:4px;min-width:0}
.fb-text:hover{background:rgba(92,184,240,.04)}
.fb-text:focus{background:rgba(92,184,240,.08)}
.fb-del{border:none;background:transparent;color:#334155;cursor:pointer;flex-shrink:0;padding:3px 5px;border-radius:4px;transition:all .12s;display:flex;align-items:center}
.fb-del:hover{color:#F87171;background:rgba(248,113,113,.08)}
.fb-step{display:flex;align-items:center;gap:5px;padding:2px 0 2px 24px;margin-top:2px}
.fb-step-bul{color:#475569;font-size:11px;flex-shrink:0;font-weight:700}
.fb-step-text{flex:1;border:none;background:transparent;font-family:inherit;font-size:11px;color:#CBD5E1;outline:none;padding:2px 5px;border-radius:3px;min-width:0}
.fb-step-text:hover{background:rgba(92,184,240,.04)}
.fb-step-text:focus{background:rgba(92,184,240,.08)}
.fb-step-del{border:none;background:transparent;color:#334155;cursor:pointer;font-size:10px;flex-shrink:0;padding:1px 4px;border-radius:3px;opacity:0;transition:all .12s}
.fb-step:hover .fb-step-del{opacity:1}
.fb-step-del:hover{color:#F87171;background:rgba(248,113,113,.08)}
.fb-add-step{margin:4px 0 0 24px;border:none;background:transparent;color:#5CB8F0;font-family:inherit;font-size:10px;cursor:pointer;padding:3px 8px;border-radius:4px;font-weight:600;transition:all .12s}
.fb-add-step:hover{background:rgba(92,184,240,.08)}
.fb-copy-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:6px;border:1px solid #2A3A52;background:#162032;color:#94A3B8;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.fb-copy-btn:hover{border-color:#5CB8F0;color:#5CB8F0;background:rgba(92,184,240,.05)}
.fb-copy-btn.copied{border-color:#22C55E;color:#22C55E;background:rgba(34,197,94,.08)}
/* Bibliothèque de prix — modal */
.pl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto;backdrop-filter:blur(2px)}
.pl-modal{background:#0F1D32;border:1px solid #2A3A52;border-radius:10px;padding:18px 20px 16px;width:100%;max-width:580px;color:#E2E8F0;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.pl-modal h3{font-size:13px;font-weight:800;margin-bottom:14px;color:#E2E8F0;display:flex;align-items:center;gap:8px;letter-spacing:.2px}
.pl-modal h3 .pl-ref{margin-left:auto;font-size:10px;font-weight:700;color:#5CB8F0;background:rgba(92,184,240,.1);padding:2px 8px;border-radius:10px;letter-spacing:.5px}
.pl-modal h3 .pl-close{margin-left:8px;cursor:pointer;color:#475569;font-size:18px;line-height:1;border:none;background:transparent;padding:0 2px;font-family:inherit}
.pl-modal h3 .pl-close:hover{color:#F87171}
.pl-row{margin-bottom:11px}
.pl-row label.pl-lbl{display:block;font-size:9px;font-weight:700;color:#94A3B8;margin-bottom:3px;letter-spacing:.4px;text-transform:uppercase}
.pl-input,.pl-select{width:100%;background:#162032;border:1px solid #2A3A52;border-radius:6px;padding:6px 10px;color:#E2E8F0;font-family:inherit;font-size:12px;outline:none;transition:border-color .12s,box-shadow .12s}
.pl-input:focus,.pl-select:focus{border-color:#38BDF8;box-shadow:0 0 0 1px rgba(56,189,248,.25),0 0 10px rgba(56,189,248,.15)}
.pl-input::placeholder{color:#475569}
.pl-input[type="number"]{-moz-appearance:textfield;appearance:textfield}
.pl-input[type="number"]::-webkit-inner-spin-button,.pl-input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.pl-row-flex{display:flex;gap:6px;align-items:stretch}
.pl-row-flex .pl-select,.pl-row-flex .pl-input{flex:1;min-width:0}
.pl-mini-btn{padding:0 10px;font-size:11px;font-weight:700;border-radius:6px;border:1px dashed rgba(92,184,240,.4);background:transparent;color:#5CB8F0;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s;flex-shrink:0}
.pl-mini-btn:hover{background:rgba(92,184,240,.08);border-color:#5CB8F0;border-style:solid}
.pl-mini-btn.cancel{color:#64748B;border-color:#2A3A52}
.pl-mini-btn.cancel:hover{color:#F87171;border-color:#F87171;background:rgba(248,113,113,.05)}
.pl-fields{padding:12px 14px;background:rgba(56,189,248,.04);border:1px solid rgba(56,189,248,.12);border-radius:8px;margin-top:10px}
.pl-fields-hd{font-size:9px;font-weight:700;color:#5CB8F0;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.pl-fields-empty{color:#64748B;font-size:11px;text-align:center;padding:6px 0;font-style:italic}
.pl-field-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.pl-field-row label{font-size:11px;color:#CBD5E1;min-width:140px;flex-shrink:0;font-weight:600}
.pl-field-row .pl-input,.pl-field-row .pl-select{flex:1}
.pl-field-row .pl-unit{color:#64748B;font-size:11px;flex-shrink:0;font-weight:600;min-width:auto;padding-left:2px}
/* Champ nombre : unité en suffixe intégré + alignement à droite (style ERP) */
.pl-num-wrap{position:relative;flex:1;min-width:0}
.pl-num-wrap .pl-num{width:100%;text-align:right;font-variant-numeric:tabular-nums}
.pl-num-wrap.has-unit .pl-num{padding-right:40px}
.pl-num-unit{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:#64748B;pointer-events:none;letter-spacing:.2px}
.pl-field-del{cursor:pointer;color:#334155;font-size:12px;flex-shrink:0;padding:2px 5px;border-radius:3px;border:none;background:transparent;transition:all .12s;font-family:inherit;line-height:1}
.pl-field-del:hover{color:#F87171;background:rgba(248,113,113,.08)}
/* Champ éditable : poignée de drag + intitulé renommable inline */
.pl-field-grip{cursor:grab;color:#334155;display:inline-flex;align-items:center;flex-shrink:0;padding:0 1px;transition:color .12s}
.pl-field-row:hover .pl-field-grip,.pl-sch-field:hover .pl-field-grip{color:#5CB8F0}
.pl-field-grip:active{cursor:grabbing}
.pl-field-label{min-width:138px;flex-shrink:0;border:1px solid transparent;background:transparent;font-family:inherit;font-size:11px;font-weight:600;color:#CBD5E1;outline:none;padding:3px 5px;border-radius:5px;transition:border-color .12s,background .12s,box-shadow .12s}
.pl-field-label:hover{border-color:#243650}
.pl-field-label:focus{border-color:#38BDF8;background:#162032;box-shadow:0 0 0 1px rgba(56,189,248,.2)}
.pl-fdrag-over{box-shadow:inset 0 2px 0 #38BDF8}
.pl-fields-hint{font-size:8px;font-weight:500;color:#475569;text-transform:none;letter-spacing:0;margin-left:8px;font-style:italic}
.pl-fielddraft{padding:10px;background:rgba(0,0,0,.25);border:1px dashed #2A3A52;border-radius:6px;margin-top:8px}
.pl-fielddraft-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.pl-fielddraft-row:last-child{margin-bottom:0;justify-content:flex-end}
.pl-fielddraft .pl-input,.pl-fielddraft .pl-select{flex:1;min-width:120px;width:auto}
.pl-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid #1E3050}
/* Import d'un devis */
.pl-import-help{font-size:11px;color:#94A3B8;margin-bottom:10px;line-height:1.5}
.pl-import-text{width:100%;min-height:230px;background:#0E1A2E;border:1px solid #2A3A52;border-radius:8px;padding:10px 12px;color:#E2E8F0;font-family:'Courier New',monospace;font-size:11px;line-height:1.5;outline:none;resize:vertical;transition:border-color .12s,box-shadow .12s;white-space:pre}
.pl-import-text:focus{border-color:#38BDF8;box-shadow:0 0 0 1px rgba(56,189,248,.25),0 0 10px rgba(56,189,248,.15)}
.pl-import-text::placeholder{color:#334155}
.pl-import-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.pl-import-stepn{flex-shrink:0;width:18px;height:18px;border-radius:50%;background:rgba(56,189,248,.15);border:1px solid rgba(56,189,248,.4);color:#5CB8F0;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px}
.pl-import-steptxt{font-size:11px;color:#94A3B8;line-height:1.5}
.pl-import-stepbtns{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.pl-claude-link{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;font-size:11px;font-weight:700;border-radius:6px;border:1px solid rgba(92,184,240,.4);background:rgba(92,184,240,.08);color:#5CB8F0;cursor:pointer;text-decoration:none;transition:all .12s}
.pl-claude-link:hover{background:rgba(92,184,240,.16);border-color:#5CB8F0;color:#7DD3FC}
/* Reclassement (2 panneaux) */
.pl-reclass-modal{max-width:760px}
.pl-rcl-cols{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.pl-rcl-col{flex:1;min-width:240px}
.pl-rcl-coltitle{font-size:9px;font-weight:700;color:#94A3B8;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.pl-rcl-cat{font-size:12px;font-weight:700;color:#7DD3FC;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.3);border-radius:6px;padding:5px 10px;margin-bottom:8px}
.pl-rcl-help{font-size:10px;color:#64748B;margin-bottom:6px}
.pl-rcl-fields{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.pl-rcl-field{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid #1E3050;border-radius:6px;cursor:pointer;background:rgba(0,0,0,.15);transition:border-color .12s,background .12s}
.pl-rcl-field.on{border-color:rgba(56,189,248,.4);background:rgba(56,189,248,.06)}
.pl-rcl-field input{accent-color:#38BDF8;cursor:pointer;flex-shrink:0}
.pl-rcl-fname{font-size:11px;font-weight:600;color:#CBD5E1;flex-shrink:0}
.pl-rcl-fval{font-size:11px;color:#64748B;flex:1;min-width:0;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-rcl-tag{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:2px 5px;border-radius:3px;flex-shrink:0}
.pl-rcl-tag.map{color:#22C55E;background:rgba(34,197,94,.12)}
.pl-rcl-tag.add{color:#F59E0B;background:rgba(245,158,11,.12)}
.pl-rcl-arrow{align-self:center;color:#475569;font-size:18px;flex-shrink:0}
.pl-rcl-existing{font-size:10px;color:#94A3B8;padding:3px 8px;border-bottom:1px solid #18253C}
/* Lignes d'équipement (devis multi-lignes) */
.pl-lines{margin-top:6px}
.pl-lines-hd{font-size:9px;font-weight:700;color:#94A3B8;letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px}
.pl-line-card{border:1px solid #2A3A52;border-radius:8px;padding:10px 12px;margin-bottom:9px;background:rgba(255,255,255,.015);transition:border-color .12s,box-shadow .12s}
.pl-line-card:focus-within{border-color:rgba(56,189,248,.45);box-shadow:0 0 0 1px rgba(56,189,248,.12)}
.pl-line-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pl-line-num{font-size:9px;font-weight:800;color:#5CB8F0;letter-spacing:.6px;text-transform:uppercase}
.pl-line-del{cursor:pointer;color:#475569;font-size:16px;line-height:1;border:none;background:transparent;padding:0 4px;border-radius:4px;font-family:inherit;transition:all .12s}
.pl-line-del:hover{color:#F87171;background:rgba(248,113,113,.08)}
.pl-add-line{width:100%;padding:7px 10px;font-size:11px;font-weight:700;border-radius:7px;border:1px dashed rgba(92,184,240,.4);background:transparent;color:#5CB8F0;cursor:pointer;font-family:inherit;transition:all .12s}
.pl-add-line:hover{background:rgba(92,184,240,.08);border-color:#5CB8F0;border-style:solid}
.pl-btn{padding:7px 16px;font-size:12px;font-weight:700;font-family:inherit;border-radius:6px;cursor:pointer;transition:all .15s;border:none}
.pl-btn-secondary{background:transparent;color:#64748B;border:1px solid #2A3A52}
.pl-btn-secondary:hover{color:#E2E8F0;border-color:#475569}
.pl-btn-primary{background:linear-gradient(135deg,#0284C7,#0EA5E9);color:#fff;box-shadow:0 1px 4px rgba(14,165,233,.2)}
.pl-btn-primary:hover{box-shadow:0 2px 10px rgba(14,165,233,.4)}
.pl-btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;background:#1E293B;color:#475569}
.pl-err{color:#F87171;font-size:11px;margin-top:8px;font-weight:600}
.pl-search-list{margin-top:4px;background:#162032;border:1px solid #2A3A52;border-radius:6px;max-height:180px;overflow-y:auto}
.pl-search-list-empty{padding:10px;font-size:11px;color:#475569;text-align:center;font-style:italic}
.pl-search-item{padding:7px 10px;font-size:11px;color:#CBD5E1;cursor:pointer;border-top:1px solid #1E3050;transition:background .1s}
.pl-search-item:first-child{border-top:none}
.pl-search-item:hover{background:rgba(56,189,248,.08);color:#E2E8F0}
.pl-search-item.create{color:#5CB8F0;font-style:italic}
.pl-search-item.create:hover{background:rgba(92,184,240,.1);color:#7DD3FC}
.pl-pill-row{display:flex;align-items:center;gap:8px}
.pl-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.3);color:#7DD3FC;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;flex:1;min-width:0}
.pl-pill span{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-pill .pl-pill-clear{cursor:pointer;color:#64748B;font-size:15px;line-height:1;border:none;background:transparent;padding:0 2px;font-family:inherit;transition:color .12s;flex-shrink:0}
.pl-pill .pl-pill-clear:hover{color:#F87171}
/* Bibliothèque de prix — table */
.pl-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.pl-toolbar .pl-tb-grp{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pl-tb-label{font-size:9px;color:#64748B;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.pl-tb-select{background:#162032;border:1px solid #2A3A52;border-radius:6px;padding:5px 10px;color:#E2E8F0;font-family:inherit;font-size:11px;outline:none;cursor:pointer;transition:border-color .12s;min-width:130px}
.pl-tb-select:focus{border-color:#38BDF8;box-shadow:0 0 0 1px rgba(56,189,248,.25),0 0 10px rgba(56,189,248,.15)}
.pl-tb-reset{padding:5px 10px;font-size:10px;font-weight:600;border-radius:5px;border:1px solid #2A3A52;background:transparent;color:#64748B;cursor:pointer;font-family:inherit;transition:all .12s}
.pl-tb-reset:hover{color:#E2E8F0;border-color:#475569}
.pl-tb-count{font-size:10px;color:#64748B;font-weight:600;margin-left:auto}
.pl-table-wrap{overflow-x:auto;border:1px solid #1E3050;border-radius:10px;background:#101A2E;box-shadow:0 6px 22px rgba(0,0,0,.28)}
.pl-table{width:100%;border-collapse:collapse;font-size:11px}
.pl-table th,.pl-table td{padding:6px 12px;text-align:left;border-bottom:1px solid #18253C;vertical-align:middle;white-space:nowrap}
.pl-table thead th{background:#0E1A2E;font-weight:700;color:#94A3B8;font-size:10px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #2A3A52;position:sticky;top:0;z-index:2}
.pl-table thead th .pl-th-inner{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
.pl-table thead th .pl-th-inner:hover{color:#E2E8F0}
.pl-table thead th.sorted .pl-th-inner{color:#5CB8F0}
.pl-th-arrow{font-size:9px;opacity:.5;transition:opacity .12s}
.pl-table thead th.sorted .pl-th-arrow{opacity:1}
.pl-table thead tr.pl-search-row th{padding:4px 14px 8px;background:#0E1A2E;border-bottom:1px solid #2A3A52;position:sticky;top:37px;z-index:1}
.pl-table thead tr.pl-search-row input{width:100%;background:#162032;border:1px solid #1E3050;border-radius:4px;padding:3px 6px;color:#CBD5E1;font-family:inherit;font-size:10px;outline:none;transition:border-color .12s}
.pl-table thead tr.pl-search-row input:focus{border-color:#38BDF8}
.pl-table thead tr.pl-search-row input::placeholder{color:#334155}
.pl-table tbody tr{transition:background .1s}
.pl-table tbody tr:hover{background:rgba(56,189,248,.06)}
.pl-table tbody td{color:#CBD5E1}
.pl-table .pl-td-ref{white-space:nowrap}
.pl-ref-chip{font-family:'Courier New',monospace;font-size:10px;font-weight:700;color:#7DD3FC;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.22);border-radius:5px;padding:2px 7px;white-space:nowrap}
.pl-table .pl-td-date{white-space:nowrap;color:#94A3B8}
.pl-table .pl-td-sup{font-weight:600}
.pl-table .pl-td-prod{color:#94A3B8;font-size:10px}
.pl-table .pl-td-projet{color:#94A3B8;font-size:10px}
.pl-table .pl-td-eqref{color:#94A3B8;font-size:10px;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.pl-table .pl-td-qte{text-align:right;color:#CBD5E1;font-variant-numeric:tabular-nums}
.pl-table .pl-td-prix{text-align:right;font-weight:700;color:#E2E8F0;font-variant-numeric:tabular-nums;white-space:nowrap}
.pl-table .pl-td-empty{color:#334155;font-style:italic}
/* Groupement par devis : pas de filet entre les lignes d'un même devis ; séparation seulement entre devis (filet supérieur). Cellules niveau-devis vides sur les lignes de continuation. */
.pl-table tbody td{border-bottom:none}
.pl-table tbody tr.pl-grp-first td{border-top:1px solid #2A3A52}
.pl-table tbody tr.pl-grp-first:first-child td{border-top:none}
.pl-table .pl-td-cont{background:transparent}
.pl-merge-cb{accent-color:#38BDF8;cursor:pointer;vertical-align:middle;margin-right:2px}
.pl-merge-hint{font-size:10px;color:#94A3B8;margin-right:8px;align-self:center}
.pl-row-actions{display:flex;gap:4px;justify-content:flex-end;white-space:nowrap}
.pl-act-btn{border:none;background:transparent;color:#475569;cursor:pointer;font-size:11px;font-family:inherit;padding:3px 6px;border-radius:4px;transition:all .12s;display:inline-flex;align-items:center;gap:3px}
.pl-act-btn:hover{background:rgba(56,189,248,.08);color:#5CB8F0}
.pl-act-btn.pl-act-del:hover{background:rgba(248,113,113,.08);color:#F87171}
.pl-empty-table{padding:30px 16px;text-align:center;color:#475569;font-size:11px;font-style:italic}
.pl-ref-wrap{display:inline-flex;align-items:center;gap:5px}
.pl-copy-btn{opacity:0;border:none;background:transparent;color:#475569;cursor:pointer;padding:1px 4px;border-radius:3px;transition:all .12s;font-family:inherit;display:inline-flex;align-items:center}
.pl-table tbody tr:hover .pl-copy-btn{opacity:1}
.pl-copy-btn:hover{color:#5CB8F0;background:rgba(56,189,248,.08)}
.pl-copy-btn.copied{color:#22C55E;opacity:1}
.pl-cell-clickable{cursor:text;transition:box-shadow .1s}
.pl-cell-clickable:hover{background:rgba(56,189,248,.05);box-shadow:inset 0 0 0 1px rgba(56,189,248,.18)}
.pl-cell-editing{padding:2px 4px !important}
.pl-cell-input{width:100%;background:#0E1A2E;border:1px solid #38BDF8;border-radius:3px;padding:4px 6px;color:#E2E8F0;font-family:inherit;font-size:11px;outline:none}
.pl-cell-input[type="number"]{-moz-appearance:textfield;appearance:textfield}
.pl-cell-input[type="number"]::-webkit-inner-spin-button,.pl-cell-input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
/* Combobox custom (liste + filtrage par saisie, thème dark) */
.pl-combo-wrap{position:relative;display:inline-block;min-width:130px}
.pl-combo-wrap.pl-combo-block{display:block;width:100%;min-width:0}

.pl-combo-empty{padding:10px;color:#475569;font-size:11px;text-align:center;font-style:italic}
.pl-combo-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:none;background:transparent;color:#475569;cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;border-radius:3px;opacity:0;transition:all .12s;font-family:inherit}

function doLogin(){
  document.getElementById('login-msg').innerHTML='<div class="login-loading">Connexion…</div>';
  const provider=new firebase.auth.GoogleAuthProvider();
  provider.addScope(GC_SCOPE);
  const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if(isMobile){auth.signInWithRedirect(provider)}
  else{auth.signInWithPopup(provider).then(r=>{gcCaptureCred(r);gcSyncContacts().then(x=>{if(x&&x.ok)render()})}).catch(e=>{
    document.getElementById('login-msg').innerHTML=`<div class="login-err">${e.message}</div>`;
  })}
}
function doLogout(){if(confirm("Se déconnecter ?"))auth.signOut()}

auth.onAuthStateChanged(async user=>{
  currentUser=user;
  if(user){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    await loadFromCloud();
    migrateData();
    render();
    if(gcLoadToken())gcSyncContacts().then(r=>{if(r&&r.ok)render()});
  }else{
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

}

async function loadFromCloud(){
  try{
    const doc=await db.collection('users').doc(currentUser.uid).get();
    if(doc.exists){
      const d=doc.data();
      S.projects=d.projects||[];S.trash=d.trash||[];S.archive=d.archive||[];S.globalOrder=d.globalOrder||[];
      if(d.crm){S.crm=d.crm}else{initCRM()}
      S.feedback=d.feedback&&Array.isArray(d.feedback.items)?d.feedback:{items:[]};
      S.priceLib=d.priceLib&&typeof d.priceLib==='object'?{schemas:d.priceLib.schemas||{},quotes:Array.isArray(d.priceLib.quotes)?d.priceLib.quotes:[]}:{schemas:{},quotes:[]};
      /* Also cache locally */
      localStorage.setItem(SK,JSON.stringify({projects:S.projects,trash:S.trash,archive:S.archive,globalOrder:S.globalOrder,crm:S.crm,feedback:S.feedback,priceLib:S.priceLib}));
    }else{
      /* First login: check if localStorage has data to migrate */
      const local=localStorage.getItem(SK);
      if(local){
        const p=JSON.parse(local);
        S.projects=p.projects||[];S.trash=p.trash||[];S.archive=p.archive||[];S.globalOrder=p.globalOrder||[];
        if(p.crm){S.crm=p.crm}else{initCRM()}
        S.feedback=p.feedback&&Array.isArray(p.feedback.items)?p.feedback:{items:[]};
        S.priceLib=p.priceLib&&typeof p.priceLib==='object'?{schemas:p.priceLib.schemas||{},quotes:Array.isArray(p.priceLib.quotes)?p.priceLib.quotes:[]}:{schemas:{},quotes:[]};
        await saveToCloudNow();
      }
    }
    /* Apply migrations */
    S.projects.forEach(p=>{
      S.openProjects[p.id]=true;
      if(!p.tasks)p.tasks=[];
      p.tasks.forEach(t=>{delete t.parentId});
      p.actions.forEach(a=>{
        if(!a.deadline)a.deadline="";if(!a.waitReason)a.waitReason="";if(!a.title)a.title="";
        if(a.timeVal!==undefined){const tv=a.timeVal||0,tu=a.timeUnit||"h";a.timeH=tu==="m"?tv/60:tu==="j"?tv*8:tv;delete a.timeVal;delete a.timeUnit}
        if(!a.timeH)a.timeH=0;if(!a.doneDate)a.doneDate="";if(a.taskId===undefined)a.taskId="";
        delete a.blockedBy;delete a.indent;if(a.priority===undefined||a.priority===false)a.priority=0;else if(a.priority===true)a.priority=2;if(a.paused===undefined)a.paused=a.status==='waiting';
      });
    });
  }catch(e){
    console.error("Cloud load error:",e);
    /* Fallback to localStorage */
    const local=localStorage.getItem(SK);
    if(local){const p=JSON.parse(local);S.projects=p.projects||[];S.trash=p.trash||[];S.archive=p.archive||[];S.globalOrder=p.globalOrder||[];if(p.crm){S.crm=p.crm}else{initCRM()}
    S.feedback=p.feedback&&Array.isArray(p.feedback.items)?p.feedback:{items:[]};
    S.priceLib=p.priceLib&&typeof p.priceLib==='object'?{schemas:p.priceLib.schemas||{},quotes:Array.isArray(p.priceLib.quotes)?p.priceLib.quotes:[]}:{schemas:{},quotes:[]};
    S.projects.forEach(p=>{S.openProjects[p.id]=true;if(!p.tasks)p.tasks=[];})}else{initCRM()}
  }
}

async function saveToCloudNow(){
  if(!currentUser)return;
  const data={projects:S.projects,trash:S.trash,archive:S.archive,globalOrder:S.globalOrder,crm:S.crm,feedback:S.feedback,priceLib:S.priceLib};
  const stripped=JSON.parse(stripImgs(JSON.stringify(data)));
  try{
    await db.collection('users').doc(currentUser.uid).set(stripped);
    if(syncEl){syncEl.textContent="✓";syncEl.className="sync-indicator"}
  }catch(e){
    console.error("Cloud save error:",e);
    if(syncEl){syncEl.textContent="✗";syncEl.className="sync-indicator error"}
  }
}

function saveToCloud(){
  if(!currentUser)return;
  if(syncEl){syncEl.textContent="…";syncEl.className="sync-indicator saving"}
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveToCloudNow,1500);
}

  }

/* ── Global tab ── */
function rGT(){
  /* Auto-purge de l'inbox vide */
  const _ib=fp("__inbox");if(_ib&&!_ib.actions.length)S.projects=S.projects.filter(p=>p.id!=="__inbox");
  /* Couleur stable par projet (assignée 1× ; le réordonnancement ne la change pas) */
  let _ca=false;S.projects.forEach(p=>{if(p.id!=="__inbox"&&!p.color){const u=S.projects.map(x=>x.color).filter(Boolean);p.color=PCOLS.find(c=>!u.includes(c))||PCOLS[S.projects.indexOf(p)%PCOLS.length];_ca=true}});if(_ca)save();
  /* Sous-onglets : Planning / Projets / Terminé / Temps */
  const sect=S.gSection||'plan';
  let h=`<div class="subtab-bar"><div class="subtab ${sect==='plan'?'on':''}" onclick="S.gSection='plan';render()">Planning</div><div class="subtab ${sect==='task'?'on':''}" onclick="S.gSection='task';render()">Projets</div><div class="subtab ${sect==='done'?'on':''}" onclick="S.gSection='done';render()">Terminé</div><div class="subtab ${sect==='time'?'on':''}" onclick="S.gSection='time';render()">Temps</div></div>`;
  if(S.gSection==='done')return h+rDN();
  if(S.gSection==='time')return h+rTM();
  /* Inline add + filtre statut sur la même ligne (alignés) */
  const fltHTML=`<div class="flt-wrap" id="flt-wrap"><button class="flt-btn" onclick="event.stopPropagation();document.getElementById('flt-wrap').classList.toggle('open')">${{"all":"Toutes","ec":"En cours","wt":"Attente","urgent":"Urgent","rapide":"Rapide"}[S.gFilter]||"Toutes"} <svg viewBox="0 0 8 5"><path d="M0 0l4 4 4-4" stroke="currentColor" stroke-width="1.2" fill="none"/></svg></button><div class="flt-dd"><div class="flt-opt ${S.gFilter==='all'?'on':''}" onclick="S.gFilter='all';render()">Toutes</div><div class="flt-opt ${S.gFilter==='ec'?'on':''}" onclick="S.gFilter='ec';render()">En cours</div><div class="flt-opt ${S.gFilter==='wt'?'on':''}" onclick="S.gFilter='wt';render()">Attente</div><div class="flt-opt ${S.gFilter==='urgent'?'on':''}" onclick="S.gFilter='urgent';render()">Urgent</div><div class="flt-opt ${S.gFilter==='rapide'?'on':''}" onclick="S.gFilter='rapide';render()">Rapide</div></div></div>`;
  const expandHTML=S.gSection==='task'?`<button class="flt-btn" onclick="togAllProj()" title="Déplier ou replier tous les projets">${allProjOpen?'Tout replier':'Tout déplier'}</button>`:'';
  if(addCard.open&&addCard.at==='top'){
    h+=`<div class="qa-bar"><div class="qa-stack"><div class="qa-stack-hd"><div class="qa-trigger-open" onclick="var _t=document.getElementById('ga-title');if(_t)_t.focus()"><b>＋</b> Ajouter une action</div>${fltHTML}${expandHTML}</div>${qaCardHTML(true,true)}</div></div>`;
  }else{
    h+=`<div class="qa-bar"><button class="qa-trigger" onclick="qaOpen()"><b>＋</b> Ajouter une action</button>${fltHTML}${expandHTML}</div>`;
  }
  let all=[];S.projects.forEach(p=>{p.actions.forEach(a=>{if(a.status!=="done")all.push({...a,pId:p.id})})});
  if(!all.length){h+=`<div class="es">Aucune action en cours.</div>`;return h}
  /* Sync globalOrder */
  const ids=new Set(all.map(a=>a.id));
  S.globalOrder=S.globalOrder.filter(id=>ids.has(id));
  all.forEach(a=>{if(!S.globalOrder.includes(a.id))S.globalOrder.push(a.id)});
  /* Apply status filter */
  let filtered=all;
  if(S.gFilter==="urgent"){filtered=all.filter(a=>a.urgent)}else if(S.gFilter==="rapide"){filtered=all.filter(a=>a.rapide)}else if(S.gFilter!=="all"){filtered=all.filter(a=>{const st=getStatus(a);return st===S.gFilter})}
  const _gq=(S.gQ||"").toLowerCase().trim();if(_gq){filtered=filtered.filter(a=>(a.title||"").toLowerCase().includes(_gq)||(a.text||"").replace(/<[^>]*>/g," ").toLowerCase().includes(_gq)||pN(fp(a.pId)).toLowerCase().includes(_gq))}
  if(!filtered.length){h+=`<div class="es">${_gq?"Aucun résultat pour cette recherche.":"Aucune action avec ce filtre."}</div>`;return h}
  if(S.gSection==="task"){
    /* Group by project, then by task within each project */
    const projIds=[...new Set(filtered.map(a=>a.pId))].sort((a,b)=>S.projects.findIndex(p=>p.id===a)-S.projects.findIndex(p=>p.id===b));
    projIds.forEach(pid=>{
      const p=fp(pid);if(!p)return;
      const pActs=filtered.filter(a=>a.pId===pid);
      const _pOpen=(!!_gq||S.gFilter!=='all')||allProjOpen||openProjId===pid;
      const _nDone=p.actions.filter(a=>a.status==='done').length, _nTodo=p.actions.length-_nDone;
      const _delMsg=_nDone?`Supprimer ? ${_nTodo} en cours, ${_nDone} terminée${_nDone>1?'s':''} conservée${_nDone>1?'s':''}`:`Supprimer ${_nTodo} action${_nTodo>1?'s':''} ?`;
      h+=`<div class="pgl${_pOpen?' open':''}" style="border-left-color:${pCol(pid)}" onclick="togProj('${pid}')" ondragover="pDO(event,'${pid}')" ondragleave="pDL(event)" ondrop="pDD(event,'${pid}')">${pid!=='__inbox'?`<span class="pgl-grip" draggable="true" ondragstart="pDS(event,'${pid}')" ondragend="pDE()" onclick="event.stopPropagation()" title="Glisser pour réordonner">${I.grip}</span>`:''}<span class="pgl-chev"><svg viewBox="0 0 8 5"><path d="M0 0l4 4 4-4" stroke="currentColor" stroke-width="1.2" fill="none"/></svg></span>${pid==='__inbox'?`<span class="pgl-lbl" style="color:${pCol(pid)}">${esc(pN(p))}</span>`:`<input class="pgl-name" style="color:${pCol(pid)}" value="${esc(pN(p))}" placeholder="Nom du projet…" oninput="upNm('${pid}',this.value)" onclick="event.stopPropagation()">`}<span class="plan-ct">${pActs.length}</span>${pid!=='__inbox'?(delConfirmPid===pid?`<span class="pgl-confirm">${_delMsg}</span><button class="pgl-del-ok" onclick="event.stopPropagation();delPGo('${pid}')" title="Confirmer la suppression">✓</button><button class="pgl-del-no" onclick="event.stopPropagation();delConfirmPid=null;render()" title="Annuler">✕</button>`:`<button class="pgl-del" onclick="event.stopPropagation();delConfirmPid='${pid}';render()" title="Supprimer le projet">${I.trash}</button>`):""}</div>`;
      if(_pOpen){
      /* Standalone actions (no task) */
      const standalone=pActs.filter(a=>!a.taskId);
      standalone.sort((a,b)=>S.globalOrder.indexOf(a.id)-S.globalOrder.indexOf(b.id));
      standalone.forEach(a=>{h+=rA(a,pid,{sp:false})});
      /* Group by task */
      const taskIds=[...new Set(pActs.filter(a=>a.taskId).map(a=>a.taskId))];
      p.tasks.filter(t=>taskIds.includes(t.id)).forEach(tk=>{
        const tkActs=pActs.filter(a=>a.taskId===tk.id);
        tkActs.sort((a,b)=>S.globalOrder.indexOf(a.id)-S.globalOrder.indexOf(b.id));
        h+=`<div class="tk-zone" ondragover="tgActDO(event,'${pid}','${tk.id}')" ondragleave="tgActDL(event)" ondrop="tgActDD(event,'${pid}','${tk.id}')">`;
        h+=`<div class="tk-hd"><input style="border:none;background:transparent;font-size:9px;font-weight:700;color:#5CB8F0;font-family:inherit;outline:none;flex:1" value="${esc(tk.title||'')}" placeholder="Nom tâche…" oninput="uTN('${pid}','${tk.id}',this.value)"><span class="tg-add-btn" onclick="event.stopPropagation();qaOpen('${pid}','${tk.id}')" title="Ajouter une action ici">＋</span></div>`;
        if(addCard.open&&addCard.at===`task:${pid}:${tk.id}`)h+=`<div class="qa-inline">${qaCardHTML(false,false)}</div>`;
        tkActs.forEach(a=>{h+=rA(a,pid,{sp:false})});
        h+=`</div>`;
      });
      if(addCard.open&&addCard.at===`proj:${pid}`)h+=`<div class="qa-inline">${qaCardHTML(false,true)}</div>`;
      else h+=`<div class="pa-add" onclick="qaOpen('${pid}')"><b>＋</b> Ajouter une action</div>`;
      }
    });
  }else{
    /* Plan view (défaut) : tranches par date de planif + drag&drop (réordonner dans un jour / replanifier d'un jour à l'autre) */
    const BK=[{k:'overdue',l:'En retard',c:'#F87171',a:false},{k:'today',l:"Aujourd'hui",c:'#38BDF8',a:true},{k:'tomorrow',l:'Demain',c:'#22C55E',a:true},{k:'week',l:'Cette semaine',c:'#A78BFA',a:true},{k:'later',l:'Plus tard',c:'#64748B',a:true},{k:'waiting',l:'En attente',c:'#F59E0B',a:false},{k:'none',l:'Non planifié',c:'#475569',a:true}];
    const grp={};filtered.forEach(x=>{const b=schedBucket(x);(grp[b]=grp[b]||[]).push(x)});
    BK.forEach(bk=>{const items=grp[bk.k]||[];if(!items.length&&!bk.a)return;items.sort((a,b)=>{const da=a.scheduledDate||"",db=b.scheduledDate||"";if(da!==db){if(!da)return 1;if(!db)return -1;return da.localeCompare(db)}return S.globalOrder.indexOf(a.id)-S.globalOrder.indexOf(b.id)});
      h+=`<div class="plan-bucket" ondragover="plBkDO(event)" ondragleave="plBkDL(event)" ondrop="plBkDD(event,'${bk.k}')"><div class="plan-hd" style="border-left:3px solid ${bk.c}"><span style="color:${bk.c}">${bk.l}</span><span class="plan-ct">${items.length}</span></div>`;
      items.forEach(a=>{h+=rA(a,a.pId,{sp:true,stk:true})});
      if(!items.length)h+=`<div class="plan-empty">Déposer ici pour planifier</div>`;
      h+=`</div>`;
    });
  }
  return h}

/* ── Terminées (colored, two views) ── */
function rDN(){
  /* Inline add with autocomplete */
  let h=`<div class="add-row"><input id="da-title" placeholder="Action terminée…" onkeydown="if(event.key==='Enter'){event.preventDefault();qaDone()}"><div class="ac-wrap" id="acw-dproj"><input id="da-proj-q" placeholder="Projet…" onfocus="acOpen('acw-dproj')" oninput="acFilter('acw-dproj',this.value,'proj')"><div class="ac-list" id="acl-dproj"></div></div><input id="da-hours" type="number" min="0" step="0.25" placeholder="h" style="width:50px;border:1px solid #1E3050;border-radius:5px;padding:4px 6px;font-size:10px;font-family:inherit;background:#152236;color:#5CB8F0;outline:none"><button onclick="qaDone()">＋</button></div>`;
  let all=[];S.projects.forEach(p=>{p.actions.forEach(a=>{if(a.status==="done")all.push({...a,pId:p.id,_pName:pN(p)})})});
  S.archive.forEach(a=>{all.push({...a,_pName:a.pName||"?",_archived:true})});
  if(!all.length){h+=`<div class="es">Aucune action terminée.</div>`;return h}
  if(!S.doneView)S.doneView="project";
  h+=`<div class="vt"><button class="vtb ${S.doneView==="project"?"on":""}" onclick="S.doneView='project';render()">Par projet</button><button class="vtb ${S.doneView==="date"?"on":""}" onclick="S.doneView='date';render()">Par date</button></div>`;
  if(S.doneView==="date"){
    all.sort((a,b)=>(b.doneDate||"").localeCompare(a.doneDate||""));
    let lastDate="";
    h+=`<table class="done-tbl">`;
    all.forEach(a=>{
      const dd=a.doneDate||"";
      if(dd!==lastDate){lastDate=dd;const label=!dd?"Date inconnue":new Date(dd+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
        h+=`<tr><td colspan="5" style="padding:10px 6px 4px;font-size:11px;font-weight:700;color:#5CB8F0;text-transform:capitalize;border-bottom:1px solid #1E3050">${label}</td></tr>`}
      const isA=a._archived;const pName=a._pName||pN(fp(a.pId));
      h+=`<tr><td class="dt-proj">${esc(pName)}</td><td class="dt-title">${esc(a.title)}</td><td class="dt-hrs">${a.timeH?a.timeH.toFixed(1)+"h":""}</td><td class="dt-act">${!isA?`<span style="cursor:pointer;color:#64748B;font-size:10px" onclick="togD('${a.pId}','${a.id}')" title="Rouvrir">${I.undo}</span>`:""}<span style="cursor:pointer;color:#334155;font-size:10px;margin-left:3px" onclick="${isA?`delArchived('${a.id}')`:`delA('${a.pId}','${a.id}')`}" title="Supprimer">${I.trash}</span></td></tr>`;
    });
    h+=`</table>`;
  }else{
    const byP={};all.forEach(a=>{const k=a.pId||"_archived";if(!byP[k])byP[k]={name:a._pName,items:[]};byP[k].items.push(a)});
    const keys=Object.keys(byP).sort((a,b)=>{const ai=S.projects.findIndex(p=>p.id===a),bi=S.projects.findIndex(p=>p.id===b);if(ai===-1&&bi===-1)return 0;if(ai===-1)return 1;if(bi===-1)return -1;return ai-bi});
    keys.forEach(k=>{
      h+=`<div class="pgl" style="border-left-color:${pCol(k)}"><span class="pgl-lbl" style="color:${pCol(k)}">${esc(byP[k].name)}</span><span class="plan-ct">${byP[k].items.length}</span></div>`;
      byP[k].items.sort((a,b)=>(b.doneDate||"").localeCompare(a.doneDate||"")).forEach(a=>{h+=rDoneRow(a)});
    });
  }
  return h}

function rDoneRow(a){
  const pName=a._pName||pN(fp(a.pId));
  const isArchived=a._archived;
  const delBtn=isArchived?`<button class="bi btr" onclick="event.stopPropagation();delArchived('${a.id}')" title="Supprimer">${I.trash}</button>`:`<button class="bi bud" onclick="event.stopPropagation();togD('${a.pId}','${a.id}')" title="Rouvrir">${I.undo}</button><button class="bi btr" onclick="event.stopPropagation();delA('${a.pId}','${a.id}')" title="Supprimer">${I.trash}</button>`;
  return`<div id="ar_${a.id}" class="ar dn ${S.ex[a.id]?"ao":""}" style="opacity:.7">
  <div class="at">
    <span class="ac" onclick="togX('${a.id}')">${I.chev}</span>
    ${S.doneView==="date"?`<span class="a-tk" style="color:#4B6480">${esc(pName)} ›</span>`:""}
    <input class="as" value="${esc(a.title)}" placeholder="Résumé…" onclick="event.stopPropagation()" ${!isArchived?`oninput="uaT('${a.pId}','${a.id}',this.value)"`:"disabled"} style="color:#E2E8F0">
    ${isArchived?`<span class="adtg" style="color:#64748B">${a.doneDate||""}</span>`:`<input type="date" class="dn-date" value="${a.doneDate||""}" onclick="event.stopPropagation();this.showPicker&&this.showPicker()" onchange="uaDD('${a.pId}','${a.id}',this.value)" title="Date de validation">`}
    <input type="number" class="ati" value="${a.timeH?a.timeH.toFixed(2):""}" min="0" step="0.25" placeholder="h" onclick="event.stopPropagation()" ${!isArchived?`oninput="uaTm('${a.pId}','${a.id}',this.value)"`:"disabled"}><span class="atl">h</span>
    <div class="ari">${delBtn}</div>
  </div>
  <div class="adl">
    <div class="ab">${!isArchived?fmB(a.pId,a.id):""}<div class="${isArchived?"":"atx"}" ${!isArchived?`contenteditable="true" data-pid="${a.pId}" data-aid="${a.id}" data-placeholder="Détails…" onclick="event.stopPropagation()"`:""} style="font-size:11px;color:#94A3B8">${a.text||""}</div></div>
  </div></div>`}

/* ── Temps tab ── */
function rTM(){
  const now=new Date();const mon=new Date(now);mon.setDate(mon.getDate()-mon.getDay()+1+S.wo*7);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(sun.getDate()+6);
  const monS=lDS(mon),sunS=lDS(sun);
  const label=mon.toLocaleDateString("fr-FR",{day:"numeric",month:"short"})+" – "+sun.toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});
  /* Build day strings */
  const days=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(d.getDate()+i);days.push(lDS(d))}
  const dayLabels=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  /* Collect: merge by project name */
  const byN={};let gt=0;const gtD=[0,0,0,0,0,0,0];
  const allSources=[];
  S.projects.forEach(p=>{p.actions.forEach(a=>{if(a.status==="done"&&a.doneDate&&a.doneDate>=monS&&a.doneDate<=sunS)allSources.push({pName:pN(p),doneDate:a.doneDate,timeH:a.timeH||0})})});
  S.archive.forEach(a=>{if(a.doneDate&&a.doneDate>=monS&&a.doneDate<=sunS)allSources.push({pName:a.pName||"?",doneDate:a.doneDate,timeH:a.timeH||0})});
  allSources.forEach(a=>{
    if(!byN[a.pName])byN[a.pName]={name:a.pName,total:0,days:[0,0,0,0,0,0,0]};
    const di=days.indexOf(a.doneDate);
    if(di!==-1){byN[a.pName].days[di]+=a.timeH;gtD[di]+=a.timeH}
    byN[a.pName].total+=a.timeH;gt+=a.timeH;
  });
  let h=`<div class="wn"><button onclick="S.wo--;render()">◀</button><span>${label}</span><button onclick="S.wo++;render()">▶</button><button onclick="S.wo=0;render()" style="margin-left:4px">Auj.</button></div>`;
  if(!Object.keys(byN).length){h+=`<div class="es">Aucun temps cette semaine.</div>`;return h}
  h+=`<div style="overflow-x:auto"><table class="tt"><tr><th>Projet</th>`;
  dayLabels.forEach(d=>{h+=`<th style="text-align:right;min-width:36px">${d}</th>`});
  h+=`<th style="text-align:right">Total</th></tr>`;
  Object.values(byN).sort((a,b)=>b.total-a.total).forEach(p=>{
    h+=`<tr><td class="pn">${esc(p.name)}</td>`;
    p.days.forEach(d=>{h+=`<td style="text-align:right">${d?d.toFixed(2):"-"}</td>`});
    h+=`<td style="text-align:right;font-weight:600">${p.total.toFixed(2)}h</td></tr>`;
  });
  h+=`<tr class="ttr"><td>Total</td>`;
  gtD.forEach(d=>{h+=`<td style="text-align:right">${d?d.toFixed(2):"-"}</td>`});
  h+=`<td style="text-align:right">${gt.toFixed(2)}h</td></tr></table></div>`;return h}

function rTR(){if(!S.trash.length)return`<div class="es">Corbeille vide.</div>`;let h=`<div class="bar"><div></div><button class="bs" style="border-color:#F87171;color:#F87171" onclick="if(confirm('Vider ?'))emptyT()">Vider</button></div>`;S.trash.slice().reverse().forEach((it,ri)=>{const i=S.trash.length-1-ri;const m=Math.round((Date.now()-it.date)/60000);const t=m<1?"maintenant":m<60?m+"min":Math.round(m/60)+"h";const label=it.type==="project"?it.data.name:(it.data.title||"Sans titre");const sub=it.type==="project"?"Projet":"Action · "+esc(it.pn||"");h+=`<div class="tri"><div class="tii"><b>${esc(label)}</b> <span style="font-size:9px;color:#4B6480">${sub}</span> · ${t}</div><button class="brs" onclick="restT(${i})">↩</button><button class="bpu" onclick="purgeT(${i})">✕</button></div>`});return h}
