function qaCardHTML(showProj,showTask){let pick="";if(showProj)pick+=`<div class="ac-wrap" id="acw-proj"><input id="ga-proj-q" placeholder="Projet…" value="${esc(_acSel.proj)}" onfocus="acOpen('acw-proj')" oninput="acFilter('acw-proj',this.value,'proj')"><div class="ac-list" id="acl-proj"></div></div>`;if(showTask)pick+=`<div class="ac-wrap" id="acw-task"><input id="ga-task-q" placeholder="Tâche…" value="${esc(_acSel.task)}" onfocus="acOpen('acw-task')" oninput="acFilter('acw-task',this.value,'task')"><div class="ac-list" id="acl-task"></div></div>`;const det=addCard.showDetails?`<textarea id="ga-details" class="qa-details" rows="1" placeholder="Détails…" oninput="addCard.text=this.value" onkeydown="qaKey(event)">${esc(addCard.text)}</textarea>`:`<span class="qa-det-toggle" onclick="addCard.showDetails=true;render();requestAnimationFrame(()=>{const d=document.getElementById('ga-details');if(d)d.focus()})">＋ détails</span>`;const today=lDS(new Date()),_tm=new Date();_tm.setDate(_tm.getDate()+1);const tmrw=lDS(_tm),sd=addCard.sched||"",custom=!!sd&&sd!==today&&sd!==tmrw;const chips=`<div class="qa-chips"><button class="qa-chip ${sd===today?'on':''}" onclick="qaSched('today')">Aujourd'hui</button><button class="qa-chip ${sd===tmrw?'on':''}" onclick="qaSched('tomorrow')">Demain</button><span class="qa-chip qa-chip-cal ${custom?'on':''}" title="Choisir une date"><input type="date" value="${sd}" onchange="addCard.sched=this.value;render()" onclick="event.stopPropagation();this.showPicker&&this.showPicker()">${I.cal}${custom?`<span>${scl(sd)}</span>`:""}</span></div>`;return`<div class="qa-card"><div class="qa-arow"><span class="qa-cbx"></span><input id="ga-title" class="qa-as" type="text" placeholder="Titre de l'action…" value="${esc(addCard.title)}" oninput="addCard.title=this.value" onkeydown="qaKey(event)"></div><div class="qa-body">${pick?`<div class="qa-pickers">${pick}</div>`:""}${chips}${det}</div></div>`}
function qaSched(val){if(val===''){addCard.sched='';render();return}const d=new Date();if(val==='tomorrow')d.setDate(d.getDate()+1);const s=lDS(d);addCard.sched=(addCard.sched===s)?'':s;render();requestAnimationFrame(()=>{const el=document.getElementById('ga-title');if(el)el.focus()})}
function qaOpen(projId,taskId){addCard.open=true;addCard.title="";addCard.text="";addCard.sched="";addCard.showDetails=false;if(projId){const p=fp(projId);if(p){_acSel={proj:pN(p),projId:projId,task:taskId?((p.tasks.find(t=>t.id===taskId)||{}).title||""):"",taskId:taskId||""};S.openProjects[projId]=true;if(taskId){S.openTasks[taskId]=true;addCard.at=`task:${projId}:${taskId}`}else addCard.at=`proj:${projId}`}else{_acSel={proj:"",projId:"",task:"",taskId:""};addCard.at='top'}}else{_acSel={proj:"",projId:"",task:"",taskId:""};addCard.at='top'}render();requestAnimationFrame(()=>{const el=document.getElementById('ga-title');if(el)el.focus()})}
function qaCancel(){addCard.open=false;addCard.at='top';addCard.title="";addCard.text="";addCard.sched="";addCard.showDetails=false;_acSel={proj:"",projId:"",task:"",taskId:""};render()}
function qaAdd(keepOpen){const ti=document.getElementById('ga-title');const title=(ti?ti.value:"").trim();if(!title){if(ti)ti.focus();return}const de=document.getElementById('ga-details');const raw=de?de.value.trim():"";const text=raw?esc(raw).replace(/\n/g,'<br>'):"";let p=fp(_acSel.projId);if(!p)p=getInbox();const n={id:gid(),text:text,title:title,urgency:"medium",status:"todo",deadline:"",waitReason:"",timeH:0,doneDate:"",taskId:_acSel.taskId||"",paused:false,priority:0,scheduledDate:addCard.sched||""};p.actions.push(n);S.globalOrder.unshift(n.id);addCard.title="";addCard.text="";addCard.sched="";addCard.showDetails=false;if(!keepOpen){addCard.open=false;addCard.at='top';_acSel={proj:"",projId:"",task:"",taskId:""}}save();render();if(keepOpen)requestAnimationFrame(()=>{const el=document.getElementById('ga-title');if(el){el.value="";el.focus()}})}
function qaKey(e){if(e.key==='Escape'){e.preventDefault();qaCancel();return}if(e.key==='Enter'){if(e.target.id==='ga-details'){if(e.ctrlKey||e.metaKey){e.preventDefault();qaAdd(true)}}else{e.preventDefault();qaAdd(true)}}}
function qaDone(){const ti=document.getElementById('da-title'),hrs=document.getElementById('da-hours');const title=(ti?ti.value:"").trim();if(!title)return;let p=fp(_acSel.projId);if(!p){p=S.projects[0];if(!p)return}const n={id:gid(),text:"",title:title,urgency:"medium",status:"done",deadline:"",waitReason:"",timeH:parseFloat(hrs?hrs.value:"")||0,doneDate:lDS(new Date()),taskId:"",paused:false,priority:0,scheduledDate:""};p.actions.push(n);save();_acSel={proj:"",projId:"",task:"",taskId:""};render();requestAnimationFrame(()=>{const el=document.getElementById('da-title');if(el){el.value="";el.focus()}})}

/* ── Temps (timesheet hebdo indépendant : projets → tâches → heures/jour) ──
   Modèle : S.timesheet={projects:[{id,name,tasks:[{id,name}]}], weeks:{[lundiISO]:[{projId,rows:[{taskId,h:[7]}]}]}}.
   Une semaine sans entrée reprend par défaut (prefill) les projets/tâches de la dernière semaine remplie, heures à 0 ; matérialisée à la 1re édition. */
function tsNorm(t){return(t&&typeof t==='object')?{projects:Array.isArray(t.projects)?t.projects:[],weeks:(t.weeks&&typeof t.weeks==='object')?t.weeks:{}}:{projects:[],weeks:{}}}
function tsData(){if(!S.timesheet||typeof S.timesheet!=='object')S.timesheet={projects:[],weeks:{}};if(!Array.isArray(S.timesheet.projects))S.timesheet.projects=[];if(!S.timesheet.weeks||typeof S.timesheet.weeks!=='object')S.timesheet.weeks={};return S.timesheet}
function tsMon(){const n=new Date();const m=new Date(n);m.setDate(m.getDate()-m.getDay()+1+(S.wo||0)*7);m.setHours(0,0,0,0);return m}
function tsWK(){return lDS(tsMon())}
function tsProj(id){return tsData().projects.find(p=>p.id===id)}
function tsPN(id){const p=tsProj(id);return p?p.name:'?'}
function tsTN(pid,tid){const p=tsProj(pid);const t=p&&p.tasks.find(x=>x.id===tid);return t?t.name:'?'}
function tsGetWeek(wk){const w=tsData().weeks;if(w[wk])return w[wk];const ks=Object.keys(w).filter(k=>k<wk).sort();if(!ks.length)return[];return w[ks[ks.length-1]].map(r=>({projId:r.projId,rows:r.rows.map(tr=>({taskId:tr.taskId,h:[0,0,0,0,0,0,0]}))}))}
function tsEnsureWeek(wk){const w=tsData().weeks;if(!w[wk])w[wk]=tsGetWeek(wk).map(r=>({projId:r.projId,rows:r.rows.map(tr=>({taskId:tr.taskId,h:tr.h.slice()}))}));return w[wk]}
function tsFmt(v){return v?(Math.round(v*100)/100).toString().replace('.',','):'0'}
function tsAddProjectByName(name){name=(name||'').trim();if(!name)return;const d=tsData();let p=d.projects.find(x=>x.name.toLowerCase()===name.toLowerCase());if(!p){p={id:gid(),name,tasks:[]};d.projects.push(p)}tsAddProjectToWeek(p.id)}
function tsAddProjectToWeek(pid){const rows=tsEnsureWeek(tsWK());if(!rows.some(r=>r.projId===pid))rows.push({projId:pid,rows:[]});S.tsAdd=null;save();render()}
function tsRemoveProjectFromWeek(pid){const rows=tsEnsureWeek(tsWK());const i=rows.findIndex(r=>r.projId===pid);if(i>=0)rows.splice(i,1);save();render()}
function tsAddTaskByName(pid,name){name=(name||'').trim();if(!name)return;const p=tsProj(pid);if(!p)return;let t=p.tasks.find(x=>x.name.toLowerCase()===name.toLowerCase());if(!t){t={id:gid(),name};p.tasks.push(t)}tsAddTaskToWeek(pid,t.id)}
function tsAddTaskToWeek(pid,tid){const rows=tsEnsureWeek(tsWK());const pr=rows.find(r=>r.projId===pid);if(pr&&!pr.rows.some(tr=>tr.taskId===tid))pr.rows.push({taskId:tid,h:[0,0,0,0,0,0,0]});S.tsAdd=null;save();render()}
function tsRemoveTaskFromWeek(pid,tid){const rows=tsEnsureWeek(tsWK());const pr=rows.find(r=>r.projId===pid);if(pr){const i=pr.rows.findIndex(tr=>tr.taskId===tid);if(i>=0)pr.rows.splice(i,1)}save();render()}
function tsInput(pid,tid,di,inp){const rows=tsEnsureWeek(tsWK());const pr=rows.find(r=>r.projId===pid);if(!pr)return;const tr=pr.rows.find(x=>x.taskId===tid);if(!tr)return;let v=parseFloat(String(inp.value).replace(',','.'));if(isNaN(v)||v<0)v=0;tr.h[di]=v;tsRecalcDom();save()}
function tsRecalcDom(){const rows=tsGetWeek(tsWK());const gtd=[0,0,0,0,0,0,0];rows.forEach(pr=>{const ps=[0,0,0,0,0,0,0];pr.rows.forEach(tr=>{let tt=0;tr.h.forEach((v,i)=>{ps[i]+=v;tt+=v});const te=document.getElementById('tstt-'+pr.projId+'-'+tr.taskId);if(te)te.textContent=tt?tsFmt(tt):'·'});let pt=0;ps.forEach((v,i)=>{pt+=v;gtd[i]+=v;const pe=document.getElementById('tsps-'+pr.projId+'-'+i);if(pe)pe.textContent=v?tsFmt(v):'·'});const pte=document.getElementById('tspt-'+pr.projId);if(pte)pte.textContent=pt?tsFmt(pt):'·'});let gt=0;gtd.forEach((v,i)=>{gt+=v;const ge=document.getElementById('tsgt-'+i);if(ge)ge.textContent=v?tsFmt(v):'·'});const gte=document.getElementById('tsg');if(gte)gte.textContent=gt?tsFmt(gt):'·'}
function tsToggleCol(pid){S.tsCol[pid]=!S.tsCol[pid];render()}
function tsStartRename(pid){S.tsEdit=pid;render();requestAnimationFrame(()=>{const el=document.getElementById('ts-rninp');if(el){el.focus();el.select()}})}
function tsRenameCommit(pid,val){if(S.tsEdit!==pid)return;val=(val||'').trim();const p=tsProj(pid);if(p&&val)p.name=val;S.tsEdit=null;save();render()}
function tsOpenAdd(which){S.tsAdd=(S.tsAdd===which)?null:which;render();requestAnimationFrame(()=>{const el=document.getElementById('ts-addinp');if(el)el.focus()})}
function tsAddProjectRow(){const wk=tsWK();if(S.tsAdd!=='proj')return`<tr class="ts-addrow"><td colspan="10"><span class="ts-add" onclick="tsOpenAdd('proj')">＋ Ajouter un projet</span></td></tr>`;const inW=new Set(tsGetWeek(wk).map(r=>r.projId));const av=tsData().projects.filter(p=>!inW.has(p.id)).sort((a,b)=>a.name.localeCompare(b.name,'fr',{sensitivity:'base'}));let h=`<tr class="ts-addrow ts-addopen"><td colspan="10"><div class="ts-addbox"><input id="ts-addinp" class="ts-addinp" placeholder="Nom du projet… (Entrée)" onkeydown="if(event.key==='Enter'){tsAddProjectByName(this.value)}else if(event.key==='Escape'){S.tsAdd=null;render()}">`;if(av.length){h+=`<div class="ts-pick">`;av.forEach(p=>{h+=`<span class="ts-chip" onclick="tsAddProjectToWeek('${p.id}')">${esc(p.name)}</span>`});h+=`</div>`}h+=`<span class="ts-cancel" onclick="S.tsAdd=null;render()">Annuler</span></div></td></tr>`;return h}
function tsAddTaskRow(pid){if(S.tsAdd!=='task:'+pid)return`<tr class="ts-addrow ts-addtask"><td colspan="10"><span class="ts-add" onclick="tsOpenAdd('task:${pid}')">＋ Ajouter une tâche</span></td></tr>`;const pr=tsGetWeek(tsWK()).find(r=>r.projId===pid);const inW=new Set(pr?pr.rows.map(tr=>tr.taskId):[]);const p=tsProj(pid);const av=(p?p.tasks:[]).filter(t=>!inW.has(t.id)).sort((a,b)=>a.name.localeCompare(b.name,'fr',{sensitivity:'base'}));let h=`<tr class="ts-addrow ts-addtask ts-addopen"><td colspan="10"><div class="ts-addbox"><input id="ts-addinp" class="ts-addinp" placeholder="Nom de la tâche… (Entrée)" onkeydown="if(event.key==='Enter'){tsAddTaskByName('${pid}',this.value)}else if(event.key==='Escape'){S.tsAdd=null;render()}">`;if(av.length){h+=`<div class="ts-pick">`;av.forEach(t=>{h+=`<span class="ts-chip" onclick="tsAddTaskToWeek('${pid}','${t.id}')">${esc(t.name)}</span>`});h+=`</div>`}h+=`<span class="ts-cancel" onclick="S.tsAdd=null;render()">Annuler</span></div></td></tr>`;return h}
function rTS(){
  tsData();
  const mon=tsMon(),wk=tsWK();
  const sun=new Date(mon);sun.setDate(sun.getDate()+6);
  const label=mon.toLocaleDateString("fr-FR",{day:"numeric",month:"short"})+" – "+sun.toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});
  const days=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(d.getDate()+i);days.push(d)}
  const dl=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  const rows=tsGetWeek(wk);
  const prefill=!tsData().weeks[wk]&&rows.length>0;
  let h=`<div class="ts-wrap"><div class="ts-top"><div class="wn"><button onclick="S.wo--;render()">◀</button><span>${label}</span><button onclick="S.wo++;render()">▶</button><button onclick="S.wo=0;render()" style="margin-left:4px">Auj.</button></div>`;
  if(prefill)h+=`<span class="ts-prefill">Reprise de la semaine précédente — édite pour valider</span>`;
  h+=`</div>`;
  h+=`<div class="ts-scroll"><table class="ts-tab"><thead><tr><th class="ts-name">Projet / Tâche</th>`;
  days.forEach((d,i)=>{h+=`<th class="ts-day"><div>${dl[i]}</div><div class="ts-date">${d.getDate()}/${d.getMonth()+1}</div></th>`});
  h+=`<th class="ts-tot">Total</th><th class="ts-act"></th></tr></thead><tbody>`;
  const gtd=[0,0,0,0,0,0,0];let gt=0;
  rows.forEach(pr=>{
    const ps=[0,0,0,0,0,0,0];pr.rows.forEach(tr=>{tr.h.forEach((v,i)=>{ps[i]+=v})});
    const pt=ps.reduce((a,b)=>a+b,0);ps.forEach((v,i)=>{gtd[i]+=v});gt+=pt;
    const col=!!S.tsCol[pr.projId];
    const pnCell=S.tsEdit===pr.projId
      ? `<input id="ts-rninp" class="ts-rn" value="${esc(tsPN(pr.projId))}" onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter'){tsRenameCommit('${pr.projId}',this.value)}else if(event.key==='Escape'){S.tsEdit=null;render()}" onblur="tsRenameCommit('${pr.projId}',this.value)">`
      : `<span class="ts-pn" title="Cliquer pour renommer" onclick="tsStartRename('${pr.projId}')">${esc(tsPN(pr.projId))}</span>`;
    h+=`<tr class="ts-prow"><td class="ts-name"><span class="ts-car" onclick="tsToggleCol('${pr.projId}')">${col?'▸':'▾'}</span>${pnCell}</td>`;
    ps.forEach((v,i)=>{h+=`<td class="ts-num" id="tsps-${pr.projId}-${i}">${v?tsFmt(v):'·'}</td>`});
    h+=`<td class="ts-num ts-pt" id="tspt-${pr.projId}">${pt?tsFmt(pt):'·'}</td><td class="ts-act"><button class="ts-x" title="Retirer le projet de la semaine" onclick="tsRemoveProjectFromWeek('${pr.projId}')">✕</button></td></tr>`;
    if(!col){
      pr.rows.forEach(tr=>{
        const tt=tr.h.reduce((a,b)=>a+b,0);
        h+=`<tr class="ts-trow"><td class="ts-name ts-tname">${esc(tsTN(pr.projId,tr.taskId))}</td>`;
        tr.h.forEach((v,i)=>{h+=`<td class="ts-num"><input type="text" inputmode="decimal" class="ts-inp" value="${v||''}" oninput="tsInput('${pr.projId}','${tr.taskId}',${i},this)"></td>`});
        h+=`<td class="ts-num ts-tt" id="tstt-${pr.projId}-${tr.taskId}">${tt?tsFmt(tt):'·'}</td><td class="ts-act"><button class="ts-x" title="Retirer la tâche" onclick="tsRemoveTaskFromWeek('${pr.projId}','${tr.taskId}')">✕</button></td></tr>`;
      });
      h+=tsAddTaskRow(pr.projId);
    }
  });
  h+=tsAddProjectRow();
  h+=`<tr class="ts-grow"><td class="ts-name">Total</td>`;
  gtd.forEach((v,i)=>{h+=`<td class="ts-num" id="tsgt-${i}">${v?tsFmt(v):'·'}</td>`});
  h+=`<td class="ts-num ts-gt" id="tsg">${gt?tsFmt(gt):'·'}</td><td class="ts-act"></td></tr>`;
  h+=`</tbody></table></div></div>`;
  return h;
}

/* ── Bibliothèque de prix ── */
// ▼ plEnsure — garde anti-corruption sur S.priceLib + migration vers le modèle devis→lignes (un devis porte N lignes d'équipement, cf. plMigrateLines)
function plEnsure(){
  if(!S.priceLib||typeof S.priceLib!=='object')S.priceLib={schemas:{},quotes:[]};
  if(!S.priceLib.schemas||typeof S.priceLib.schemas!=='object')S.priceLib.schemas={};
  if(!Array.isArray(S.priceLib.quotes))S.priceLib.quotes=[];
  S.priceLib.quotes.forEach(plMigrateLines);
}

// ▼ plMigrateLines — migration idempotente d'un devis vers le modèle à lignes. ADDITIF en étape 1 : on crée q.lines[] + q.projet sans supprimer q.product/q.values (legacy, lus encore par le modal/table jusqu'à l'étape 3). Une ligne = {id, product, values:{}}.
function plMigrateLines(q){
  if(!q||typeof q!=='object')return;
  if(typeof q.projet!=='string')q.projet="";
  if(!Array.isArray(q.lines)){
    q.lines=[{id:gid(),product:q.product||"",values:(q.values&&typeof q.values==='object')?q.values:{}}];
  }
}

// ▼ plSlugSupplier — nom fournisseur → slug ASCII uppercase tirets, max 30
function plSlugSupplier(name){
  return (name||"").normalize('NFD').replace(/[̀-ͯ]/g,'').toUpperCase().replace(/[^A-Z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,30);
}

// ▼ plGenerateRef — AAAAMMJJ-X-FOURNISSEUR (X = max+1 sur tuple date+slug, trous préservés ; excludeId = devis à ignorer en mode édit)
function plGenerateRef(dateISO,supplierName,excludeId){
  plEnsure();
  const d=(dateISO||"").replace(/-/g,'');
  const slug=plSlugSupplier(supplierName);
  if(!d||!slug)return "";
  const re=new RegExp('^'+d+'-(\\d+)-'+slug.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\$&')+'$');
  let max=0;
  S.priceLib.quotes.forEach(q=>{if(excludeId&&q.id===excludeId)return;const m=q.ref&&q.ref.match(re);if(m){const x=parseInt(m[1],10);if(x>max)max=x}});
  return d+'-'+(max+1)+'-'+slug;
}

// ▼ plToday — date du jour au format YYYY-MM-DD
function plToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

/* État du modal — transient (NON persisté) */
let plModalState=null;

// ▼ plNewLine — fabrique une ligne d'équipement vierge pour le modal (product optionnel)
function plNewLine(product){return {id:gid(),product:product||"",productQuery:"",values:{}}}

// ▼ plOpenNewQuote — initialise état modal pour création (presets optionnels depuis les filtres actifs). Un devis = N lignes (cf. plMigrateLines).
function plOpenNewQuote(presetSupId,presetProduct){
  plEnsure();
  plModalState={editingId:null,date:plToday(),supplierId:presetSupId||"",supplierQuery:"",projet:"",lines:[plNewLine(presetProduct||"")],fieldDraft:null,err:""};
  plRenderModal();
}

// ▼ plOpenEditQuote — ouvre le modal pré-rempli pour un devis existant (ref figé)
function plOpenEditQuote(id){
  plEnsure();
  const q=S.priceLib.quotes.find(x=>x.id===id);
  if(!q)return;
  const srcLines=(Array.isArray(q.lines)&&q.lines.length)?q.lines:[{id:gid(),product:q.product||"",values:q.values||{}}];
  const lines=srcLines.map(l=>({id:l.id||gid(),product:l.product||"",productQuery:"",values:Object.assign({},l.values||{})}));
  plModalState={editingId:q.id,date:q.date||plToday(),supplierId:q.supplierId||"",supplierQuery:"",projet:q.projet||"",lines:lines,fieldDraft:null,err:""};
  plRenderModal();
}

// ▼ plCloseModal — vide le host et reset l'état
function plCloseModal(){plModalState=null;document.getElementById('pl-host').innerHTML=""}

// ▼ plSetField — mute state sans re-render (oninput texte/date)
function plSetField(k,v){if(!plModalState)return;plModalState[k]=v}

// ▼ Lignes du devis — helpers
function plGetLine(lineId){if(!plModalState)return null;return (plModalState.lines||[]).find(l=>l.id===lineId)||null}
function plAddLine(){if(!plModalState)return;plModalState.lines.push(plNewLine(""));plModalState.err="";plRenderModal()}
function plRemoveLine(lineId){
  if(!plModalState)return;
  if(plModalState.lines.length<=1)return; /* toujours ≥ 1 ligne */

  plRenderModal();
}

// ▼ Cascade fournisseur — recherche live, création inline si pas de match
function plSearchSupplier(q){if(!plModalState)return;plModalState.supplierQuery=q;plRenderModal()}
function plPickSupplier(id){
  if(!plModalState)return;

  const sup=S.crm.suppliers.find(s=>s.id===id);
  if(!sup)return;
  /* Auto-link CRM : toute sous-cat déjà présente sur une ligne (flux preset) que ce fournisseur ne propose pas encore */
  let dirty=false;
  (st.lines||[]).forEach(l=>{
    const p=(l.product||"").trim();if(!p)return;

    if(!S.crm.products.some(x=>x.toLowerCase()===p.toLowerCase())){S.crm.products.push(p);dirty=true}
  });

  st.supplierId=id;st.supplierQuery="";st.err="";

}
function plClearSupplier(){if(!plModalState)return;plModalState.supplierId="";plModalState.supplierQuery="";plModalState.err="";plRenderModal()}
function plCreateAndPickSupplier(name){
  if(!plModalState)return;

}
function plPickSupplierEnter(){

// ▼ Cascade sous-catégorie — recherche live filtrée par fournisseur, création inline. Scopée par ligne (lineId).
function plSearchProduct(lineId,q){const l=plGetLine(lineId);if(!l)return;l.productQuery=q;plRenderModal()}
/* Changer/effacer la sous-cat NE vide PLUS les valeurs : les valeurs sont clé→id de champ ; si on re-choisit la même sous-cat elles réapparaissent (sinon elles restent inertes, non affichées). */
function plPickProduct(lineId,name){const l=plGetLine(lineId);if(!l)return;l.product=name;l.productQuery="";if(plModalState.fieldDraft&&plModalState.fieldDraft.lineId===lineId)plModalState.fieldDraft=null;plModalState.err="";plRenderModal()}
function plClearProduct(lineId){const l=plGetLine(lineId);if(!l)return;l.product="";l.productQuery="";if(plModalState.fieldDraft&&plModalState.fieldDraft.lineId===lineId)plModalState.fieldDraft=null;plModalState.err="";plRenderModal()}

function plPickProductEnter(lineId){

// ▼ plOpenFieldDraft / plCancelFieldDraft / plConfirmFieldDraft — mini form-builder, ciblé sur la sous-cat d'une ligne (lineId)
function plOpenFieldDraft(lineId){if(!plModalState)return;plModalState.fieldDraft={lineId:lineId,name:"",type:"number",unit:"",options:""};plRenderModal()}
function plCancelFieldDraft(){if(!plModalState)return;plModalState.fieldDraft=null;plRenderModal()}
function plSetDraftField(k,v){if(!plModalState||!plModalState.fieldDraft)return;plModalState.fieldDraft[k]=v}
function plConfirmFieldDraft(){
  if(!plModalState||!plModalState.fieldDraft)return;

function plDelField(lineId,fieldId){

function plSaveQuote(){
  plEnsure();
  if(!plModalState)return;
  const st=plModalState;
  if(!st.date){st.err="Date requise";plRenderModal();return}
  if(!st.supplierId){st.err="Fournisseur requis";plRenderModal();return}
  const sup=S.crm.suppliers.find(s=>s.id===st.supplierId);
  if(!sup){st.err="Fournisseur introuvable";plRenderModal();return}
  /* Lignes valides = celles avec une sous-cat ; au moins une requise */
  const lines=(st.lines||[]).filter(l=>(l.product||"").trim()).map(l=>({id:l.id||gid(),product:l.product,values:Object.assign({},l.values||{})}));
  if(!lines.length){st.err="Ajoute au moins une ligne avec une sous-catégorie";plRenderModal();return}
  const projet=(st.projet||"").trim();
  if(st.editingId){
    /* Mode édition : mute le devis existant + recalcule la ref (cohérence date/fournisseur, excludeId = self) */
    const q=S.priceLib.quotes.find(x=>x.id===st.editingId);
    if(!q){st.err="Devis introuvable";plRenderModal();return}
    q.date=st.date;q.supplierId=st.supplierId;q.projet=projet;q.lines=lines;
    /* legacy (lu par le tableau jusqu'à l'étape 3) = 1re ligne */
    q.product=lines[0].product;q.values=Object.assign({},lines[0].values);
    q.ref=plGenerateRef(q.date,sup.name,q.id);
    q.updatedAt=Date.now();
  }else{
    /* Mode création */
    const ref=plGenerateRef(st.date,sup.name);
    const quote={id:gid(),ref:ref,date:st.date,supplierId:st.supplierId,projet:projet,lines:lines,product:lines[0].product,values:Object.assign({},lines[0].values),createdAt:Date.now()};
    S.priceLib.quotes.push(quote);
  }
  save();
  plCloseModal();
  render();
}

// ▼ plDeleteQuote — supprime un devis (confirm natif)
function plDeleteQuote(id){
  plEnsure();
  const q=S.priceLib.quotes.find(x=>x.id===id);
  if(!q)return;
  if(!confirm(`Supprimer le devis ${q.ref||q.id} ?\nCette action est irréversible.`))return;
  S.priceLib.quotes=S.priceLib.quotes.filter(x=>x.id!==id);

}

// ▼ Fusion de devis — état transient (NON persisté). null=off, []=mode actif avec ids sélectionnés.
let plMergeSel=null;
function plToggleMergeMode(){plMergeSel=plMergeSel?null:[];render()}
function plMergeCancel(){plMergeSel=null;render()}
function plMergeToggle(qid){if(!plMergeSel)return;const i=plMergeSel.indexOf(qid);if(i>=0)plMergeSel.splice(i,1);else plMergeSel.push(qid);render()}
// ▼ plMergeSameSup — les devis sélectionnés partagent-ils le même fournisseur (≥2) ? (condition de fusion)
function plMergeSameSup(){
  if(!plMergeSel||plMergeSel.length<2)return false;
  const ids=plMergeSel.map(id=>(S.priceLib.quotes.find(q=>q.id===id)||{}).supplierId);
  return ids.every(x=>x&&x===ids[0]);
}
// ▼ plMergeConfirm — fusionne les devis sélectionnés en 1 (cible = ref la plus petite). Lignes concaténées, date = la plus ancienne, projet = cible sinon 1er non vide. Les autres devis sont supprimés.
function plMergeConfirm(){
  plEnsure();
  if(!plMergeSameSup())return;
  const sel=plMergeSel.map(id=>S.priceLib.quotes.find(q=>q.id===id)).filter(Boolean);
  if(sel.length<2)return;
  sel.sort((a,b)=>(a.ref||"").localeCompare(b.ref||""));
  const target=sel[0],others=sel.slice(1);
  const totalLines=sel.reduce((n,q)=>n+((q.lines||[]).length),0);
  if(!confirm(`Fusionner ${sel.length} devis en un seul (${totalLines} équipements regroupés sous une réf unique) ?\nLes autres références seront supprimées. Action irréversible.`))return;
  const dates=sel.map(q=>q.date).filter(Boolean).sort();
  if(dates.length)target.date=dates[0];
  if(!(target.projet||"").trim()){const p=sel.map(q=>(q.projet||"").trim()).find(Boolean);if(p)target.projet=p}
  if(!Array.isArray(target.lines))target.lines=[];
  others.forEach(o=>{(o.lines||[]).forEach(l=>target.lines.push(l))});
  const sup=S.crm.suppliers.find(s=>s.id===target.supplierId);
  if(sup)target.ref=plGenerateRef(target.date,sup.name,target.id);
  if(target.lines[0]){target.product=target.lines[0].product;target.values=Object.assign({},target.lines[0].values)}
  target.updatedAt=Date.now();
  const delIds=new Set(others.map(o=>o.id));
  S.priceLib.quotes=S.priceLib.quotes.filter(q=>!delIds.has(q.id));
  plMergeSel=null;
  save();render();
}

// ▼ Import d'un devis depuis un bloc structuré (JSON produit par Claude à partir d'un devis uploadé)
const PL_IMPORT_PROMPT=`Tu m'aides à intégrer un devis dans ma base de prix d'équipements (traitement de l'eau).

À partir du devis que je joins (PDF ou photo), réponds UNIQUEMENT par un bloc JSON (aucun texte autour), au format exact suivant, prêt à coller dans ma fonction « Importer un devis » :

{
  "date": "AAAA-MM-JJ",
  "supplier": "Nom du fournisseur",
  "projet": "",
  "lines": [
    { "product": "SOUS-CATEGORIE EN MAJUSCULES", "fields": [
      { "name": "Nom du champ", "value": valeur, "unit": "unité si nombre", "type": "number" }
    ] }
  ]
}

Règles :
- Un devis pour UN équipement composé de plusieurs références = UNE seule ligne (prix = total net) ; liste les composants dans un champ texte "Composition".
- Plusieurs équipements réellement distincts = plusieurs lignes.
- Nombres = valeur numérique pure (ex. 13600.5), unité dans "unit", "type":"number". Texte = "type":"text".
- Inclure toujours un champ "Prix" en €, et si pertinent : Modèle, Débit, Pression, Puissance, Délai, Réf. fournisseur.
- "product" en MAJUSCULES (ex. POMPE HAUTE PRESSION, FILTRE A SABLE).
- Date au format AAAA-MM-JJ.

Voici le devis :`;
let plImportState=null; // {text, err}
function plOpenImport(){plEnsure();plImportState={text:"",err:""};plRenderImportModal()}
function plCloseImport(){plImportState=null;const h=document.getElementById('pl-host');if(h)h.innerHTML=""}
function plImportSetText(v){if(plImportState)plImportState.text=v} /* pas de re-render (textarea) */
// ▼ plParseDateISO — accepte AAAA-MM-JJ ou JJ/MM/AAAA (./- aussi) → AAAA-MM-JJ, "" si invalide
function plParseDateISO(s){s=(s==null?"":String(s)).trim();if(!s)return "";let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return `${m[1]}-${m[2]}-${m[3]}`;m=s.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{4})$/);if(m)return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;return ""}
function plDoImport(){
  if(!plImportState)return;
  plEnsure();
  let data;
  try{data=JSON.parse(plImportState.text)}catch(e){plImportState.err="JSON invalide : "+e.message;plRenderImportModal();return}
  if(!data||typeof data!=='object'||Array.isArray(data)){plImportState.err="Format attendu : un objet JSON { date, supplier, lines[] }.";plRenderImportModal();return}
  const dateISO=plParseDateISO(data.date);
  if(!dateISO){plImportState.err="Date manquante ou invalide (AAAA-MM-JJ ou JJ/MM/AAAA).";plRenderImportModal();return}
  const supName=(data.supplier||"").trim();
  if(!supName){plImportState.err="Fournisseur manquant.";plRenderImportModal();return}
  const inLines=Array.isArray(data.lines)?data.lines.filter(l=>l&&(l.product||"").trim()):[];
  if(!inLines.length){plImportState.err="Aucune ligne avec une sous-catégorie (champ \"product\").";plRenderImportModal();return}
  /* Fournisseur : retrouve ou crée */
  let sup=S.crm.suppliers.find(s=>s.name.toLowerCase()===supName.toLowerCase());
  if(!sup){sup={id:gid(),name:supName,products:[]};S.crm.suppliers.push(sup)}
  /* Lignes : crée sous-cat + champs (par nom) au besoin */
  const outLines=inLines.map(l=>{
    const prod=(l.product||"").trim();
    if(!sup.products.some(p=>p.toLowerCase()===prod.toLowerCase()))sup.products.push(prod);
    if(!S.crm.products.some(p=>p.toLowerCase()===prod.toLowerCase()))S.crm.products.push(prod);
    if(!Array.isArray(S.priceLib.schemas[prod]))S.priceLib.schemas[prod]=[];
    const schema=S.priceLib.schemas[prod];
    const values={};
    (Array.isArray(l.fields)?l.fields:[]).forEach(fl=>{
      const fname=((fl&&fl.name)||"").trim();if(!fname)return;
      let f=schema.find(x=>x.name.toLowerCase()===fname.toLowerCase());
      if(!f){
        let type=fl.type;
        if(type!=='number'&&type!=='date'&&type!=='select'){const val=fl.value;type=(val!==""&&val!=null&&isFinite(parseFloat(val)))?'number':'text'}
        f={id:gid(),name:fname,type:type};
        if(type==='number'&&fl.unit)f.unit=String(fl.unit).trim();
        if(type==='select'&&Array.isArray(fl.options))f.options=fl.options;
        schema.push(f);
      }
      let v=fl.value;
      v=(f.type==='number')?plNumClean(String(v==null?"":v)):(v==null?"":String(v));
      values[f.id]=v;
    });
    return {id:gid(),product:prod,values:values};
  });
  const quote={id:gid(),ref:plGenerateRef(dateISO,sup.name),date:dateISO,supplierId:sup.id,projet:(data.projet||"").trim(),lines:outLines,product:outLines[0].product,values:Object.assign({},outLines[0].values),createdAt:Date.now()};
  S.priceLib.quotes.push(quote);
  save();
  plImportState=null;
  render();
  plOpenEditQuote(quote.id); /* ouvre en édition pour relecture/correction */
}

// ▼ Combobox custom — état transient (NON persisté). key encode le contexte : 'fsup', 'fprod', 'cell-<qid>-<fid>', 'mval-<fid>'
let plCombo=null;  // { key, query }

function plResetFilters(){S.plFilterSup="";S.plFilterProd="";S.plFilterProjet="";S.plSearch={};S.plSortBy=null;S.plSortDir="asc";save();render()}
function plSetSort(col){
  if(S.plSortBy===col){S.plSortDir=(S.plSortDir==='asc'?'desc':'asc')}
  else{S.plSortBy=col;S.plSortDir='asc'}
  save();plRenderTable();
}
function plSetSearch(col,q){if(!S.plSearch||typeof S.plSearch!=='object')S.plSearch={};S.plSearch[col]=q;save();plRenderTable()}

// ▼ plRenderTable — rend la table dans #pl-table-host avec focus restore
function plRenderTable(){
  const host=document.getElementById('pl-table-host');
  if(!host)return;
  plEnsure();
  const active=document.activeElement;
  const focusId=(active&&active.id&&active.id.startsWith('pl-search-'))?active.id:null;
  const focusPos=(focusId&&typeof active.selectionStart==='number')?active.selectionStart:null;
  const supById={};S.crm.suppliers.forEach(s=>{supById[s.id]=s});
  const filterSup=S.plFilterSup||"";
  const filterProd=S.plFilterProd||"";
  const filterProjet=S.plFilterProjet||"";
  const search=S.plSearch||{};
  const merging=!!plMergeSel;
  /* Aplatissement devis → 1 ligne d'affichage par équipement. Filtrage : sup/projet au niveau devis, sous-cat au niveau ligne. */
  let rows=[];
  S.priceLib.quotes.forEach(q=>{
    if(filterSup&&q.supplierId!==filterSup)return;
    if(filterProjet&&(q.projet||"")!==filterProjet)return;
    const lines=(Array.isArray(q.lines)&&q.lines.length)?q.lines:[{id:"_legacy",product:q.product||"",values:q.values||{}}];
    lines.forEach(l=>{
      if(filterProd&&l.product!==filterProd)return;
      rows.push({q:q,l:l});
    });
  });
  /* Recherche par colonne (case-insensitive contains) */
  rows=rows.filter(({q,l})=>{
    for(const col in search){
      const sq=(search[col]||"").toLowerCase().trim();
      if(!sq)continue;
      let v="";
      if(col==='ref')v=(q.ref||"").toLowerCase();
      else if(col==='date')v=(q.date||"").toLowerCase();
      else if(col==='supplier')v=((supById[q.supplierId]&&supById[q.supplierId].name)||"").toLowerCase();
      else if(col==='projet')v=(q.projet||"").toLowerCase();
      else if(col==='product')v=(l.product||"").toLowerCase();
      else v=String((l.values||{})[col]||"").toLowerCase();
      if(v.indexOf(sq)===-1)return false;
    }
    return true;
  });
  /* Tri */
  const sortBy=S.plSortBy;const dir=S.plSortDir==='desc'?-1:1;
  if(sortBy){
    rows.sort((A,B)=>{
      const a=A.q,b=B.q;
      let va="",vb="";
      if(sortBy==='ref'){va=a.ref||"";vb=b.ref||""}
      else if(sortBy==='date'){va=a.date||"";vb=b.date||""}
      else if(sortBy==='supplier'){va=(supById[a.supplierId]&&supById[a.supplierId].name)||"";vb=(supById[b.supplierId]&&supById[b.supplierId].name)||""}
      else if(sortBy==='projet'){va=a.projet||"";vb=b.projet||""}
      else if(sortBy==='product'){va=A.l.product||"";vb=B.l.product||""}
      else{va=(A.l.values||{})[sortBy]||"";vb=(B.l.values||{})[sortBy]||""}
      const na=parseFloat(va),nb=parseFloat(vb);
      if(!isNaN(na)&&!isNaN(nb)&&va!==""&&vb!=="")return (na-nb)*dir;
      return String(va).localeCompare(String(vb))*dir;
    });
  }
  /* Colonnes dynamiques (uniquement si filterProd actif) ; on masque alors la colonne Sous-cat (redondante) */
  const dynFields=filterProd?(S.priceLib.schemas[filterProd]||[]):[];
  const showProdCol=!filterProd;
  const arrow=col=>{if(S.plSortBy!==col)return '<span class="pl-th-arrow">↕</span>';return '<span class="pl-th-arrow">'+(S.plSortDir==='asc'?'▲':'▼')+'</span>'};
  const sorted=col=>S.plSortBy===col?'sorted':'';
  let h=`<table class="pl-table"><thead>`;
  h+=`<tr>`;
  h+=`<th class="${sorted('ref')}"><div class="pl-th-inner" onclick="plSetSort('ref')">Ref ${arrow('ref')}</div></th>`;
  h+=`<th class="${sorted('date')}"><div class="pl-th-inner" onclick="plSetSort('date')">Date ${arrow('date')}</div></th>`;
  h+=`<th class="${sorted('supplier')}"><div class="pl-th-inner" onclick="plSetSort('supplier')">Fournisseur ${arrow('supplier')}</div></th>`;
  h+=`<th class="${sorted('projet')}"><div class="pl-th-inner" onclick="plSetSort('projet')">Projet ${arrow('projet')}</div></th>`;
  if(showProdCol)h+=`<th class="${sorted('product')}"><div class="pl-th-inner" onclick="plSetSort('product')">Sous-cat. ${arrow('product')}</div></th>`;
  if(showProdCol)h+=`<th>Réf.</th><th style="text-align:right">Qté</th><th style="text-align:right">Prix</th>`;
  dynFields.forEach(f=>{const lbl=f.unit?`${esc(f.name)} (${esc(f.unit)})`:esc(f.name);h+=`<th class="${sorted(f.id)}"><div class="pl-th-inner" onclick="plSetSort('${f.id}')">${lbl} ${arrow(f.id)}</div></th>`});
  h+=`<th style="text-align:right">&nbsp;</th>`;
  h+=`</tr>`;
  /* Ligne de filtres par colonne retirée (redondante avec les filtres du haut) ; commonCols conservé pour le colspan de l'état vide */
  const commonCols=showProdCol?['ref','date','supplier','projet','product']:['ref','date','supplier','projet'];
  h+=`</thead><tbody>`;
  if(!rows.length){
    const ncols=commonCols.length+dynFields.length+1+(showProdCol?3:0);
    h+=`<tr><td colspan="${ncols}"><div class="pl-empty-table">Aucun devis ne correspond aux filtres / recherches.</div></td></tr>`;
  }else{
    const isEditing=(qid,lid,col)=>plEditingCell&&plEditingCell.quoteId===qid&&plEditingCell.lineId===lid&&plEditingCell.col===col;
    rows.forEach((row,i)=>{
      const q=row.q,l=row.l;
      const sup=supById[q.supplierId];
      /* 1re ligne du groupe-devis (les lignes d'un même devis sont adjacentes sauf tri par valeur) → on n'affiche les cellules niveau-devis que là, vide sinon */
      const firstOfGroup=(i===0||rows[i-1].q.id!==q.id);
      h+=`<tr class="pl-line-row${firstOfGroup?' pl-grp-first':' pl-grp-cont'}">`;
      if(firstOfGroup){
        /* Ref + bouton copy (figée) + case de sélection en mode fusion */
        h+=`<td class="pl-td-ref">${merging?`<input type="checkbox" class="pl-merge-cb" ${plMergeSel.indexOf(q.id)>=0?'checked':''} onclick="event.stopPropagation();plMergeToggle('${q.id}')"> `:''}<span class="pl-ref-wrap"><span class="pl-ref-chip">${esc(q.ref||"")}</span><button class="pl-copy-btn" onclick="event.stopPropagation();plCopyText('${esc(q.ref||"")}')" title="Copier la référence">${I.copy}</button></span></td>`;
        /* Date éditable inline (niveau devis, lineId="") */
        if(isEditing(q.id,"",'date')){
          h+=`<td class="pl-td-date pl-cell-editing"><input id="pl-edit-cell" type="date" class="pl-cell-input" value="${esc(q.date||"")}" onchange="plCommitCellEdit('${q.id}','','date',this.value)" onkeydown="if(event.key==='Escape'){plCancelCellEdit()}else if(event.key==='Enter'){this.blur()}" onblur="if(plEditingCell)plCommitCellEdit('${q.id}','','date',this.value)"></td>`;
        }else{
          h+=`<td class="pl-td-date pl-cell-clickable" onclick="plStartCellEdit('${q.id}','','date')">${esc(plDateFR(q.date))}</td>`;
        }
        h+=`<td class="pl-td-sup">${esc(sup?sup.name:"?")}</td>`;
        h+=`<td class="pl-td-projet">${esc(q.projet||"")}</td>`;
      }else{
        h+=`<td class="pl-td-ref pl-td-cont"></td><td class="pl-td-date pl-td-cont"></td><td class="pl-td-sup pl-td-cont"></td><td class="pl-td-projet pl-td-cont"></td>`;
      }
      if(showProdCol){
        h+=`<td class="pl-td-prod">${esc(l.product||"")}</td>`;
        const cr=plLineColVal(l,'ref'),cq=plLineColVal(l,'qte'),cp=plLineColVal(l,'prix');
        const refTxt=(cr&&cr.v!=null&&cr.v!=="")?String(cr.v):"";
        h+=`<td class="pl-td-eqref" title="${esc(refTxt)}">${esc(refTxt||"—")}</td>`;
        const qteTxt=(cq&&cq.v!=null&&cq.v!=="")?(cq.f.type==='number'?plFormatNumber(cq.v):String(cq.v)):"1"; /* Qté = 1 par défaut si non précisée */
        h+=`<td class="pl-td-qte">${esc(qteTxt)}</td>`;
        let prixTxt="";if(cp&&cp.v!=null&&cp.v!==""){prixTxt=plFormatNumber(cp.v)+(cp.f.unit?" "+cp.f.unit:" €")}
        h+=`<td class="pl-td-prix">${prixTxt?esc(prixTxt):"—"}</td>`;
      }
      /* Valeurs dynamiques éditables inline (niveau ligne) */
      dynFields.forEach(f=>{
        const v=(l.values||{})[f.id];
        if(isEditing(q.id,l.id,f.id)){
          let inputHtml="";
          const commitJS=`plCommitCellEdit('${q.id}','${l.id}','${f.id}',this.value)`;
          const kbJS=`if(event.key==='Escape'){plCancelCellEdit()}else if(event.key==='Enter'){this.blur()}`;
          const blurJS=`if(plEditingCell)plCommitCellEdit('${q.id}','${l.id}','${f.id}',this.value)`;
          if(f.type==='number')inputHtml=`<input id="pl-edit-cell" type="number" step="any" class="pl-cell-input" value="${esc(v==null?"":String(v))}" onblur="${blurJS}" onkeydown="${kbJS}">`;
          else if(f.type==='date')inputHtml=`<input id="pl-edit-cell" type="date" class="pl-cell-input" value="${esc(v||"")}" onchange="${commitJS}" onblur="${blurJS}" onkeydown="${kbJS}">`;
          else if(f.type==='select'){let opts=`<option value="">—</option>`;(f.options||[]).forEach(o=>{opts+=`<option value="${esc(o)}" ${v===o?'selected':''}>${esc(o)}</option>`});inputHtml=`<select id="pl-edit-cell" class="pl-cell-input" onchange="${commitJS}" onblur="${blurJS}" onkeydown="${kbJS}">${opts}</select>`}
          else{
            /* Texte : saisie native (aucun re-render au clavier) ; commit au blur ; suggestions au focus via CSS :focus-within */
            const cur=(v==null?"":String(v));
            const sg=plDistinctValues(l.product,f.id).filter(s=>s.toLowerCase()!==cur.toLowerCase()).slice(0,8);
            const ddJS=`onfocus="this.select&&this.select()" onblur="${blurJS}" onkeydown="${kbJS}"`;
            inputHtml=`<div class="pl-combo-wrap pl-combo-block pl-combo-static"><input id="pl-edit-cell" type="text" class="pl-cell-input" value="${esc(cur)}" autocomplete="off" ${ddJS}>`;
            if(sg.length)inputHtml+=`<div class="pl-combo-dropdown">${sg.map(s=>`<div class="pl-combo-item" onmousedown="event.preventDefault();plCommitCellEdit('${q.id}','${l.id}','${f.id}',${esc(JSON.stringify(s))})">${esc(s)}</div>`).join('')}</div>`;
            inputHtml+=`</div>`;
          }
          h+=`<td class="pl-cell-editing">${inputHtml}</td>`;
          return;
        }
        if(v===undefined||v===""||v===null){h+=`<td class="pl-cell-clickable pl-td-empty" onclick="plStartCellEdit('${q.id}','${l.id}','${f.id}')">—</td>`;return}
        let display="";
        if(f.type==='number'){display=plFormatNumber(v);if(f.unit)display+=` <span style="color:#64748B">${esc(f.unit)}</span>`}
        else if(f.type==='date')display=esc(plDateFR(v));
        else display=esc(String(v));
        h+=`<td class="pl-cell-clickable" onclick="plStartCellEdit('${q.id}','${l.id}','${f.id}')">${display}</td>`;
      });
      if(firstOfGroup){
        h+=`<td><div class="pl-row-actions">`;
        h+=`<button class="pl-act-btn" onclick="plOpenEditQuote('${q.id}')" title="Éditer (modal complet)">${I.chev}</button>`;
        h+=`<button class="pl-act-btn pl-act-del" onclick="plDeleteQuote('${q.id}')" title="Supprimer le devis">${I.trash}</button>`;
        h+=`</div></td>`;
      }else{
        h+=`<td class="pl-td-cont"></td>`;
      }
      h+=`</tr>`;
    });
  }
  h+=`</tbody></table>`;
  host.innerHTML=h;
  if(focusId){const el=document.getElementById(focusId);if(el){el.focus();if(focusPos!==null&&typeof el.setSelectionRange==='function'){try{el.setSelectionRange(focusPos,focusPos)}catch(e){}}}}
  else if(plEditingCell){const el=document.getElementById('pl-edit-cell');if(el){el.focus();if(typeof el.select==='function')try{el.select()}catch(e){}}}
}

// ▼ plDateFR — YYYY-MM-DD → DD/MM/YYYY
function plDateFR(iso){if(!iso||typeof iso!=='string')return "";const m=iso.match(/^(\d{4})-(\d{2})-(\d{2})/);return m?`${m[3]}/${m[2]}/${m[1]}`:iso}

// ▼ plFormatNumber — format FR avec séparateur de milliers ; passe-plat si non numérique
function plFormatNumber(v){if(v===""||v===null||v===undefined)return "";const n=parseFloat(v);if(isNaN(n))return String(v);return new Intl.NumberFormat('fr-FR',{maximumFractionDigits:2}).format(n)}

// ▼ plLineColVal — retrouve {f,v} d'un champ "bien connu" (prix/qte/ref) dans le schéma de la ligne, par nom (insensible casse/accents). null si absent. Pour les colonnes transverses Réf./Qté/Prix du tableau.
function plLineColVal(line,kind){
  const schema=S.priceLib.schemas[line&&line.product]||[];
  const norm=s=>(s||"").toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  const pick=(exacts,contains)=>{for(const c of exacts){const f=schema.find(x=>norm(x.name)===c);if(f)return f}if(contains)for(const c of contains){const f=schema.find(x=>norm(x.name).indexOf(c)>=0);if(f)return f}return null};
  let f=null;
  if(kind==='prix')f=pick(['prix'],['prix']);
  else if(kind==='qte')f=pick(['quantite','qte'],['quantite']);
  else if(kind==='ref')f=pick(['reference','ref','modele','code'],['reference','modele','ref']);
  if(!f)return null;
  return {f:f,v:(line.values||{})[f.id]};
}

// ▼ plNumClean — string saisie (espaces/virgule) → chaîne numérique canonique pour stockage (point décimal, sans espaces). "" si vide.
function plNumClean(s){if(s==null)return "";return String(s).replace(/\s| | /g,'').replace(',','.').replace(/[^0-9.\-]/g,'')}

// ▼ plCopyText — copie dans le presse-papier (avec fallback execCommand)
function plCopyText(t){
  if(!t)return;
  const flash=el=>{if(!el)return;el.classList.add('copied');setTimeout(()=>el.classList.remove('copied'),900)};
  const btn=event&&event.currentTarget;
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>flash(btn)).catch(()=>{});return}
  const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');flash(btn)}catch(e){}
  document.body.removeChild(ta);
}

/* ── Gestion des champs par sous-catégorie (form-builder) ── */
let plSchemaModalState=null;

// ▼ plListAllProducts — union triée des sous-cats (schémas + devis + CRM)
function plListAllProducts(){
  plEnsure();
  const set=new Set();
  Object.keys(S.priceLib.schemas).forEach(k=>set.add(k));
  S.priceLib.quotes.forEach(q=>{(q.lines||[]).forEach(l=>{if(l.product)set.add(l.product)});if(q.product)set.add(q.product)});
  (S.crm.products||[]).forEach(p=>set.add(p));
  return [...set].sort((a,b)=>a.localeCompare(b));
}

// ▼ plListProjets — noms de projet distincts déjà saisis sur les devis (tri alpha ; pour l'autocomplétion de saisie)
function plListProjets(){
  plEnsure();
  const set=new Set();
  S.priceLib.quotes.forEach(q=>{const p=(q.projet||"").trim();if(p)set.add(p)});
  return [...set].sort((a,b)=>a.localeCompare(b));
}

// ▼ plDistinctValues — valeurs distinctes saisies pour un champ d'une sous-cat (triées par fréquence puis alpha)
function plDistinctValues(prod,fieldId){
  plEnsure();
  const counts={};
  S.priceLib.quotes.forEach(q=>{
    (q.lines||[]).forEach(l=>{
      if(l.product!==prod)return;
      const v=(l.values||{})[fieldId];
      if(v==null||v==="")return;
      const sv=String(v);
      counts[sv]=(counts[sv]||0)+1;
    });
  });
  return Object.keys(counts).sort((a,b)=>counts[b]-counts[a]||a.localeCompare(b));
}

// ▼ plListAllFields — agrège les champs distincts de tous les schémas (dédup par nom+type+unit+options)
function plListAllFields(){
  plEnsure();
  const seen=new Map();
  for(const prod in S.priceLib.schemas){
    const arr=S.priceLib.schemas[prod];
    if(!Array.isArray(arr))continue;
    arr.forEach(f=>{
      const sig=(f.name||"").toLowerCase()+'|'+(f.type||"text")+'|'+(f.unit||"")+'|'+((f.options||[]).join(','));
      if(!seen.has(sig))seen.set(sig,{name:f.name,type:f.type||"text",unit:f.unit||"",options:f.options||[],from:[prod]});
      else seen.get(sig).from.push(prod);
    });
  }
  return [...seen.values()].sort((a,b)=>a.name.localeCompare(b.name));
}

// ▼ plFieldTypeLabel — libellé court d'un champ pour les suggestions
function plFieldTypeLabel(f){
  if(f.type==='number')return f.unit?`Nombre · ${f.unit}`:'Nombre';
  if(f.type==='date')return 'Date';
  if(f.type==='select')return `Liste · ${(f.options||[]).join(', ')}`;
  return 'Texte';
}

// ▼ plPickExistingField / plSchemaPickExistingField — pré-remplit le draft depuis un champ existant (nouvel id)

function plSchemaPickExistingField(name,type,unit,optsCsv){

}

// ▼ Form-builder draft (ajout d'un champ)
function plSchemaOpenDraft(prod){if(!plSchemaModalState)return;plSchemaModalState.draft={prod:prod,name:"",type:"number",unit:"",options:""};plSchemaModalState.err="";plRenderSchemaModal()}
function plSchemaCancelDraft(){if(!plSchemaModalState)return;plSchemaModalState.draft=null;plSchemaModalState.err="";plRenderSchemaModal()}
function plSchemaSetDraft(k,v){if(!plSchemaModalState||!plSchemaModalState.draft)return;plSchemaModalState.draft[k]=v}
function plSchemaConfirmDraft(){
  if(!plSchemaModalState||!plSchemaModalState.draft)return;
  plEnsure();
  const fd=plSchemaModalState.draft;
  const prod=fd.prod;
  const name=(fd.name||"").trim();
  if(!name){plSchemaModalState.err="Nom de champ requis";plRenderSchemaModal();return}
  if(!Array.isArray(S.priceLib.schemas[prod]))S.priceLib.schemas[prod]=[];
  if(S.priceLib.schemas[prod].some(f=>f.name.toLowerCase()===name.toLowerCase())){plSchemaModalState.err="Ce champ existe déjà";plRenderSchemaModal();return}
  const f={id:gid(),name:name,type:fd.type||"text"};
  if(fd.type==='number'&&fd.unit)f.unit=fd.unit.trim();
  if(fd.type==='select'){f.options=(fd.options||"").split(',').map(s=>s.trim()).filter(Boolean);if(!f.options.length){plSchemaModalState.err="Liste d'options requise (séparées par virgules)";plRenderSchemaModal();return}}
  S.priceLib.schemas[prod].push(f);
  save();
  plSchemaModalState.draft=null;plSchemaModalState.err="";
  plRenderSchemaModal();
}

// ▼ Édition inline (onchange — pas de re-render à chaque frappe)
function plSchemaRenameField(prod,fieldId,v){
  plEnsure();const arr=S.priceLib.schemas[prod];if(!arr)return;
  const f=arr.find(x=>x.id===fieldId);if(!f)return;
  const nv=(v||"").trim();if(!nv)return;
  if(arr.some(x=>x.id!==fieldId&&x.name.toLowerCase()===nv.toLowerCase())){alert("Ce nom de champ existe déjà");plRenderSchemaModal();return}
  f.name=nv;save();
}
function plSchemaSetFieldUnit(prod,fieldId,v){plEnsure();const arr=S.priceLib.schemas[prod];if(!arr)return;const f=arr.find(x=>x.id===fieldId);if(!f)return;f.unit=(v||"").trim();save()}
function plSchemaSetFieldOptions(prod,fieldId,v){plEnsure();const arr=S.priceLib.schemas[prod];if(!arr)return;const f=arr.find(x=>x.id===fieldId);if(!f)return;f.options=(v||"").split(',').map(s=>s.trim()).filter(Boolean);save();plRenderSchemaModal()}
function plSchemaMoveField(prod,fieldId,dir){
  plEnsure();const arr=S.priceLib.schemas[prod];if(!arr)return;
  const i=arr.findIndex(x=>x.id===fieldId);if(i<0)return;
  const j=i+(dir<0?-1:1);if(j<0||j>=arr.length)return;
  const tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;save();plRenderSchemaModal();
}
// ▼ Réordonnancement par drag dans le gestionnaire « Champs »
let plSchemaDrag=null; // {prod, fieldId}
function plSchemaFieldDragStart(e,prod,fieldId){plSchemaDrag={prod:prod,fieldId:fieldId};try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',fieldId)}catch(_){}}
function plSchemaFieldDragEnd(){plSchemaDrag=null}
function plSchemaFieldDrop(prod,targetFieldId){
  const drag=plSchemaDrag;plSchemaDrag=null;
  if(!drag||drag.prod!==prod)return;
  plEnsure();const arr=S.priceLib.schemas[prod];if(!Array.isArray(arr))return;
  const from=arr.findIndex(x=>x.id===drag.fieldId);
  const to=arr.findIndex(x=>x.id===targetFieldId);
  if(from<0||to<0||from===to)return;
  const m=arr.splice(from,1)[0];arr.splice(to,0,m);
  save();plRenderSchemaModal();
}
function plSchemaDelField(prod,fieldId){
  plEnsure();const arr=S.priceLib.schemas[prod];if(!arr)return;
  const f=arr.find(x=>x.id===fieldId);if(!f)return;
  /* Compter les valeurs orphelines potentielles */
  let used=0;S.priceLib.quotes.forEach(q=>{if(q.product===prod&&q.values&&q.values[fieldId]!==undefined&&q.values[fieldId]!=="")used++});
  let msg=`Supprimer le champ « ${f.name} » de la sous-catégorie « ${prod} » ?`;
  if(used>0)msg+=`\n\n⚠ ${used} devis ont une valeur dans ce champ.\nLes valeurs ne seront plus affichées mais resteront stockées (récupérables si tu recrées le champ).`;
  if(!confirm(msg))return;
  S.priceLib.schemas[prod]=arr.filter(x=>x.id!==fieldId);
  save();plRenderSchemaModal();
}

// ▼ plRenderSchemaModal — modal de gestion des champs par sous-catégorie
function plRenderSchemaModal(){
  const host=document.getElementById('pl-host');
  if(!host)return;
  if(!plSchemaModalState){host.innerHTML="";return}
  const active=document.activeElement;
  const focusId=(active&&active.id&&active.id.startsWith('pl-sch-'))?active.id:null;
  const focusPos=(focusId&&typeof active.selectionStart==='number')?active.selectionStart:null;
  plEnsure();
  const st=plSchemaModalState;
  const products=plListAllProducts();
  /* Stats par sous-cat */
  const stats={};
  S.priceLib.quotes.forEach(q=>{if(!q.product)return;if(!stats[q.product])stats[q.product]={n:0};stats[q.product].n++});
  /* Idem : pas de fermeture au clic sur le fond */
  let h=`<div class="pl-overlay"><div class="pl-modal pl-sch-modal">`;
  h+=`<h3>${I.plus} Gérer les champs par sous-catégorie<button class="pl-close" onclick="plCloseSchemaManager()" title="Fermer">×</button></h3>`;
  if(!products.length){
    h+=`<div class="pl-sch-empty">Aucune sous-catégorie. Crées-en une depuis « ＋ Nouveau devis » ou depuis l'onglet CRM.</div>`;
  }else{
    h+=`<div class="pl-sch-list">`;
    products.forEach(prod=>{
      const open=st.openProduct===prod;
      const fields=S.priceLib.schemas[prod]||[];
      const nQuotes=(stats[prod]&&stats[prod].n)||0;
      h+=`<div class="pl-sch-card ${open?'open':''}">`;
      h+=`<div class="pl-sch-hd" onclick="plSchemaTogglePanel(${esc(JSON.stringify(prod))})">`;
      h+=`<span class="pl-sch-chev">${I.chev}</span>`;
      h+=`<span class="pl-sch-name">${esc(prod)}</span>`;
      h+=`<span class="pl-sch-meta">`;
      h+=`<span class="pl-sch-meta-tag">${fields.length} champ${fields.length>1?'s':''}</span>`;
      if(nQuotes)h+=` &nbsp;<span>${nQuotes} devis</span>`;
      h+=`</span>`;
      h+=`</div>`;
      if(open){
        h+=`<div class="pl-sch-body">`;
        if(!fields.length)h+=`<div class="pl-fields-empty" style="margin-bottom:8px">Aucun champ. Ajoute le premier ci-dessous.</div>`;
        fields.forEach((f,idx)=>{
          h+=`<div class="pl-sch-field" ondragover="event.preventDefault();this.classList.add('pl-fdrag-over')" ondragleave="this.classList.remove('pl-fdrag-over')" ondrop="this.classList.remove('pl-fdrag-over');plSchemaFieldDrop(${esc(JSON.stringify(prod))},'${f.id}')">`;
          h+=`<span class="pl-field-grip" draggable="true" ondragstart="plSchemaFieldDragStart(event,${esc(JSON.stringify(prod))},'${f.id}')" ondragend="plSchemaFieldDragEnd()" title="Glisser pour réordonner">${I.grip}</span>`;
          h+=`<input id="pl-sch-name-${esc(f.id)}" type="text" class="pl-sch-fname" value="${esc(f.name)}" onchange="plSchemaRenameField(${esc(JSON.stringify(prod))},'${f.id}',this.value)" placeholder="Nom du champ">`;
          h+=`<span class="pl-sch-ftype">${esc(f.type==='number'?'Nombre':f.type==='date'?'Date':f.type==='select'?'Liste':'Texte')}</span>`;
          if(f.type==='number')h+=`<input id="pl-sch-unit-${esc(f.id)}" type="text" class="pl-sch-funit" value="${esc(f.unit||"")}" onchange="plSchemaSetFieldUnit(${esc(JSON.stringify(prod))},'${f.id}',this.value)" placeholder="Unité">`;
          if(f.type==='select')h+=`<input id="pl-sch-opts-${esc(f.id)}" type="text" class="pl-sch-fopts" value="${esc((f.options||[]).join(', '))}" onchange="plSchemaSetFieldOptions(${esc(JSON.stringify(prod))},'${f.id}',this.value)" placeholder="Options, virgule">`;
          h+=`<button class="pl-sch-act del" onclick="plSchemaDelField(${esc(JSON.stringify(prod))},'${f.id}')" title="Supprimer">×</button>`;
          h+=`</div>`;
        });
        /* Form-builder draft */
        if(st.draft&&st.draft.prod===prod){
          const fd=st.draft;
          h+=`<div class="pl-fielddraft" style="margin-top:10px">`;
          h+=`<div class="pl-fielddraft-row"><input id="pl-sch-draft-name" type="text" class="pl-input" placeholder="Nom du champ (ex. Prix unitaire)" value="${esc(fd.name||"")}" oninput="plSchemaSetDraft('name',this.value);plRenderSchemaModal()"><select class="pl-select" onchange="plSchemaSetDraft('type',this.value);plRenderSchemaModal()"><option value="number" ${fd.type==='number'?'selected':''}>Nombre</option><option value="text" ${fd.type==='text'?'selected':''}>Texte</option><option value="date" ${fd.type==='date'?'selected':''}>Date</option><option value="select" ${fd.type==='select'?'selected':''}>Liste déroulante</option></select></div>`;
          /* Suggestions de champs existants */
          const dQ=(fd.name||"").trim().toLowerCase();
          const inCurrent=new Set((S.priceLib.schemas[prod]||[]).map(f=>(f.name||"").toLowerCase()));
          const suggestions=dQ?plListAllFields().filter(f=>!inCurrent.has(f.name.toLowerCase())&&f.name.toLowerCase().includes(dQ)).slice(0,5):[];
          if(suggestions.length){
            h+=`<div style="margin:6px 0;background:rgba(56,189,248,.04);border:1px solid rgba(56,189,248,.15);border-radius:5px;padding:4px 6px">`;
            h+=`<div style="font-size:9px;color:#5CB8F0;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:2px 4px 4px">${suggestions.length} champ${suggestions.length>1?'s':''} existant${suggestions.length>1?'s':''} — clique pour réutiliser</div>`;
            suggestions.forEach(f=>{
              h+=`<div class="pl-search-item" style="font-size:11px;padding:5px 6px;border-radius:4px;border:none" onmousedown="event.preventDefault();plSchemaPickExistingField(${esc(JSON.stringify(f.name))},${esc(JSON.stringify(f.type))},${esc(JSON.stringify(f.unit))},${esc(JSON.stringify((f.options||[]).join(', ')))})"><strong>${esc(f.name)}</strong> <span style="color:#64748B;font-size:9px">— ${esc(plFieldTypeLabel(f))}</span></div>`;
            });
            h+=`</div>`;
          }
          if(fd.type==='number')h+=`<div class="pl-fielddraft-row"><input id="pl-sch-draft-unit" type="text" class="pl-input" placeholder="Unité (ex. €, m³, mg/L)" value="${esc(fd.unit||"")}" oninput="plSchemaSetDraft('unit',this.value)"></div>`;
          if(fd.type==='select')h+=`<div class="pl-fielddraft-row"><input id="pl-sch-draft-opts" type="text" class="pl-input" placeholder="Options séparées par virgules" value="${esc(fd.options||"")}" oninput="plSchemaSetDraft('options',this.value)"></div>`;
          h+=`<div class="pl-fielddraft-row"><button class="pl-mini-btn cancel" onclick="plSchemaCancelDraft()">Annuler</button><button class="pl-mini-btn" onclick="plSchemaConfirmDraft()">Ajouter le champ</button></div>`;
          if(st.err)h+=`<div class="pl-err">${esc(st.err)}</div>`;
          h+=`</div>`;
        }else{
          h+=`<div class="pl-sch-add"><button class="pl-mini-btn" onclick="plSchemaOpenDraft(${esc(JSON.stringify(prod))})">＋ Ajouter un champ</button></div>`;
        }
        h+=`</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  h+=`<div class="pl-actions"><button class="pl-btn pl-btn-secondary" onclick="plCloseSchemaManager()">Fermer</button></div>`;
  h+=`</div></div>`;
  host.innerHTML=h;
  if(focusId){const el=document.getElementById(focusId);if(el){el.focus();if(focusPos!==null&&typeof el.setSelectionRange==='function'){try{el.setSelectionRange(focusPos,focusPos)}catch(e){}}}}
}

// ▼ rPL — Bibliothèque de prix (vue principale)

  plEnsure();
  const n=S.priceLib.quotes.length;
  const nProds=plListAllProducts().length;
  const filterSup=S.plFilterSup||"";
  const filterProd=S.plFilterProd||"";

  h+=`</div></div>`;
