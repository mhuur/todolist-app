<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌊 Ma Todolist</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#0B1120;min-height:100vh;padding:14px 10px 30px;color:#E2E8F0;font-size:12px}
.container{max-width:720px;margin:0 auto}
.header{text-align:center;margin-bottom:10px}
.header h1{font-size:18px;font-weight:800;color:#fff}
.header .stats{color:#64748B;font-size:10px;margin-top:1px}
.io-btns{margin-top:4px;display:flex;justify-content:center;gap:5px}
.io-btn{border:1px solid #2A3A52;border-radius:5px;padding:2px 8px;font-size:9px;font-weight:600;font-family:inherit;cursor:pointer;background:#162032;color:#64748B;transition:all .15s}
.io-btn:hover{border-color:#38BDF8;color:#38BDF8}
.tabs{display:flex;gap:2px;margin-bottom:8px;background:#162032;border:1px solid #2A3A52;border-radius:8px;padding:2px}
.tab-btn{flex:1;padding:4px 0;border:none;border-radius:6px;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;background:transparent;color:#64748B;white-space:nowrap}
.tab-btn.active{background:#0284C7;color:#fff;box-shadow:0 1px 3px rgba(14,165,233,.3)}
.tab-btn.trash-tab.active{background:#7F1D1D;color:#FCA5A5}
.toolbar{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.toolbar-left{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.filter-btns{display:flex;gap:3px;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:6px;border:none;background:linear-gradient(135deg,#0284C7,#0EA5E9);color:#fff;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;box-shadow:0 1px 4px rgba(14,165,233,.2);transition:all .15s}
.btn-primary:hover{box-shadow:0 2px 8px rgba(14,165,233,.3)}
.btn-sm{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;border:1px solid #2A3A52;background:#162032;color:#64748B}
.btn-sm:hover{border-color:#38BDF8;color:#38BDF8}
.btn-sm.on{border-color:#38BDF8;background:rgba(56,189,248,.1);color:#38BDF8}
.btn-sm.on-grp{border-color:#A78BFA;background:rgba(167,139,250,.1);color:#A78BFA}

.btn-top{border:none;border-radius:3px;padding:1px 6px;font-size:8px;font-weight:800;cursor:pointer;letter-spacing:.4px;font-family:inherit;line-height:1.3}
.btn-top.off{background:#334155;color:#64748B}
.btn-top.on{background:#DC2626;color:#fff;box-shadow:0 0 6px rgba(248,113,113,.3)}
.top-indicator{position:absolute;top:3px;right:3px;background:#DC2626;color:#fff;font-size:7px;font-weight:800;padding:0 4px;border-radius:2px;letter-spacing:.3px;z-index:2;line-height:1.5}

/* Project card */
.project-card{background:#162032;border-radius:10px;border:1px solid #2A3A52;margin-bottom:6px;overflow:hidden}
.project-card.top-project{border-left:3px solid #DC2626}
.project-card.dragging{opacity:.35}
.project-card.drag-over-top{box-shadow:0 -2px 0 0 #38BDF8}
.project-card.drag-over-bot{box-shadow:0 2px 0 0 #38BDF8}
.progress-bar{height:2px;background:#1E293B}
.progress-fill{height:100%;background:linear-gradient(90deg,#34D399,#10B981);transition:width .4s}
.project-header{padding:6px 10px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.drag-handle{cursor:grab;color:#4B5563;display:flex;align-items:center;flex-shrink:0;opacity:.5;transition:opacity .15s}
.drag-handle:hover{opacity:1}
.project-header input{flex:1;border:none;background:transparent;font-size:12px;font-weight:700;font-family:inherit;color:#E2E8F0;outline:none;min-width:0}
.project-meta{padding:0 10px 4px 28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.project-meta label{display:flex;align-items:center;gap:3px;font-size:10px;color:#64748B}
.project-meta input[type="date"]{border-radius:4px;padding:0 4px;font-size:10px;font-family:inherit;font-weight:600;outline:none;cursor:pointer;background:#1E293B;border:1px solid #2A3A52;color:#94A3B8}
.deadline-tag{font-weight:700;font-size:9px}
.done-count{font-size:9px;color:#64748B}
.actions-list{padding:0 10px 6px;display:flex;flex-direction:column;gap:3px}
.project-footer{padding:2px 10px;display:flex;justify-content:flex-end}
.btn-del{border:none;background:transparent;color:#4B5563;cursor:pointer;font-size:9px;font-family:inherit;font-weight:600;padding:2px 5px;border-radius:4px;transition:all .15s;display:inline-flex;align-items:center;gap:2px;opacity:.5}
.btn-del:hover{color:#F87171;background:rgba(248,113,113,.1);opacity:1}

.done-toggle{display:flex;align-items:center;gap:4px;padding:3px 6px;cursor:pointer;font-size:10px;font-weight:600;color:#64748B;user-select:none;border-radius:4px}
.done-toggle:hover{background:#1E293B}

/* Action row (shared for both tabs) */
.arow{display:flex;flex-direction:column;padding:5px 8px;border-radius:7px;transition:all .2s;margin-bottom:2px;position:relative;border:1px solid transparent;cursor:pointer}
.arow.u-high{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.2)}
.arow.u-medium{background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.15)}
.arow.u-low{background:rgba(96,165,250,.06);border-color:rgba(96,165,250,.15)}
.arow.done{opacity:.35;background:#1E293B;border-color:#2A3A52}
.arow.done .a-sum{text-decoration:line-through;color:#4B5563}
.arow.waiting{opacity:.6}
.arow.dragging{opacity:.2}
.arow.drag-over-top{box-shadow:0 -2px 0 0 #38BDF8}
.arow.drag-over-bot{box-shadow:0 2px 0 0 #38BDF8}

.a-top{display:flex;align-items:center;gap:5px;width:100%}
.a-chevron{cursor:pointer;color:#38BDF8;display:flex;align-items:center;transition:transform .15s;flex-shrink:0}
.arow.a-open .a-chevron{transform:rotate(90deg)}
.a-sum{flex:1;border:none;background:transparent;font-family:inherit;font-size:11px;font-weight:600;color:#CBD5E1;outline:none;min-width:0;padding:0}
.a-sum::placeholder{color:#4B5563;font-weight:400}
.a-proj-label{font-size:9px;font-weight:700;color:#94A3B8;flex-shrink:0;white-space:nowrap}
.a-right{display:flex;align-items:center;gap:2px;flex-shrink:0}
.urgency-select{border-radius:4px;padding:1px 3px;font-size:9px;font-weight:700;font-family:inherit;cursor:pointer;outline:none;background:#1E293B;border:1px solid #2A3A52;color:#94A3B8}
.a-date-input{border-radius:3px;padding:0 3px;font-size:9px;font-family:inherit;font-weight:600;outline:none;cursor:pointer;border:1px solid #2A3A52;color:#94A3B8;background:#1E293B}
.a-date-tag{font-weight:700;font-size:8px;flex-shrink:0}
.btn-icon{border:none;border-radius:4px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .12s}
.btn-done{background:#10B981;color:#fff}.btn-done:hover{background:#34D399}
.btn-wait{background:#F59E0B;color:#fff}.btn-wait.active-wait{background:#B45309;box-shadow:inset 0 0 0 1.5px #FDE68A}
.btn-undo{background:#334155;color:#94A3B8}
.btn-trash{background:transparent;color:#4B5563;opacity:.4}.btn-trash:hover{background:rgba(248,113,113,.12);color:#F87171;opacity:1}

/* Detail panel */
.a-detail{display:none;padding:4px 0 0 20px}
.arow.a-open .a-detail{display:block}
.action-body{display:flex;flex-direction:column;gap:2px;position:relative}
.fmt-bar{display:none;align-items:center;gap:2px;flex-wrap:wrap;padding:2px 0;position:relative;animation:fi .12s ease}
.action-body.editing .fmt-bar{display:flex}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.fmt-btn{border:none;border-radius:3px;width:22px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;color:#64748B;font-size:11px;font-family:inherit;transition:all .12s;padding:0}
.fmt-btn:hover{background:rgba(56,189,248,.12);color:#38BDF8}
.fmt-sep{width:1px;height:14px;background:#2A3A52;margin:0 1px}
.fmt-font-select{border:1px solid #2A3A52;border-radius:3px;padding:0 3px;font-size:9px;font-family:inherit;color:#94A3B8;background:#1E293B;outline:none;cursor:pointer;height:20px;max-width:80px}
.hl-popup{position:absolute;top:24px;left:0;background:#1C2A3F;border:1px solid #374863;border-radius:6px;padding:5px;box-shadow:0 4px 12px rgba(0,0,0,.4);display:none;z-index:100;width:170px}
.hl-popup.show{display:block}
.hl-label{font-size:8px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;margin-top:3px}
.hl-label:first-child{margin-top:0}
.hl-row{display:flex;gap:2px;flex-wrap:wrap}
.hl-swatch{width:17px;height:17px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:all .12s}
.hl-swatch:hover{transform:scale(1.15);border-color:#38BDF8}
.hl-swatch.none{background:#334155;position:relative}
.hl-swatch.none::after{content:"✕";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:#64748B}
.action-text{border:none;background:transparent;font-family:inherit;font-size:11px;line-height:1.4;outline:none;min-height:16px;color:#94A3B8;word-break:break-word}
.action-text:empty::before{content:attr(data-placeholder);color:#4B5563}
.action-text img{max-width:100%;max-height:180px;border-radius:5px;margin:3px 0;display:block}
.arow.done .action-text{color:#4B5563;text-decoration:line-through}

.a-wait{font-size:10px;color:#7DD3FC;font-style:italic;padding:2px 0;display:flex;align-items:center;gap:3px}
.a-wait input{border:none;background:transparent;font-family:inherit;font-size:10px;color:#7DD3FC;font-style:italic;outline:none;flex:1}
.a-wait input::placeholder{color:rgba(125,211,252,.4)}

/* Time spent */
.a-time{display:flex;align-items:center;gap:3px;margin-top:2px}
.a-time input[type="number"]{width:45px;border:1px solid #2A3A52;border-radius:3px;padding:1px 3px;font-size:9px;font-family:inherit;font-weight:600;background:#1E293B;color:#94A3B8;outline:none;text-align:right}
.a-time select{border:1px solid #2A3A52;border-radius:3px;padding:1px 3px;font-size:9px;font-family:inherit;font-weight:600;background:#1E293B;color:#94A3B8;outline:none}
.a-time label{font-size:9px;color:#64748B}

.btn-add-action{display:flex;align-items:center;justify-content:center;gap:4px;border:1px dashed #2A3A52;border-radius:6px;padding:3px 0;background:transparent;color:#4B5563;cursor:pointer;font-family:inherit;font-size:10px;font-weight:600;transition:all .15s}
.btn-add-action:hover{border-color:#38BDF8;color:#38BDF8}
.empty-state{text-align:center;padding:24px 14px;color:#4B5563;border:1.5px dashed #2A3A52;border-radius:8px;font-size:11px;line-height:1.6}

/* Urgency groups */
.urgency-group-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:8px 0 2px;display:flex;align-items:center;gap:5px}
.urgency-group-title .line{flex:1;height:1px}
.urgency-group{min-height:4px;padding-bottom:3px}
.urgency-group.drag-over-zone{background:rgba(56,189,248,.05);border-radius:6px}
.project-group-label{font-size:9px;font-weight:700;color:#38BDF8;padding:4px 0 1px;display:flex;align-items:center;gap:4px}
.project-group-label .pgline{flex:1;height:1px;background:#2A3A52}
.chevron{transition:transform .15s;display:inline-flex}
.chevron.open{transform:rotate(90deg)}

/* Trash */
.trash-item{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#162032;border:1px solid #2A3A52;border-radius:6px;margin-bottom:4px}
.trash-item .trash-info{flex:1;min-width:0;font-size:10px;color:#64748B}
.trash-item .trash-info b{color:#E2E8F0}
.btn-restore{border:none;border-radius:4px;padding:3px 8px;font-size:9px;font-weight:700;font-family:inherit;cursor:pointer;background:#10B981;color:#fff}
.btn-purge{border:none;border-radius:4px;padding:3px 8px;font-size:9px;font-weight:700;font-family:inherit;cursor:pointer;background:#EF4444;color:#fff;margin-left:3px}

/* Terminées tab */
.done-item{background:#162032;border:1px solid #2A3A52;border-radius:7px;padding:6px 10px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.done-item .di-info{flex:1;min-width:0}
.done-item .di-title{font-size:11px;font-weight:600;color:#94A3B8;text-decoration:line-through}
.done-item .di-meta{font-size:9px;color:#4B5563;margin-top:1px}
.done-item .di-time{font-size:9px;color:#38BDF8;font-weight:600}

/* Temps tab */
.time-table{width:100%;border-collapse:collapse;font-size:10px}
.time-table th{text-align:left;padding:4px 6px;color:#64748B;font-weight:700;border-bottom:1px solid #2A3A52;font-size:9px;text-transform:uppercase;letter-spacing:.3px}
.time-table td{padding:4px 6px;border-bottom:1px solid #1E293B;color:#94A3B8}
.time-table tr:hover td{background:rgba(56,189,248,.03)}
.time-table .proj-name{color:#E2E8F0;font-weight:600}
.time-table .total-row td{border-top:2px solid #2A3A52;color:#38BDF8;font-weight:700}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.week-nav button{border:1px solid #2A3A52;background:#162032;color:#64748B;border-radius:4px;padding:2px 8px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:600}
.week-nav button:hover{border-color:#38BDF8;color:#38BDF8}
.week-nav span{font-size:11px;color:#94A3B8;font-weight:600}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0B1120}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
</style>
</head>

function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fp(id){return S.projects.find(p=>p.id===id)}
function fa(pid,aid){const p=fp(pid);return p?p.actions.find(a=>a.id===aid):null}
function pN(p){return p.name||"Sans nom"}
function toH(val,unit){if(!val)return 0;if(unit==="m")return val/60;if(unit==="j")return val*8;return val}
function fmtTime(h){if(!h)return"";if(h<1)return Math.round(h*60)+"min";if(h>=8)return(h/8).toFixed(1)+"j";return h.toFixed(1)+"h"}

const IC={plus:`<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,trash:`<svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M5.5 4V3a1 1 0 011-1h3a1 1 0 011 1v1M6.5 7v4M9.5 7v4M4.5 4l.5 9a1 1 0 001 1h4a1 1 0 001-1l.5-9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,check:`<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.5 3.5L13 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,undo:`<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M3 6h7a3 3 0 110 6H8M3 6l3-3M3 6l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,chev:`<svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,folder:`<svg width="12" height="12" viewBox="0 0 20 20" fill="none"><path d="M2 6a2 2 0 012-2h3.172a2 2 0 011.414.586l1.828 1.828A2 2 0 0011.828 7H16a2 2 0 012 2v5a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" stroke="currentColor" stroke-width="1.5"/></svg>`,list:`<svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M2 3h12M2 6.5h12M2 10h12M2 13.5h12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,grip:`<svg width="8" height="12" viewBox="0 0 10 14" fill="none"><circle cx="3" cy="2" r="1" fill="currentColor"/><circle cx="7" cy="2" r="1" fill="currentColor"/><circle cx="3" cy="7" r="1" fill="currentColor"/><circle cx="7" cy="7" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="7" cy="12" r="1" fill="currentColor"/></svg>`,collapse:`<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,pause:`<svg width="9" height="9" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="4" height="12" rx="1" fill="currentColor"/><rect x="9" y="2" width="4" height="12" rx="1" fill="currentColor"/></svg>`,group:`<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="6" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="2" width="6" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="9" width="6" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="9" width="6" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>`,clock:`<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.3"/><path d="M8 4.5V8l2.5 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`};

/* ── Drag ── */
let dT=null,dI=null,dP=null;
function pDS(e,pid){dT="project";dI=pid;e.dataTransfer.effectAllowed="move";const c=e.currentTarget.closest('.project-card');if(c)setTimeout(()=>c.classList.add('dragging'),0)}
function pDE(){dT=null;dI=null;document.querySelectorAll('.project-card').forEach(el=>el.classList.remove('dragging','drag-over-top','drag-over-bot'))}
function pDO(e,pid){if(dT==="project"&&dI!==pid){e.preventDefault();const el=e.currentTarget,r=el.getBoundingClientRect();el.classList.remove('drag-over-top','drag-over-bot');el.classList.add(e.clientY<r.top+r.height/2?'drag-over-top':'drag-over-bot')}else if(dT==="action"&&dP!==pid){e.preventDefault();e.currentTarget.classList.add('drag-over-bot')}}
function pDL(e){e.currentTarget.classList.remove('drag-over-top','drag-over-bot')}
function pDD(e,tid){e.preventDefault();e.currentTarget.classList.remove('drag-over-top','drag-over-bot');if(dT==="project"&&dI&&dI!==tid){const fi=S.projects.findIndex(p=>p.id===dI);if(fi===-1)return;const[m]=S.projects.splice(fi,1);let ti=S.projects.findIndex(p=>p.id===tid);if(e.clientY>=e.currentTarget.getBoundingClientRect().top+e.currentTarget.getBoundingClientRect().height/2)ti++;S.projects.splice(ti,0,m);save();render()}else if(dT==="action"&&dI&&dP!==tid){mvP(dP,dI,tid)}}
function aDS(e,pid,aid){dT="action";dI=aid;dP=pid;e.dataTransfer.effectAllowed="move";e.currentTarget.classList.add('dragging')}
function aDE(){dT=null;dI=null;dP=null;document.querySelectorAll('.arow').forEach(el=>el.classList.remove('dragging','drag-over-top','drag-over-bot'));document.querySelectorAll('.urgency-group').forEach(el=>el.classList.remove('drag-over-zone'))}
function aDO(e,pid,aid){if(dT!=="action"||dI===aid||S.tab==="global")return;e.preventDefault();const el=e.currentTarget,r=el.getBoundingClientRect();el.classList.remove('drag-over-top','drag-over-bot');el.classList.add(e.clientY<r.top+r.height/2?'drag-over-top':'drag-over-bot')}
function aDL(e){e.currentTarget.classList.remove('drag-over-top','drag-over-bot')}
function aDD(e,pid,tid){e.preventDefault();if(dT!=="action"||!dI||dI===tid||S.tab==="global")return;let sP=null,si=-1;S.projects.forEach(p=>{const i=p.actions.findIndex(a=>a.id===dI);if(i!==-1){sP=p;si=i}});if(!sP||si===-1)return;const[m]=sP.actions.splice(si,1);const tp=fp(pid);if(!tp)return;let ti=tp.actions.findIndex(a=>a.id===tid);if(e.clientY>=e.currentTarget.getBoundingClientRect().top+e.currentTarget.getBoundingClientRect().height/2)ti++;tp.actions.splice(ti,0,m);save();render()}
function gDO(e){if(dT!=="action")return;e.preventDefault();e.currentTarget.classList.add('drag-over-zone')}
function gDL(e){e.currentTarget.classList.remove('drag-over-zone')}
function gDD(e,u){e.preventDefault();e.currentTarget.classList.remove('drag-over-zone');if(dT!=="action"||!dI)return;const a=fa(dP,dI);if(a){a.urgency=u;save();render()}}

/* ── Status ── */
function togD(pid,aid){const p=fp(pid);if(!p)return;const i=p.actions.findIndex(a=>a.id===aid);if(i===-1)return;const a=p.actions[i];p.actions.splice(i,1);if(a.status==="done"){a.status="todo";a.doneDate="";const fd=p.actions.findIndex(x=>x.status==="done");fd===-1?p.actions.push(a):p.actions.splice(fd,0,a)}else{a.status="done";a.doneDate=new Date().toISOString().slice(0,10);const fd=p.actions.findIndex(x=>x.status==="done");fd===-1?p.actions.push(a):p.actions.splice(fd,0,a)}save();render()}
function togW(pid,aid){const a=fa(pid,aid);if(!a)return;a.status=a.status==="waiting"?"todo":"waiting";save();render()}
function uWR(pid,aid,v){const a=fa(pid,aid);if(a){a.waitReason=v;save()}}
function uaTitle(pid,aid,v){const a=fa(pid,aid);if(a){a.title=v;save()}}
function uaTime(pid,aid,v){const a=fa(pid,aid);if(a){a.timeVal=parseFloat(v)||0;save()}}
function uaTU(pid,aid,v){const a=fa(pid,aid);if(a){a.timeUnit=v;save()}}
function togX(id){const el=document.getElementById('ar_'+id);if(el){el.classList.toggle('a-open');S.expanded[id]=el.classList.contains('a-open')}}

function delP(id){const p=fp(id);if(!p)return;S.trash.push({type:"project",data:JSON.parse(JSON.stringify(p)),date:Date.now()});S.projects=S.projects.filter(x=>x.id!==id);save();render()}
function delA(pid,aid){const p=fp(pid);if(!p)return;const a=p.actions.find(x=>x.id===aid);if(!a)return;S.trash.push({type:"action",data:JSON.parse(JSON.stringify(a)),pid,pn:pN(p),date:Date.now()});p.actions=p.actions.filter(x=>x.id!==aid);save();render()}
function restT(i){const it=S.trash[i];if(!it)return;if(it.type==="project"){S.projects.push(it.data);S.openProjects[it.data.id]=true}else{const p=fp(it.pid);if(p)p.actions.push(it.data)}S.trash.splice(i,1);save();render()}
function purgeT(i){S.trash.splice(i,1);save();render()}
function emptyT(){S.trash=[];save();render()}
function colAll(){S.projects.forEach(p=>{S.openProjects[p.id]=false});render()}
function togTop(pid){const p=fp(pid);if(p){p.top=!p.top;save();render()}}

/* ── Format ── */
function fC(c,v){document.execCommand(c,false,v||null);sAE()}
function fF(s){document.execCommand('fontName',false,s.value);sAE()}
function sAE(){const el=document.activeElement;if(el&&el.classList.contains('action-text')){const a=fa(el.dataset.pid,el.dataset.aid);if(a){a.text=el.innerHTML;save()}}}
let aHB=null;function tHP(b){const p=b.parentElement.querySelector('.hl-popup');const o=p.classList.contains('show');cAP();if(!o){p.classList.add('show');aHB=b}}
function cAP(){document.querySelectorAll('.hl-popup.show').forEach(p=>p.classList.remove('show'));aHB=null}
function aHL(c,pid,aid){const e=document.querySelector(`.action-text[data-pid="${pid}"][data-aid="${aid}"]`);if(e)e.focus();c==='none'?document.execCommand('removeFormat',false,null):document.execCommand('hiliteColor',false,c);cAP();const a=fa(pid,aid);if(a&&e){a.text=e.innerHTML;save()}}
document.addEventListener('mousedown',e=>{if(aHB&&!e.target.closest('.hl-popup')&&!e.target.closest('.fmt-hl-btn'))cAP()});
function oEF(el){document.querySelectorAll('.action-body.editing').forEach(b=>b.classList.remove('editing'));el.closest('.action-body').classList.add('editing')}
function oEB(el){setTimeout(()=>{if(document.activeElement===el)return;const b=el.closest('.action-body');if(b&&!b.contains(document.activeElement))b.classList.remove('editing')},200)}
function sEd(){document.querySelectorAll('.action-text[contenteditable]').forEach(el=>{if(el._r)return;el._r=true;el.addEventListener('focus',()=>oEF(el));el.addEventListener('blur',()=>oEB(el));el.addEventListener('paste',function(e){const it=e.clipboardData&&e.clipboardData.items;if(!it)return;for(let i=0;i<it.length;i++){if(it[i].type.indexOf('image')!==-1){e.preventDefault();const f=it[i].getAsFile();const r=new FileReader();r.onload=function(ev){const img=document.createElement('img');img.src=ev.target.result;const s=window.getSelection();if(s.rangeCount){const rr=s.getRangeAt(0);rr.deleteContents();rr.insertNode(img);rr.collapse(false)}else el.appendChild(img);const a=fa(el.dataset.pid,el.dataset.aid);if(a){a.text=el.innerHTML;save()}};r.readAsDataURL(f);break}}});el.addEventListener('input',function(){const a=fa(el.dataset.pid,el.dataset.aid);if(a){a.text=el.innerHTML;save()}})})}

/* ── Export/Import ── */
function expD(){const d=localStorage.getItem(SK);if(!d)return;const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download="todolist-backup.json";a.click();URL.revokeObjectURL(u)}
function impD(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const p=JSON.parse(ev.target.result);if(!p.projects)return;if(!confirm("Remplacer toutes les données ?"))return;localStorage.setItem(SK,ev.target.result);location.reload()}catch{}};r.readAsText(f)};inp.click()}

/* ── Helpers ── */
function sortActs(a){const ac=a.filter(x=>x.status!=="done"),dn=a.filter(x=>x.status==="done");ac.sort((x,y)=>{if(UO[x.urgency]!==UO[y.urgency])return UO[x.urgency]-UO[y.urgency];if(x.status==="waiting"&&y.status!=="waiting")return 1;if(x.status!=="waiting"&&y.status==="waiting")return -1;return 0});return{ac,dn}}

function fmtB(pid,aid){let fo=FONTS.map(f=>`<option value="${f.v}">${f.n}</option>`).join('');let fs=HL_F.map(c=>`<div class="hl-swatch" style="background:${c}" onclick="aHL('${c}','${pid}','${aid}')"></div>`).join('');let ps=HL_P.map(c=>`<div class="hl-swatch" style="background:${c}" onclick="aHL('${c}','${pid}','${aid}')"></div>`).join('');return`<div class="fmt-bar"><select class="fmt-font-select" onchange="fF(this)" onmousedown="event.stopPropagation()">${fo}</select><div class="fmt-sep"></div><button class="fmt-btn" onmousedown="event.preventDefault();fC('bold')"><b>G</b></button><button class="fmt-btn" onmousedown="event.preventDefault();fC('italic')"><i>I</i></button><button class="fmt-btn" onmousedown="event.preventDefault();fC('underline')"><u>S</u></button><div class="fmt-sep"></div><button class="fmt-btn fmt-hl-btn" onmousedown="event.preventDefault();tHP(this)"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="1" y="12" width="14" height="3" rx="1" fill="#FBBF24"/><path d="M3.5 10l2-6h1L9 10M4.5 8h3.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg></button><div class="hl-popup"><div class="hl-label">Flash</div><div class="hl-row">${fs}</div><div class="hl-label">Pastel</div><div class="hl-row">${ps}</div><div class="hl-label">Retirer</div><div class="hl-row"><div class="hl-swatch none" onclick="aHL('none','${pid}','${aid}')"></div></div></div></div>`}

function stB(a,pid){const d=a.status==="done",w=a.status==="waiting";let h=`<button class="btn-icon ${d?"btn-undo":"btn-done"}" onclick="event.stopPropagation();togD('${pid}','${a.id}')">${d?IC.undo:IC.check}</button>`;if(!d)h+=`<button class="btn-icon btn-wait ${w?"active-wait":""}" onclick="event.stopPropagation();togW('${pid}','${a.id}')">${IC.pause}</button>`;h+=`<button class="btn-icon btn-trash" onclick="event.stopPropagation();delA('${pid}','${a.id}')">${IC.trash}</button>`;return h}

/* ── Render ── */
function render(){
  const ta=S.projects.reduce((s,p)=>s+p.actions.length,0);
  const td=S.projects.reduce((s,p)=>s+p.actions.filter(a=>a.status==="done").length,0);
  const tw=S.projects.reduce((s,p)=>s+p.actions.filter(a=>a.status==="waiting").length,0);
  let h=`<div class="header"><h1>🌊 Ma Todolist</h1><div class="stats">${S.projects.length} projets · ${td}/${ta} terminées${tw?" · "+tw+" en attente":""}</div>
  <div class="io-btns"><button class="io-btn" onclick="expD()">⬇ Exporter</button><button class="io-btn" onclick="impD()">⬆ Importer</button></div></div>
  <div class="tabs">
    <button class="tab-btn ${S.tab==="projects"?"active":""}" onclick="sT('projects')">Projets</button>
    <button class="tab-btn ${S.tab==="global"?"active":""}" onclick="sT('global')">Vue globale</button>
    <button class="tab-btn ${S.tab==="done"?"active":""}" onclick="sT('done')">Terminées (${td})</button>
    <button class="tab-btn ${S.tab==="time"?"active":""}" onclick="sT('time')">${IC.clock} Temps</button>
    <button class="tab-btn trash-tab ${S.tab==="trash"?"active":""}" onclick="sT('trash')">${IC.trash}</button>
  </div>`;
  if(S.tab==="projects")h+=rPT();else if(S.tab==="global")h+=rGT();else if(S.tab==="done")h+=rDN();else if(S.tab==="time")h+=rTM();else h+=rTR();
  document.getElementById("app").innerHTML=h;requestAnimationFrame(sEd)}

/* ── Shared action row ── */
function rAct(a,pid,showProj){
  const d=a.status==="done",w=a.status==="waiting",adc=dcc(a.deadline),adl=dll(a.deadline);
  const uc=d?"done":w?"waiting":"u-"+a.urgency;
  const bdr=d?"#2A3A52":w?"rgba(125,211,252,.2)":UM[a.urgency].border;
  const p=fp(pid);
  return`<div id="ar_${a.id}" class="arow ${uc} ${S.expanded[a.id]?"a-open":""}" style="border:1px solid ${bdr}" ondragover="aDO(event,'${pid}','${a.id}')" ondragleave="aDL(event)" ondrop="aDD(event,'${pid}','${a.id}')">
  ${p&&p.top?`<span class="top-indicator">TOP</span>`:""}
  <div class="a-top">
    <span class="drag-handle" draggable="true" ondragstart="aDS(event,'${pid}','${a.id}')" ondragend="aDE()">${IC.grip}</span>
    <span class="a-chevron" onclick="togX('${a.id}')">${IC.chev}</span>
    ${showProj?`<span class="a-proj-label">${esc(pN(p))}</span>`:``}
    <input class="a-sum" value="${esc(a.title)}" placeholder="Résumé…" onclick="event.stopPropagation()" oninput="uaTitle('${pid}','${a.id}',this.value)">
    <select class="urgency-select" onchange="uaU('${pid}','${a.id}',this.value)" onclick="event.stopPropagation()"><option value="high" ${a.urgency==="high"?"selected":""}>Haut</option><option value="medium" ${a.urgency==="medium"?"selected":""}>Moyen</option><option value="low" ${a.urgency==="low"?"selected":""}>Faible</option></select>
    <input type="date" class="a-date-input" value="${a.deadline||""}" onchange="uaDL('${pid}','${a.id}',this.value)" onclick="event.stopPropagation()" style="color:${adc}">
    ${adl?`<span class="a-date-tag" style="color:${adc}">${adl}</span>`:""}
    <div class="a-right">${stB(a,pid)}</div>
  </div>
  <div class="a-detail">
    <div class="action-body">${fmtB(pid,a.id)}<div class="action-text" contenteditable="true" data-pid="${pid}" data-aid="${a.id}" data-placeholder="Détails…" onclick="event.stopPropagation()">${a.text||""}</div></div>
    ${w||a.waitReason?`<div class="a-wait">⏸ <input value="${esc(a.waitReason)}" placeholder="Raison attente…" oninput="uWR('${pid}','${a.id}',this.value)" onclick="event.stopPropagation()"></div>`:""}
    <div class="a-time"><label>${IC.clock} Temps :</label><input type="number" value="${a.timeVal||""}" min="0" step="0.5" oninput="uaTime('${pid}','${a.id}',this.value)" onclick="event.stopPropagation()"><select onchange="uaTU('${pid}','${a.id}',this.value)" onclick="event.stopPropagation()"><option value="m" ${a.timeUnit==="m"?"selected":""}>min</option><option value="h" ${a.timeUnit==="h"?"selected":""}>heures</option><option value="j" ${a.timeUnit==="j"?"selected":""}>jours</option></select></div>
  </div></div>`}

/* ── Projects tab ── */
function rPT(){let h=`<div class="toolbar"><div class="toolbar-left"><button class="btn-primary" onclick="addP()">${IC.plus} Projet</button><button class="btn-sm" onclick="colAll()">${IC.collapse} Replier</button></div><div class="filter-btns"><button class="btn-sm ${S.sortDeadline?"on":""}" onclick="ts('deadline')">Deadline</button><button class="btn-sm ${S.sortAlpha?"on":""}" onclick="ts('alpha')">Z-A</button></div></div>`;let ps=[...S.projects];ps.sort((a,b)=>{if(a.top&&!b.top)return -1;if(!a.top&&b.top)return 1;return 0});if(S.sortDeadline)ps.sort((a,b)=>{if(a.top!==b.top)return a.top?-1:1;if(!a.deadline)return 1;if(!b.deadline)return -1;return a.deadline.localeCompare(b.deadline)});if(S.sortAlpha)ps.sort((a,b)=>{if(a.top!==b.top)return a.top?-1:1;return pN(b).localeCompare(pN(a))});if(!ps.length)h+=`<div class="empty-state">Aucun projet</div>`;else ps.forEach(p=>{h+=rP(p)});return h}

function rP(p){const o=S.openProjects[p.id]!==false,t=p.actions.length,d=p.actions.filter(a=>a.status==="done").length,pct=t?d/t*100:0,c=dcc(p.deadline);const{ac,dn}=sortActs(p.actions);const sd=S.showDone[p.id];let ah="";if(o){ah=`<div class="actions-list">`;ac.forEach(a=>{ah+=rAct(a,p.id,false)});if(dn.length){ah+=`<div class="done-toggle" onclick="tSD('${p.id}')"><span class="chevron ${sd?"open":""}">${IC.chev}</span> ${dn.length} terminée${dn.length>1?"s":""}</div>`;if(sd)dn.forEach(a=>{ah+=rAct(a,p.id,false)})}ah+=`<button class="btn-add-action" onclick="addA('${p.id}')">${IC.plus} Action</button></div>`}
return`<div class="project-card ${p.top?"top-project":""}" ondragover="pDO(event,'${p.id}')" ondragleave="pDL(event)" ondrop="pDD(event,'${p.id}')"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="project-header"><span class="drag-handle" draggable="true" ondragstart="pDS(event,'${p.id}')" ondragend="pDE()">${IC.grip}</span><span class="chevron ${o?"open":""}" onclick="tP('${p.id}')">${IC.chev}</span><input value="${esc(p.name)}" placeholder="Nom du projet…" oninput="upNm('${p.id}',this.value)"><button class="btn-top ${p.top?"on":"off"}" onclick="event.stopPropagation();togTop('${p.id}')">TOP</button></div><div class="project-meta"><label>Deadline:<input type="date" value="${p.deadline||""}" onchange="upDl('${p.id}',this.value)"><span class="deadline-tag" style="color:${c}">${dll(p.deadline)}</span></label><span class="done-count">${d}/${t}</span></div>${ah}<div class="project-footer"><button class="btn-del" onclick="delP('${p.id}')">${IC.trash} Supprimer</button></div></div>`}

/* ── Global tab ── */
function rGT(){let h=`<div class="toolbar"><div></div><div class="filter-btns"><button class="btn-sm ${S.groupByProject?"on-grp":""}" onclick="tGP()">${IC.group} Par projet</button></div></div>`;let all=[];S.projects.forEach(p=>{p.actions.forEach(a=>{all.push({...a,pId:p.id,pDl:p.deadline,pTop:p.top})})});if(!all.length){h+=`<div class="empty-state">Aucune action.</div>`;return h}
const gs=[{k:"high",l:"Haute",c:"#F87171",ln:"rgba(248,113,113,.3)"},{k:"medium",l:"Moyenne",c:"#FBBF24",ln:"rgba(251,191,36,.3)"},{k:"low",l:"Faible",c:"#60A5FA",ln:"rgba(96,165,250,.3)"}];
gs.forEach(g=>{let items=all.filter(a=>a.urgency===g.k);items.sort((a,b)=>{const aS=a.status==="done"?2:a.status==="waiting"?1:0,bS=b.status==="done"?2:b.status==="waiting"?1:0;if(aS!==bS)return aS-bS;return S.projects.findIndex(p=>p.id===a.pId)-S.projects.findIndex(p=>p.id===b.pId)});
const ac=items.filter(a=>a.status!=="done"),dn=items.filter(a=>a.status==="done");
h+=`<div class="urgency-group-title" style="color:${g.c}"><span>${g.l} (${items.length})</span><div class="line" style="background:${g.ln}"></div></div>`;
h+=`<div class="urgency-group" ondragover="gDO(event)" ondragleave="gDL(event)" ondrop="gDD(event,'${g.k}')">`;
const rI=list=>{if(S.groupByProject){const bp={};list.forEach(a=>{if(!bp[a.pId])bp[a.pId]=[];bp[a.pId].push(a)});Object.keys(bp).sort((a,b)=>S.projects.findIndex(p=>p.id===a)-S.projects.findIndex(p=>p.id===b)).forEach(k=>{const p=fp(k);h+=`<div class="project-group-label"><span>${esc(pN(p))}${p&&p.top?' <span style="color:#F87171">★</span>':""}</span><div class="pgline"></div></div>`;bp[k].forEach(a=>{h+=rAct(a,a.pId,false)})})}else list.forEach(a=>{h+=rAct(a,a.pId,true)})};
rI(ac);if(dn.length){const so=S["sdg_"+g.k];h+=`<div class="done-toggle" onclick="tSDG('${g.k}')"><span class="chevron ${so?"open":""}">${IC.chev}</span> ${dn.length} terminée${dn.length>1?"s":""}</div>`;if(so)rI(dn)}h+=`</div>`});return h}

/* ── Terminées tab ── */
function rDN(){
  let all=[];S.projects.forEach(p=>{p.actions.forEach(a=>{if(a.status==="done")all.push({...a,pId:p.id})})});
  all.sort((a,b)=>(b.doneDate||"").localeCompare(a.doneDate||""));
  if(!all.length)return`<div class="empty-state">Aucune action terminée.</div>`;
  let h="";let lastDate="";
  all.forEach(a=>{
    const dd=a.doneDate||"Date inconnue";
    if(dd!==lastDate){lastDate=dd;const label=dd==="Date inconnue"?dd:new Date(dd+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short",year:"numeric"});h+=`<div style="font-size:10px;font-weight:700;color:#64748B;padding:8px 0 3px;text-transform:uppercase;letter-spacing:.3px">${label}</div>`}
    const p=fp(a.pId);const th=toH(a.timeVal,a.timeUnit);
    h+=`<div class="done-item">
      <div class="di-info"><div class="di-title">${esc(a.title)||"(sans titre)"}</div><div class="di-meta">${esc(pN(p))}</div></div>
      ${th?`<span class="di-time">${fmtTime(th)}</span>`:""}
      <button class="btn-icon btn-undo" onclick="togD('${a.pId}','${a.id}')" title="Rétablir">${IC.undo}</button>
    </div>`
  });return h}

/* ── Temps tab ── */
function rTM(){
  if(!S.weekOffset)S.weekOffset=0;
  const now=new Date();const mon=new Date(now);mon.setDate(mon.getDate()-mon.getDay()+1+S.weekOffset*7);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(sun.getDate()+6);
  const monS=mon.toISOString().slice(0,10),sunS=sun.toISOString().slice(0,10);
  const label=mon.toLocaleDateString("fr-FR",{day:"numeric",month:"short"})+" – "+sun.toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});

  // Collect done actions in this week
  const byProj={};let grandTotal=0;
  S.projects.forEach(p=>{
    let projH=0;
    p.actions.forEach(a=>{
      if(a.status==="done"&&a.doneDate&&a.doneDate>=monS&&a.doneDate<=sunS){
        projH+=toH(a.timeVal,a.timeUnit);
      }
    });
    if(projH>0){byProj[p.id]={name:pN(p),hours:projH};grandTotal+=projH}
  });

  let h=`<div class="week-nav"><button onclick="S.weekOffset--;render()">◀</button><span>${label}</span><button onclick="S.weekOffset++;render()">▶</button><button onclick="S.weekOffset=0;render()" style="margin-left:4px">Auj.</button></div>`;
  if(!Object.keys(byProj).length){h+=`<div class="empty-state">Aucun temps enregistré cette semaine.</div>`;return h}
  h+=`<table class="time-table"><tr><th>Projet</th><th style="text-align:right">Temps</th></tr>`;
  Object.values(byProj).sort((a,b)=>b.hours-a.hours).forEach(p=>{
    h+=`<tr><td class="proj-name">${esc(p.name)}</td><td style="text-align:right">${fmtTime(p.hours)}</td></tr>`;
  });
  h+=`<tr class="total-row"><td>Total</td><td style="text-align:right">${fmtTime(grandTotal)}</td></tr></table>`;
  return h;
}

/* ── Trash tab ── */
function rTR(){if(!S.trash.length)return`<div class="empty-state">Corbeille vide.</div>`;let h=`<div class="toolbar"><div></div><button class="btn-sm" style="border-color:#F87171;color:#F87171" onclick="if(confirm('Vider ?'))emptyT()">Vider</button></div>`;S.trash.slice().reverse().forEach((it,ri)=>{const i=S.trash.length-1-ri;const m=Math.round((Date.now()-it.date)/60000);const t=m<1?"maintenant":m<60?m+"min":Math.round(m/60)+"h";h+=`<div class="trash-item"><div class="trash-info"><b>${it.type==="project"?"Projet":"Action"}</b> ${esc(it.type==="project"?it.data.name:it.pn)||"?"} · ${t}</div><button class="btn-restore" onclick="restT(${i})">↩</button><button class="btn-purge" onclick="purgeT(${i})">✕</button></div>`});return h}

/* ── Mutations ── */
function sT(t){S.tab=t;render()}
function ts(t){if(t==="deadline"){S.sortDeadline=!S.sortDeadline;S.sortAlpha=false}if(t==="alpha"){S.sortAlpha=!S.sortAlpha;S.sortDeadline=false}render()}
function tGP(){S.groupByProject=!S.groupByProject;render()}
function tSD(pid){S.showDone[pid]=!S.showDone[pid];render()}
function tSDG(k){S["sdg_"+k]=!S["sdg_"+k];render()}
function addP(){const p={id:gid(),number:nn(),name:"",deadline:"",actions:[],top:false};S.projects.push(p);S.openProjects[p.id]=true;S.showDone[p.id]=false;save();render()}
function tP(id){S.openProjects[id]=S.openProjects[id]===false;render()}
function upNm(id,v){const p=fp(id);if(p){p.name=v;save()}}
function upDl(id,v){const p=fp(id);if(p){p.deadline=v;save();render()}}
function addA(pid){const p=fp(pid);if(p){const fd=p.actions.findIndex(a=>a.status==="done");const n={id:gid(),text:"",title:"",urgency:"medium",status:"todo",deadline:"",waitReason:"",timeVal:0,timeUnit:"h",doneDate:""};fd===-1?p.actions.push(n):p.actions.splice(fd,0,n);S.expanded[n.id]=true;save();render()}}
function uaU(pid,aid,v){const a=fa(pid,aid);if(a){a.urgency=v;save();render()}}
function uaDL(pid,aid,v){const a=fa(pid,aid);if(a){a.deadline=v;save();render()}}
function mvP(from,aid,to){if(from===to)return;const s=fp(from);const t=fp(to);if(!s||!t)return;const i=s.actions.findIndex(a=>a.id===aid);if(i===-1)return;const[m]=s.actions.splice(i,1);const fd=t.actions.findIndex(a=>a.status==="done");fd===-1?t.actions.push(m):t.actions.splice(fd,0,m);save();render()}
load();render();
</script>
