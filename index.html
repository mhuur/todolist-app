  S.priceLib.schemas[prod].push(f);
  save();
  plSchemaModalState.draft=null;plSchemaModalState.err="";
  plRenderSchemaModal();
}

// ▼ Édition inline (onchange — pas de re-render à chaque frappe)
function plSchemaRenameField(prod,fieldId,v){
  plEnsure();const arr=S.priceLib.schemas[prod];if(!arr)return;
  const f=arr.find(x=>x.id===fieldId);if(!f)return;
  const nv=(v||"").trim();if(!nv)return;
  if(arr.some(x=>x.id!==fieldId&&x.name.toLowerCase()===nv.toLowerCase())){alert("Ce nom de champ existe déjà");plRenderSchemaModal();return}
  f.name=nv;save();
}
function plSchemaSetFieldUnit(prod,fieldId,v){plEnsure();const arr=S.priceLib.schemas[prod];if(!arr)return;const f=arr.find(x=>x.id===fieldId);if(!f)return;f.unit=(v||"").trim();save()}
function plSchemaSetFieldOptions(prod,fieldId,v){plEnsure();const arr=S.priceLib.schemas[prod];if(!arr)return;const f=arr.find(x=>x.id===fieldId);if(!f)return;f.options=(v||"").split(',').map(s=>s.trim()).filter(Boolean);save();plRenderSchemaModal()}
function plSchemaMoveField(prod,fieldId,dir){
  plEnsure();const arr=S.priceLib.schemas[prod];if(!arr)return;
  const i=arr.findIndex(x=>x.id===fieldId);if(i<0)return;
  const j=i+(dir<0?-1:1);if(j<0||j>=arr.length)return;
  const tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;save();plRenderSchemaModal();
}
function plSchemaDelField(prod,fieldId){
  plEnsure();const arr=S.priceLib.schemas[prod];if(!arr)return;
  const f=arr.find(x=>x.id===fieldId);if(!f)return;
  /* Compter les valeurs orphelines potentielles */
  let used=0;S.priceLib.quotes.forEach(q=>{if(q.product===prod&&q.values&&q.values[fieldId]!==undefined&&q.values[fieldId]!=="")used++});
  let msg=`Supprimer le champ « ${f.name} » de la sous-catégorie « ${prod} » ?`;
  if(used>0)msg+=`\n\n⚠ ${used} devis ont une valeur dans ce champ.\nLes valeurs ne seront plus affichées mais resteront stockées (récupérables si tu recrées le champ).`;
  if(!confirm(msg))return;
  S.priceLib.schemas[prod]=arr.filter(x=>x.id!==fieldId);
  save();plRenderSchemaModal();
}

// ▼ plRenderSchemaModal — modal de gestion des champs par sous-catégorie
function plRenderSchemaModal(){
  const host=document.getElementById('pl-host');
  if(!host)return;
  if(!plSchemaModalState){host.innerHTML="";return}
  const active=document.activeElement;
  const focusId=(active&&active.id&&active.id.startsWith('pl-sch-'))?active.id:null;
  const focusPos=(focusId&&typeof active.selectionStart==='number')?active.selectionStart:null;
  plEnsure();
  const st=plSchemaModalState;
  const products=plListAllProducts();
  /* Stats par sous-cat */
  const stats={};
  S.priceLib.quotes.forEach(q=>{if(!q.product)return;if(!stats[q.product])stats[q.product]={n:0};stats[q.product].n++});
  let h=`<div class="pl-overlay" onclick="if(event.target===this)plCloseSchemaManager()"><div class="pl-modal pl-sch-modal">`;
  h+=`<h3>${I.plus} Gérer les champs par sous-catégorie<button class="pl-close" onclick="plCloseSchemaManager()" title="Fermer">×</button></h3>`;
  if(!products.length){
    h+=`<div class="pl-sch-empty">Aucune sous-catégorie. Crées-en une depuis « ＋ Nouveau devis » ou depuis l'onglet CRM.</div>`;
  }else{
    h+=`<div class="pl-sch-list">`;
    products.forEach(prod=>{
      const open=st.openProduct===prod;
      const fields=S.priceLib.schemas[prod]||[];
      const nQuotes=(stats[prod]&&stats[prod].n)||0;
      h+=`<div class="pl-sch-card ${open?'open':''}">`;
      h+=`<div class="pl-sch-hd" onclick="plSchemaTogglePanel(${esc(JSON.stringify(prod))})">`;
      h+=`<span class="pl-sch-chev">${I.chev}</span>`;
      h+=`<span class="pl-sch-name">${esc(prod)}</span>`;
      h+=`<span class="pl-sch-meta">`;
      h+=`<span class="pl-sch-meta-tag">${fields.length} champ${fields.length>1?'s':''}</span>`;
      if(nQuotes)h+=` &nbsp;<span>${nQuotes} devis</span>`;
      h+=`</span>`;
      h+=`</div>`;
      if(open){
        h+=`<div class="pl-sch-body">`;
        if(!fields.length)h+=`<div class="pl-fields-empty" style="margin-bottom:8px">Aucun champ. Ajoute le premier ci-dessous.</div>`;
        fields.forEach((f,idx)=>{
          h+=`<div class="pl-sch-field">`;
          h+=`<input id="pl-sch-name-${esc(f.id)}" type="text" class="pl-sch-fname" value="${esc(f.name)}" onchange="plSchemaRenameField(${esc(JSON.stringify(prod))},'${f.id}',this.value)" placeholder="Nom du champ">`;
          h+=`<span class="pl-sch-ftype">${esc(f.type==='number'?'Nombre':f.type==='date'?'Date':f.type==='select'?'Liste':'Texte')}</span>`;
          if(f.type==='number')h+=`<input id="pl-sch-unit-${esc(f.id)}" type="text" class="pl-sch-funit" value="${esc(f.unit||"")}" onchange="plSchemaSetFieldUnit(${esc(JSON.stringify(prod))},'${f.id}',this.value)" placeholder="Unité">`;
          if(f.type==='select')h+=`<input id="pl-sch-opts-${esc(f.id)}" type="text" class="pl-sch-fopts" value="${esc((f.options||[]).join(', '))}" onchange="plSchemaSetFieldOptions(${esc(JSON.stringify(prod))},'${f.id}',this.value)" placeholder="Options, virgule">`;
          h+=`<div class="pl-sch-actions">`;
          h+=`<button class="pl-sch-act" onclick="plSchemaMoveField(${esc(JSON.stringify(prod))},'${f.id}',-1)" ${idx===0?'disabled':''} title="Monter">▲</button>`;
          h+=`<button class="pl-sch-act" onclick="plSchemaMoveField(${esc(JSON.stringify(prod))},'${f.id}',1)" ${idx===fields.length-1?'disabled':''} title="Descendre">▼</button>`;
          h+=`<button class="pl-sch-act del" onclick="plSchemaDelField(${esc(JSON.stringify(prod))},'${f.id}')" title="Supprimer">×</button>`;
          h+=`</div>`;
          h+=`</div>`;
        });
        /* Form-builder draft */
        if(st.draft&&st.draft.prod===prod){
          const fd=st.draft;
          h+=`<div class="pl-fielddraft" style="margin-top:10px">`;
          h+=`<div class="pl-fielddraft-row"><input id="pl-sch-draft-name" type="text" class="pl-input" placeholder="Nom du champ (ex. Prix unitaire)" value="${esc(fd.name||"")}" oninput="plSchemaSetDraft('name',this.value);plRenderSchemaModal()"><select class="pl-select" onchange="plSchemaSetDraft('type',this.value);plRenderSchemaModal()"><option value="number" ${fd.type==='number'?'selected':''}>Nombre</option><option value="text" ${fd.type==='text'?'selected':''}>Texte</option><option value="date" ${fd.type==='date'?'selected':''}>Date</option><option value="select" ${fd.type==='select'?'selected':''}>Liste déroulante</option></select></div>`;
          /* Suggestions de champs existants */
          const dQ=(fd.name||"").trim().toLowerCase();
          const inCurrent=new Set((S.priceLib.schemas[prod]||[]).map(f=>(f.name||"").toLowerCase()));
          const suggestions=dQ?plListAllFields().filter(f=>!inCurrent.has(f.name.toLowerCase())&&f.name.toLowerCase().includes(dQ)).slice(0,5):[];
          if(suggestions.length){
            h+=`<div style="margin:6px 0;background:rgba(56,189,248,.04);border:1px solid rgba(56,189,248,.15);border-radius:5px;padding:4px 6px">`;
            h+=`<div style="font-size:9px;color:#5CB8F0;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:2px 4px 4px">${suggestions.length} champ${suggestions.length>1?'s':''} existant${suggestions.length>1?'s':''} — clique pour réutiliser</div>`;
            suggestions.forEach(f=>{
              h+=`<div class="pl-search-item" style="font-size:11px;padding:5px 6px;border-radius:4px;border:none" onmousedown="event.preventDefault();plSchemaPickExistingField(${esc(JSON.stringify(f.name))},${esc(JSON.stringify(f.type))},${esc(JSON.stringify(f.unit))},${esc(JSON.stringify((f.options||[]).join(', ')))})"><strong>${esc(f.name)}</strong> <span style="color:#64748B;font-size:9px">— ${esc(plFieldTypeLabel(f))}</span></div>`;
            });
            h+=`</div>`;
          }
          if(fd.type==='number')h+=`<div class="pl-fielddraft-row"><input id="pl-sch-draft-unit" type="text" class="pl-input" placeholder="Unité (ex. €, m³, mg/L)" value="${esc(fd.unit||"")}" oninput="plSchemaSetDraft('unit',this.value)"></div>`;
          if(fd.type==='select')h+=`<div class="pl-fielddraft-row"><input id="pl-sch-draft-opts" type="text" class="pl-input" placeholder="Options séparées par virgules" value="${esc(fd.options||"")}" oninput="plSchemaSetDraft('options',this.value)"></div>`;
          h+=`<div class="pl-fielddraft-row"><button class="pl-mini-btn cancel" onclick="plSchemaCancelDraft()">Annuler</button><button class="pl-mini-btn" onclick="plSchemaConfirmDraft()">Ajouter le champ</button></div>`;
          if(st.err)h+=`<div class="pl-err">${esc(st.err)}</div>`;
          h+=`</div>`;
        }else{
          h+=`<div class="pl-sch-add"><button class="pl-mini-btn" onclick="plSchemaOpenDraft(${esc(JSON.stringify(prod))})">＋ Ajouter un champ</button></div>`;
        }
        h+=`</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  h+=`<div class="pl-actions"><button class="pl-btn pl-btn-secondary" onclick="plCloseSchemaManager()">Fermer</button></div>`;
  h+=`</div></div>`;
  host.innerHTML=h;
  if(focusId){const el=document.getElementById(focusId);if(el){el.focus();if(focusPos!==null&&typeof el.setSelectionRange==='function'){try{el.setSelectionRange(focusPos,focusPos)}catch(e){}}}}
}

// ▼ rPL — Bibliothèque de prix (vue principale)
function rPL(){
  plEnsure();
  const n=S.priceLib.quotes.length;
  const nProds=plListAllProducts().length;
  const filterSup=S.plFilterSup||"";
  const filterProd=S.plFilterProd||"";
  const sup=filterSup?S.crm.suppliers.find(s=>s.id===filterSup):null;
  let h=`<div class="bar"><div class="bar-l"><button class="bp" onclick="plOpenNewQuote()">${I.plus} Nouveau devis</button>`;
  /* Bouton contextuel : ajouter une ligne du même type qu'affiché */
  if(filterProd){
    const ctxLbl=filterSup?`Ajouter ${esc(sup?sup.name:"?")} / ${esc(filterProd)}`:`Ajouter dans « ${esc(filterProd)} »`;
    h+=`<button class="bp" style="margin-left:6px" onclick="plOpenNewQuote(${esc(JSON.stringify(filterSup||""))},${esc(JSON.stringify(filterProd))})">${I.plus} ${ctxLbl}</button>`;
  }
  if(nProds)h+=`<button class="bs" onclick="plOpenSchemaManager()" title="Gérer les champs par sous-catégorie">Champs (${nProds})</button>`;
  h+=`</div><div class="bar-r"></div></div>`;
  if(!n){
    h+=`<div class="es">Aucun devis enregistré. Clique sur « ＋ Nouveau devis » pour commencer.</div>`;
    return h;
  }
  /* Toolbar : filtres */
  const sups=[...S.crm.suppliers].sort((a,b)=>a.name.localeCompare(b.name));
  /* Sous-cats disponibles dans le filtre : si fournisseur sélectionné, ses produits ; sinon toutes les sous-cats existantes dans les devis */
  let prodChoices=[];
  if(sup)prodChoices=[...sup.products].sort((a,b)=>a.localeCompare(b));
  else{const set=new Set();S.priceLib.quotes.forEach(q=>{if(q.product)set.add(q.product)});prodChoices=[...set].sort((a,b)=>a.localeCompare(b))}
  h+=`<div class="pl-toolbar">`;
  h+=`<div class="pl-tb-grp"><span class="pl-tb-label">Fournisseur</span><select class="pl-tb-select" onchange="plSetFilterSup(this.value)"><option value="">Tous</option>`;
  sups.forEach(s=>{h+=`<option value="${esc(s.id)}" ${filterSup===s.id?'selected':''}>${esc(s.name)}</option>`});
  h+=`</select></div>`;
  h+=`<div class="pl-tb-grp"><span class="pl-tb-label">Sous-catégorie</span><select class="pl-tb-select" onchange="plSetFilterProd(this.value)"><option value="">Toutes</option>`;
  prodChoices.forEach(p=>{h+=`<option value="${esc(p)}" ${filterProd===p?'selected':''}>${esc(p)}</option>`});
  h+=`</select></div>`;
  if(filterSup||filterProd||S.plSortBy||(S.plSearch&&Object.keys(S.plSearch).some(k=>S.plSearch[k])))h+=`<button class="pl-tb-reset" onclick="plResetFilters()">Réinitialiser</button>`;
  h+=`<span class="pl-tb-count" id="pl-count">${n} devis</span>`;
  h+=`</div>`;
  h+=`<div class="pl-table-wrap"><div id="pl-table-host"></div></div>`;
  requestAnimationFrame(plRenderTable);
  return h;
}

// ▼ plRenderModal — injecte le modal dans #pl-host (avec focus restore pour préserver les inputs)
function plRenderModal(){
  const host=document.getElementById('pl-host');
  if(!host)return;
  if(!plModalState){host.innerHTML="";return}
  const active=document.activeElement;
  const focusId=(active&&active.id&&active.id.startsWith('pl-'))?active.id:null;
  const focusPos=(focusId&&typeof active.selectionStart==='number')?active.selectionStart:null;
  const st=plModalState;
  const refPreview=(st.date&&st.supplierId)?(()=>{const s=S.crm.suppliers.find(x=>x.id===st.supplierId);return s?plGenerateRef(st.date,s.name):""})():"";
  let h=`<div class="pl-overlay" onclick="if(event.target===this)plCloseModal()"><div class="pl-modal">`;
  const isEdit=!!st.editingId;
  let refToShow=refPreview;
  if(isEdit){const q=S.priceLib.quotes.find(x=>x.id===st.editingId);if(q&&q.ref)refToShow=q.ref}
  h+=`<h3>${I.plus} ${isEdit?'Éditer le devis':'Nouveau devis'}${refToShow?`<span class="pl-ref">${esc(refToShow)}</span>`:""}<button class="pl-close" onclick="plCloseModal()" title="Fermer">×</button></h3>`;
  /* Date — onchange (pas oninput) : sinon le widget date est réinitialisé à chaque keystroke et la saisie est impossible */
  h+=`<div class="pl-row"><label class="pl-lbl">Date du devis</label><input id="pl-date" type="date" class="pl-input" value="${esc(st.date||"")}" onchange="plSetField('date',this.value);plRenderModal()"></div>`;
  /* Fournisseur — recherche live + création inline */
  h+=`<div class="pl-row"><label class="pl-lbl">Fournisseur</label>`;
  if(st.supplierId){
    const sup=S.crm.suppliers.find(s=>s.id===st.supplierId);
    h+=`<div class="pl-pill-row"><span class="pl-pill"><span>${esc(sup?sup.name:"?")}</span><button class="pl-pill-clear" onclick="plClearSupplier()" title="Changer">×</button></span></div>`;
  }else{
    const q=(st.supplierQuery||"").trim();
    const ql=q.toLowerCase();
    const presetProd=st.product||"";
    const presetProdL=presetProd.toLowerCase();
    /* Si une sous-cat est preset, on sépare en 2 groupes : ceux qui la proposent, et les autres CRM (dont le pick auto-linkera la sous-cat) */
    let primary=[],secondary=[];
    S.crm.suppliers.forEach(s=>{
      if(ql&&!s.name.toLowerCase().includes(ql))return;
      if(presetProd){
        if(s.products.some(p=>p.toLowerCase()===presetProdL))primary.push(s);
        else secondary.push(s);
      }else primary.push(s);
    });
    primary.sort((a,b)=>a.name.localeCompare(b.name));
    secondary.sort((a,b)=>a.name.localeCompare(b.name));
    const totalMatches=primary.length+secondary.length;
    const exact=q&&S.crm.suppliers.some(s=>s.name.toLowerCase()===ql);
    h+=`<input id="pl-sup-search" type="text" class="pl-input" placeholder="${presetProd?`Fournisseurs qui proposent « ${esc(presetProd)} »…`:'Rechercher ou créer un fournisseur…'}" value="${esc(q)}" oninput="plSearchSupplier(this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();plPickSupplierEnter()}" autocomplete="off">`;
    h+=`<div class="pl-search-list">`;
    if(!totalMatches&&!q)h+=`<div class="pl-search-list-empty">Aucun fournisseur. Tape un nom pour en créer un.</div>`;
    /* Groupe 1 : proposent déjà */
    let shown=0;
    primary.slice(0,8).forEach(s=>{h+=`<div class="pl-search-item" onmousedown="event.preventDefault();plPickSupplier('${s.id}')">${esc(s.name)}</div>`;shown++});
    if(primary.length>8)h+=`<div class="pl-search-list-empty">+ ${primary.length-8} autre(s) qui proposent « ${esc(presetProd)} »… affine ta recherche</div>`;
    /* Groupe 2 : CRM mais ne proposent pas encore — afficher avec mention "ajoute la sous-cat" */
    if(presetProd&&secondary.length){
      const remaining=Math.max(0,8-shown);
      if(primary.length)h+=`<div class="pl-search-list-empty" style="text-align:left;padding:6px 10px;font-size:9px;text-transform:uppercase;letter-spacing:.4px">Autres fournisseurs CRM (ajoutera « ${esc(presetProd)} »)</div>`;
      secondary.slice(0,remaining||4).forEach(s=>{h+=`<div class="pl-search-item" onmousedown="event.preventDefault();plPickSupplier('${s.id}')"><span>${esc(s.name)}</span> <span style="color:#475569;font-size:9px;font-style:italic">→ ajoute la sous-cat</span></div>`});
      if(secondary.length>(remaining||4))h+=`<div class="pl-search-list-empty">+ ${secondary.length-(remaining||4)} autre(s)… affine ta recherche</div>`;
    }
    if(q&&!exact)h+=`<div class="pl-search-item create" onmousedown="event.preventDefault();plCreateAndPickSupplier(${esc(JSON.stringify(q))})">＋ Créer « ${esc(q)} »${presetProd?` (avec « ${esc(presetProd)} »)`:''}</div>`;
    h+=`</div>`;
  }
  h+=`</div>`;
  /* Sous-catégorie — recherche live filtrée par fournisseur, création inline */
  if(st.supplierId){
    const sup=S.crm.suppliers.find(s=>s.id===st.supplierId);
    h+=`<div class="pl-row"><label class="pl-lbl">Sous-catégorie</label>`;
    if(st.product){
      h+=`<div class="pl-pill-row"><span class="pl-pill"><span>${esc(st.product)}</span><button class="pl-pill-clear" onclick="plClearProduct()" title="Changer">×</button></span></div>`;
    }else{
      const q=(st.productQuery||"").trim();
      const ql=q.toLowerCase();
      const prods=sup?sup.products:[];
      const matches=prods.filter(p=>!ql||p.toLowerCase().includes(ql)).sort((a,b)=>a.localeCompare(b));
      const exact=q&&prods.some(p=>p.toLowerCase()===ql);
      h+=`<input id="pl-prod-search" type="text" class="pl-input" placeholder="Rechercher ou créer une sous-catégorie…" value="${esc(q)}" oninput="plSearchProduct(this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();plPickProductEnter()}" autocomplete="off">`;
      h+=`<div class="pl-search-list">`;
      if(!matches.length&&!q)h+=`<div class="pl-search-list-empty">Aucune sous-catégorie pour ce fournisseur. Tape un nom pour en créer une.</div>`;
      matches.slice(0,8).forEach(p=>{h+=`<div class="pl-search-item" onmousedown="event.preventDefault();plPickProduct(${esc(JSON.stringify(p))})">${esc(p)}</div>`});
      if(matches.length>8)h+=`<div class="pl-search-list-empty">+ ${matches.length-8} autre(s)… affine ta recherche</div>`;
      if(q&&!exact)h+=`<div class="pl-search-item create" onmousedown="event.preventDefault();plCreateAndPickProduct(${esc(JSON.stringify(q))})">＋ Créer « ${esc(q)} »</div>`;
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  /* Formulaire dynamique */
  if(st.product){
    plEnsure();
    const schema=S.priceLib.schemas[st.product]||[];
    h+=`<div class="pl-fields"><div class="pl-fields-hd">Champs « ${esc(st.product)} »</div>`;
    if(!schema.length&&!st.fieldDraft)h+=`<div class="pl-fields-empty">Aucun champ défini. Ajoute un premier champ ci-dessous.</div>`;
    schema.forEach(f=>{
      const v=st.values[f.id]||"";
      h+=`<div class="pl-field-row"><label>${esc(f.name)}</label>`;
      if(f.type==='number'){
        h+=`<input id="pl-val-${esc(f.id)}" type="number" step="any" class="pl-input" value="${esc(v)}" oninput="plSetValue('${f.id}',this.value)">`;
        if(f.unit)h+=`<span class="pl-unit">${esc(f.unit)}</span>`;
      }else if(f.type==='date'){
        h+=`<input id="pl-val-${esc(f.id)}" type="date" class="pl-input" value="${esc(v)}" oninput="plSetValue('${f.id}',this.value)">`;
      }else if(f.type==='select'){
        h+=`<select id="pl-val-${esc(f.id)}" class="pl-select" onchange="plSetValue('${f.id}',this.value)"><option value="">—</option>`;
        (f.options||[]).forEach(o=>{h+=`<option value="${esc(o)}" ${v===o?'selected':''}>${esc(o)}</option>`});
        h+=`</select>`;
      }else{
        h+=`<input id="pl-val-${esc(f.id)}" type="text" class="pl-input" value="${esc(v)}" oninput="plSetValue('${f.id}',this.value)">`;
      }
      h+=`<button class="pl-field-del" onclick="plDelField('${f.id}')" title="Supprimer ce champ">×</button></div>`;
    });
    if(st.fieldDraft){
      const fd=st.fieldDraft;
      h+=`<div class="pl-fielddraft">`;
      /* Input nom + type — re-render après chaque caractère pour rafraîchir les suggestions */
      h+=`<div class="pl-fielddraft-row"><input id="pl-draft-name" type="text" class="pl-input" placeholder="Nom du champ (ex. Prix unitaire)" value="${esc(fd.name||"")}" oninput="plSetDraftField('name',this.value);plRenderModal()"><select class="pl-select" onchange="plSetDraftField('type',this.value);plRenderModal()"><option value="number" ${fd.type==='number'?'selected':''}>Nombre</option><option value="text" ${fd.type==='text'?'selected':''}>Texte</option><option value="date" ${fd.type==='date'?'selected':''}>Date</option><option value="select" ${fd.type==='select'?'selected':''}>Liste déroulante</option></select></div>`;
      /* Suggestions de champs existants (autres sous-cats) */
      const dQ=(fd.name||"").trim().toLowerCase();
      const inCurrent=new Set((S.priceLib.schemas[st.product]||[]).map(f=>(f.name||"").toLowerCase()));
      const suggestions=dQ?plListAllFields().filter(f=>!inCurrent.has(f.name.toLowerCase())&&f.name.toLowerCase().includes(dQ)).slice(0,5):[];
      if(suggestions.length){
        h+=`<div style="margin:6px 0;background:rgba(56,189,248,.04);border:1px solid rgba(56,189,248,.15);border-radius:5px;padding:4px 6px">`;
        h+=`<div style="font-size:9px;color:#5CB8F0;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:2px 4px 4px">${suggestions.length} champ${suggestions.length>1?'s':''} existant${suggestions.length>1?'s':''} — clique pour réutiliser</div>`;
        suggestions.forEach(f=>{
          h+=`<div class="pl-search-item" style="font-size:11px;padding:5px 6px;border-radius:4px;border:none" onmousedown="event.preventDefault();plPickExistingField(${esc(JSON.stringify(f.name))},${esc(JSON.stringify(f.type))},${esc(JSON.stringify(f.unit))},${esc(JSON.stringify((f.options||[]).join(', ')))})"><strong>${esc(f.name)}</strong> <span style="color:#64748B;font-size:9px">— ${esc(plFieldTypeLabel(f))}</span></div>`;
        });
        h+=`</div>`;
      }
      if(fd.type==='number')h+=`<div class="pl-fielddraft-row"><input id="pl-draft-unit" type="text" class="pl-input" placeholder="Unité (ex. €, m³, mg/L)" value="${esc(fd.unit||"")}" oninput="plSetDraftField('unit',this.value)"></div>`;
      if(fd.type==='select')h+=`<div class="pl-fielddraft-row"><input id="pl-draft-options" type="text" class="pl-input" placeholder="Options séparées par virgules (ex. Standard, Premium)" value="${esc(fd.options||"")}" oninput="plSetDraftField('options',this.value)"></div>`;
      h+=`<div class="pl-fielddraft-row"><button class="pl-mini-btn cancel" onclick="plCancelFieldDraft()">Annuler</button><button class="pl-mini-btn" onclick="plConfirmFieldDraft()">Ajouter le champ</button></div>`;
      h+=`</div>`;
    }else{
      h+=`<div style="margin-top:8px"><button class="pl-mini-btn" onclick="plOpenFieldDraft()">＋ Ajouter un champ</button></div>`;
    }
    h+=`</div>`;
  }
  if(st.err)h+=`<div class="pl-err">${esc(st.err)}</div>`;
  /* Actions */
  const canSave=st.date&&st.supplierId&&st.product;
  h+=`<div class="pl-actions"><button class="pl-btn pl-btn-secondary" onclick="plCloseModal()">Annuler</button><button class="pl-btn pl-btn-primary" ${canSave?'':'disabled'} onclick="plSaveQuote()">Enregistrer</button></div>`;
  h+=`</div></div>`;
  host.innerHTML=h;
  /* Focus restore après re-render */
  if(focusId){
    const el=document.getElementById(focusId);
    if(el){el.focus();if(focusPos!==null&&typeof el.setSelectionRange==='function'){try{el.setSelectionRange(focusPos,focusPos)}catch(e){}}}
  }else{
    /* Auto-focus sur la première search visible si rien n'est focused */
    const auto=document.getElementById('pl-sup-search')||document.getElementById('pl-prod-search')||document.getElementById('pl-draft-name');
    if(auto)auto.focus();
  }
}

/* ── Feedback / Notes ── */
function rFB(){
  if(!S.feedback||!Array.isArray(S.feedback.items))S.feedback={items:[]};
  let h=`<div class="fb-bar"><div class="fb-title">Notes & Remarques</div><button class="fb-copy-btn" onclick="fbCopy()" id="fb-copy-btn">📋 Copier les actions en cours</button></div>`;
  h+=`<div class="fb-subtitle">Note ici les remarques ou bugs à transmettre à Claude. Chaque action peut recevoir des étapes complémentaires, être validée ou supprimée.</div>`;
  h+=`<div class="add-row" style="position:static"><input id="fb-input" placeholder="Nouvelle action / remarque…" value="${esc(S.fbQ||"")}" oninput="S.fbQ=this.value" onkeydown="if(event.key==='Enter'){event.preventDefault();fbAdd()}"><button onclick="fbAdd()">＋</button></div>`;
  const items=[...S.feedback.items].sort((a,b)=>{if(!!a.validated!==!!b.validated)return a.validated?1:-1;return (b.createdAt||0)-(a.createdAt||0)});
  if(!items.length)h+=`<div class="es">Aucune note pour l'instant.</div>`;
  items.forEach(it=>{
    h+=`<div class="fb-card ${it.validated?"fb-done":""}">`;
    h+=`<div class="fb-hd">`;
    h+=`<button class="fb-check ${it.validated?"on":""}" onclick="fbToggleValid('${it.id}')" title="${it.validated?"Marquer en cours":"Valider"}">${I.check}</button>`;
    h+=`<input class="fb-text" value="${esc(it.text||"")}" placeholder="Note…" oninput="fbUpdateText('${it.id}',this.value)">`;
    h+=`<button class="fb-del" onclick="fbDel('${it.id}')" title="Supprimer">${I.trash}</button>`;
    h+=`</div>`;
    (it.steps||[]).forEach((st,idx)=>{
      h+=`<div class="fb-step"><span class="fb-step-bul">↳</span><input class="fb-step-text" data-fb-step="${it.id}-${idx}" value="${esc(st||"")}" placeholder="Étape complémentaire…" oninput="fbUpdateStep('${it.id}',${idx},this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();fbAddStep('${it.id}')}"><button class="fb-step-del" onclick="fbDelStep('${it.id}',${idx})" title="Supprimer étape">✕</button></div>`;
    });
    h+=`<button class="fb-add-step" onclick="fbAddStep('${it.id}')">＋ étape</button>`;
    h+=`</div>`;
  });
  return h;
}
function fbAdd(){const t=(S.fbQ||"").trim();if(!t)return;if(!S.feedback||!Array.isArray(S.feedback.items))S.feedback={items:[]};S.feedback.items.unshift({id:gid(),text:t,steps:[],validated:false,createdAt:Date.now()});S.fbQ="";save();render();requestAnimationFrame(()=>{const el=document.getElementById('fb-input');if(el)el.focus()})}
function fbDel(id){S.feedback.items=S.feedback.items.filter(x=>x.id!==id);save();render()}
function fbToggleValid(id){const it=S.feedback.items.find(x=>x.id===id);if(!it)return;it.validated=!it.validated;save();render()}
function fbUpdateText(id,v){const it=S.feedback.items.find(x=>x.id===id);if(!it)return;it.text=v;save()}
function fbAddStep(id){const it=S.feedback.items.find(x=>x.id===id);if(!it)return;if(!it.steps)it.steps=[];it.steps.push("");save();render();requestAnimationFrame(()=>{const els=document.querySelectorAll(`[data-fb-step^="${id}-"]`);if(els.length)els[els.length-1].focus()})}
function fbUpdateStep(id,idx,v){const it=S.feedback.items.find(x=>x.id===id);if(!it||!it.steps)return;it.steps[idx]=v;save()}
function fbDelStep(id,idx){const it=S.feedback.items.find(x=>x.id===id);if(!it||!it.steps)return;it.steps.splice(idx,1);save();render()}
function fbBuildText(){const items=(S.feedback.items||[]).filter(it=>!it.validated&&(it.text||"").trim());if(!items.length)return"";let txt="";items.forEach((it,i)=>{txt+=`${i+1}. ${(it.text||"").trim()}\n`;(it.steps||[]).forEach(s=>{const st=(s||"").trim();if(st)txt+=`   - ${st}\n`})});return txt.trimEnd()}
function fbCopy(){const txt=fbBuildText();const btn=document.getElementById('fb-copy-btn');if(!txt){if(btn){const old=btn.textContent;btn.textContent="Aucune action en cours";setTimeout(()=>{btn.textContent=old},1500)}return}const done=()=>{if(btn){const old=btn.textContent;btn.textContent="✓ Copié !";btn.classList.add("copied");setTimeout(()=>{btn.textContent=old;btn.classList.remove("copied")},1800)}};if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(()=>fbCopyFallback(txt,done))}else{fbCopyFallback(txt,done)}}
function fbCopyFallback(txt,done){try{const ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done()}catch(e){prompt("Copie manuellement :",txt)}}

function addP(){const p={id:gid(),number:1,name:"",deadline:"",actions:[],tasks:[]};S.projects.push(p);S.openProjects[p.id]=true;save();render()}
function tP(id){S.openProjects[id]=S.openProjects[id]===false;render()}
function upNm(id,v){const p=fp(id);if(p){p.name=v;save()}}
function upDl(id,v){const p=fp(id);if(p){p.deadline=v;save();render()}}
function addA(pid){const p=fp(pid);if(!p)return;const n={id:gid(),text:"",title:"",urgency:"medium",status:"todo",deadline:"",waitReason:"",timeH:0,doneDate:"",taskId:"",paused:false,priority:false};p.actions.push(n);S.ex[n.id]=true;save();render()}
function uaU(pid,aid,v){const a=fa(pid,aid);if(a){a.urgency=v;save();render()}}
function uaDL(pid,aid,v){const a=fa(pid,aid);if(a){a.deadline=v;save();render()}}
function mvAP(from,aid,to){if(from===to)return;const s=fp(from);const t=fp(to);if(!s||!t)return;const i=s.actions.findIndex(a=>a.id===aid);if(i===-1)return;const[m]=s.actions.splice(i,1);m.taskId="";t.actions.push(m);save();render()}
