<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Todolist</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Merriweather&family=Fira+Code&family=Caveat&family=Roboto+Slab&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#F8FAFC 0%,#EEF2FF 50%,#F5F3FF 100%);min-height:100vh;padding:20px 12px 40px;color:#1F2937;font-size:13px}
.container{max-width:700px;margin:0 auto}
.header{text-align:center;margin-bottom:16px}
.header h1{font-size:22px;font-weight:800;color:#1E1B4B}
.header .stats{color:#9CA3AF;font-size:12px;margin-top:2px}
.tabs{display:flex;gap:3px;margin-bottom:12px;background:#E5E7EB;border-radius:8px;padding:2px}
.tab-btn{flex:1;padding:5px 0;border:none;border-radius:6px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;background:transparent;color:#6B7280}
.tab-btn.active{background:#fff;color:#6366F1;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.tab-btn.trash-tab.active{background:#fff;color:#EF4444}
.toolbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.toolbar-left{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.filter-btns{display:flex;gap:4px;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;border:none;background:#6366F1;color:#fff;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(99,102,241,.25);transition:all .15s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(99,102,241,.35)}
.btn-filter{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;border:1.5px solid #D1D5DB;background:#fff;color:#6B7280}
.btn-filter.on{border-color:#6366F1;background:#EEF2FF;color:#6366F1}
.btn-filter.on-grp{border-color:#8B5CF6;background:#F5F3FF;color:#7C3AED}
.btn-collapse{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;border:1.5px solid #D1D5DB;background:#fff;color:#6B7280}
.btn-collapse:hover{border-color:#6366F1;color:#6366F1;background:#EEF2FF}

/* TOP badge */
.btn-top{border:none;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:800;cursor:pointer;letter-spacing:.5px;transition:all .15s;font-family:inherit;line-height:1.4}
.btn-top.off{background:#F3F4F6;color:#B0B5BF}
.btn-top.on{background:#DC2626;color:#fff;box-shadow:0 1px 4px rgba(220,38,38,.35)}
.top-indicator{position:absolute;top:4px;right:4px;background:#DC2626;color:#fff;font-size:7px;font-weight:800;padding:1px 5px;border-radius:3px;letter-spacing:.4px;z-index:2}

/* Project card */
.project-card{background:#fff;border-radius:12px;border:1px solid #E5E7EB;box-shadow:0 1px 2px rgba(0,0,0,.03);margin-bottom:10px;overflow:hidden}
.project-card.top-project{border-left:3px solid #DC2626}
.project-card.dragging{opacity:.4;transform:scale(.97)}
.project-card.drag-over-top{border-top:3px solid #6366F1}
.project-card.drag-over-bot{border-bottom:3px solid #6366F1}
.progress-bar{height:3px;background:#F3F4F6}
.progress-fill{height:100%;background:linear-gradient(90deg,#34D399,#10B981);border-radius:0 3px 3px 0;transition:width .4s}
.project-header{padding:8px 12px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.drag-handle{cursor:grab;color:#C5C9D0;display:flex;align-items:center;flex-shrink:0;padding:2px}
.drag-handle:active{cursor:grabbing}
.project-header input{flex:1;border:none;background:transparent;font-size:14px;font-weight:700;font-family:inherit;color:#1F2937;outline:none;min-width:0}
.project-meta{padding:0 12px 6px 36px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.project-meta label{display:flex;align-items:center;gap:4px;font-size:11px;color:#6B7280}
.project-meta input[type="date"]{border-radius:5px;padding:1px 6px;font-size:11px;font-family:inherit;font-weight:600;outline:none;cursor:pointer}
.deadline-tag{font-weight:700;font-size:10px}
.done-count{font-size:10px;color:#B0B5BF}
.actions-list{padding:0 12px 8px;display:flex;flex-direction:column;gap:4px}
.project-footer{border-top:1px solid #F3F4F6;padding:4px 12px;display:flex;justify-content:flex-end;gap:8px}
.btn-delete-project{display:inline-flex;align-items:center;gap:3px;border:none;background:transparent;color:#D1D5DB;cursor:pointer;font-size:10px;font-family:inherit;font-weight:600;padding:3px 6px;border-radius:5px;transition:all .2s}
.btn-delete-project:hover{color:#EF4444;background:#FEF2F2}

/* Done section toggle */
.done-toggle{display:flex;align-items:center;gap:5px;padding:4px 8px;margin-top:2px;cursor:pointer;font-size:11px;font-weight:600;color:#9CA3AF;user-select:none;border-radius:6px;transition:background .15s}
.done-toggle:hover{background:#F3F4F6}
.done-toggle .chevron{font-size:10px}

/* Action row */
.action-row{display:flex;align-items:flex-start;gap:7px;padding:6px 10px;border-radius:8px;transition:opacity .3s,background .2s;position:relative}
.action-row.done{opacity:.45}
.action-row.waiting{border-style:dashed!important;border-width:2px!important}
.action-row.waiting::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.35);border-radius:7px;pointer-events:none}
.action-row.dragging{opacity:.3}
.action-row.drag-over-top{border-top:2.5px solid #818CF8!important}
.action-row.drag-over-bot{border-bottom:2.5px solid #818CF8!important}
.urgency-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.action-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;position:relative;z-index:1}

.fmt-bar{display:none;align-items:center;gap:2px;flex-wrap:wrap;padding:3px 0;position:relative;animation:fmtIn .15s ease}
.action-body.editing .fmt-bar{display:flex}
@keyframes fmtIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.fmt-btn{border:none;border-radius:4px;width:24px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;color:#6B7280;font-size:12px;font-family:inherit;transition:all .15s;padding:0}
.fmt-btn:hover{background:#EEF2FF;color:#4F46E5}
.fmt-sep{width:1px;height:16px;background:#E5E7EB;margin:0 2px}
.fmt-font-select{border:1px solid #E5E7EB;border-radius:4px;padding:1px 4px;font-size:10px;font-family:inherit;color:#6B7280;outline:none;cursor:pointer;height:22px;max-width:100px}
.hl-popup{position:absolute;top:26px;left:0;background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:6px;box-shadow:0 4px 16px rgba(0,0,0,.12);display:none;z-index:100;width:196px}
.hl-popup.show{display:block}
.hl-label{font-size:9px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;margin-top:4px}
.hl-label:first-child{margin-top:0}
.hl-row{display:flex;gap:3px;flex-wrap:wrap}
.hl-swatch{width:20px;height:20px;border-radius:5px;border:2px solid transparent;cursor:pointer;transition:all .15s;flex-shrink:0}
.hl-swatch:hover{transform:scale(1.2);border-color:#6366F1}
.hl-swatch.none{background:repeating-linear-gradient(45deg,#f3f4f6,#f3f4f6 3px,#fff 3px,#fff 6px);position:relative}
.hl-swatch.none::after{content:"✕";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#9CA3AF}

.action-text{border:none;background:transparent;font-family:inherit;font-size:13px;line-height:1.45;outline:none;min-height:19px;color:#1F2937;word-break:break-word}
.action-text:empty::before{content:attr(data-placeholder);color:#B0B5BF}
.action-text img{max-width:100%;max-height:200px;border-radius:6px;margin:4px 0;display:block}
.action-row.done .action-text{color:#B0B5BF;text-decoration:line-through}
.action-row.done .action-text img{opacity:.45}

.wait-reason-box{margin-top:4px;border:1.5px dashed #F59E0B;border-radius:6px;padding:4px 8px;background:#FFFBEB;display:flex;align-items:center;gap:5px}
.wait-reason-box .wait-icon{font-size:11px;flex-shrink:0}
.wait-reason-input{flex:1;border:none;background:transparent;font-family:inherit;font-size:11px;color:#92400E;outline:none}
.wait-reason-input::placeholder{color:#D4A84A}

.action-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.action-deadline-input{border-radius:4px;padding:0 4px;font-size:10px;font-family:inherit;font-weight:600;outline:none;cursor:pointer;border:1px solid #E5E7EB;color:#6B7280;background:#FAFAFA}
.action-deadline-tag{font-weight:700;font-size:9px}
.urgency-select{border-radius:5px;padding:2px 4px;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;outline:none}
.project-select{border-radius:5px;padding:2px 4px;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;outline:none;border:1.5px solid #2563EB;color:#2563EB;background:#EFF6FF;width:auto;max-width:100%}
.action-controls{display:flex;gap:3px;flex-shrink:0;margin-top:2px;position:relative;z-index:1}
.btn-icon{border:none;border-radius:4px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;font-size:10px}
.btn-done{background:#10B981;color:#fff}
.btn-wait{background:#F59E0B;color:#fff}
.btn-wait.active-wait{background:#D97706;color:#fff;box-shadow:inset 0 0 0 2px #92400E}
.btn-undo{background:#E5E7EB;color:#6B7280}
.btn-trash{background:transparent;color:#C5C9D0}
.btn-trash:hover{background:#FEE2E2;color:#EF4444}
.btn-add-action{display:flex;align-items:center;justify-content:center;gap:5px;border:1.5px dashed #D1D5DB;border-radius:8px;padding:5px 0;background:transparent;color:#B0B5BF;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .2s}
.btn-add-action:hover{border-color:#6366F1;color:#6366F1}
.empty-state{text-align:center;padding:36px 16px;color:#B0B5BF;border:2px dashed #E5E7EB;border-radius:12px;font-size:13px;line-height:1.7}

/* Global view */
.global-action-row{display:flex;align-items:flex-start;gap:7px;padding:6px 10px;border-radius:8px;transition:all .3s;margin-bottom:4px;position:relative}
.global-action-row.done{opacity:.45}
.global-action-row.waiting{border-style:dashed!important;border-width:2px!important}
.global-action-row.waiting::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.35);border-radius:7px;pointer-events:none}
.global-action-row.done .action-text{color:#B0B5BF;text-decoration:line-through}
.global-action-row.dragging{opacity:.3}
.global-action-row.drag-over-top{border-top:2.5px solid #818CF8!important}
.global-action-row.drag-over-bot{border-bottom:2.5px solid #818CF8!important}
.project-badge{font-size:9px;font-weight:800;background:#2563EB;color:#fff;padding:2px 7px;border-radius:5px;white-space:nowrap;margin-top:3px;flex-shrink:0;letter-spacing:.3px;box-shadow:0 1px 4px rgba(37,99,235,.35)}
.urgency-group-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:10px 0 3px;display:flex;align-items:center;gap:6px}
.urgency-group-title .line{flex:1;height:1px}
.urgency-group{min-height:8px;padding-bottom:4px}
.urgency-group.drag-over-zone{background:rgba(99,102,241,.06);border-radius:8px}
.project-group-label{font-size:10px;font-weight:700;color:#6366F1;padding:6px 0 2px;display:flex;align-items:center;gap:5px}
.project-group-label .pgline{flex:1;height:1px;background:#C7D2FE}
.chevron{transition:transform .2s;display:inline-flex}
.chevron.open{transform:rotate(90deg)}

/* Trash view */
.trash-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid #E5E7EB;border-radius:8px;margin-bottom:6px}
.trash-item .trash-info{flex:1;min-width:0;font-size:12px;color:#6B7280}
.trash-item .trash-info b{color:#1F2937}
.btn-restore{border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;background:#10B981;color:#fff;transition:all .15s}
.btn-restore:hover{background:#059669}
.btn-purge{border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;background:#EF4444;color:#fff;transition:all .15s}
.btn-purge:hover{background:#DC2626}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const SK="todolist-data-v3";
const UM={high:{label:"Haut",bg:"#FEE2E266",border:"#F87171",dot:"#DC2626",text:"#991B1B"},medium:{label:"Moyen",bg:"#FEF3C766",border:"#FBBF24",dot:"#D97706",text:"#92400E"},low:{label:"Faible",bg:"#DBEAFE66",border:"#60A5FA",dot:"#2563EB",text:"#1E40AF"}};
const UO={high:0,medium:1,low:2};
let S={projects:[],tab:"projects",sortDeadline:false,sortAlpha:false,groupByProject:false,openProjects:{},showDone:{},trash:[]};

const FONTS=[{name:"Nunito",value:"'Nunito',sans-serif"},{name:"Merriweather",value:"'Merriweather',serif"},{name:"Roboto Slab",value:"'Roboto Slab',serif"},{name:"Fira Code",value:"'Fira Code',monospace"},{name:"Caveat",value:"'Caveat',cursive"},{name:"Arial",value:"Arial,sans-serif"},{name:"Georgia",value:"Georgia,serif"},{name:"Times New Roman",value:"'Times New Roman',serif"}];
const HL_FLASH=["#FF3B30","#FF9500","#FFCC00","#34C759","#00C7BE","#007AFF","#5856D6","#FF2D55","#AF52DE"];
const HL_PASTEL=["#FECACA","#FED7AA","#FEF08A","#BBF7D0","#A5F3FC","#BFDBFE","#C4B5FD","#FBCFE8","#FDE68A","#D1FAE5"];

function load(){try{const d=localStorage.getItem(SK);if(d){const p=JSON.parse(d);S.projects=p.projects||[];if(p.trash)S.trash=p.trash;S.projects.forEach(p=>{S.openProjects[p.id]=true;S.showDone[p.id]=false;if(p.top===undefined)p.top=false;p.actions.forEach(a=>{if(!a.deadline)a.deadline="";if(!a.waitReason)a.waitReason=""})})}}catch{}}
function save(){try{localStorage.setItem(SK,JSON.stringify({projects:S.projects,trash:S.trash}))}catch{}}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function du(d){if(!d)return null;const n=new Date();n.setHours(0,0,0,0);return Math.ceil((new Date(d+"T00:00:00")-n)/864e5)}
function dcc(d){const v=du(d);return v===null?"#6B7280":v<0?"#DC2626":v<=3?"#D97706":"#059669"}
function dll(d){const v=du(d);if(v===null)return"";if(v<0)return`${Math.abs(v)}j retard`;if(v===0)return"Auj.";return`${v}j`}
function nn(){const nums=S.projects.map(p=>p.number||0);let n=1;while(nums.includes(n))n++;return n}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fp(id){return S.projects.find(p=>p.id===id)}
function fa(pid,aid){const p=fp(pid);return p?p.actions.find(a=>a.id===aid):null}
function pName(p){return p.name||"Sans nom"}

const I={
plus:`<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
trash:`<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M5.5 4V3a1 1 0 011-1h3a1 1 0 011 1v1M6.5 7v4M9.5 7v4M4.5 4l.5 9a1 1 0 001 1h4a1 1 0 001-1l.5-9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
check:`<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.5 3.5L13 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
undo:`<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 6h7a3 3 0 110 6H8M3 6l3-3M3 6l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
sort:`<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M4 8h8M6 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`,
filter:`<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 3h12l-4.5 5.25V13l-3-1.5V8.25L2 3z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
chevron:`<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
folder:`<svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M2 6a2 2 0 012-2h3.172a2 2 0 011.414.586l1.828 1.828A2 2 0 0011.828 7H16a2 2 0 012 2v5a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" stroke="currentColor" stroke-width="1.5"/></svg>`,
list:`<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 3h12M2 6.5h12M2 10h12M2 13.5h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`,
cal:`<svg width="11" height="11" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M2 6.5h12M5.5 1.5v3M10.5 1.5v3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`,
grip:`<svg width="10" height="14" viewBox="0 0 10 14" fill="none"><circle cx="3" cy="2" r="1.2" fill="currentColor"/><circle cx="7" cy="2" r="1.2" fill="currentColor"/><circle cx="3" cy="7" r="1.2" fill="currentColor"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/><circle cx="3" cy="12" r="1.2" fill="currentColor"/><circle cx="7" cy="12" r="1.2" fill="currentColor"/></svg>`,
collapseAll:`<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
pause:`<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="4" height="12" rx="1" fill="currentColor"/><rect x="9" y="2" width="4" height="12" rx="1" fill="currentColor"/></svg>`,
group:`<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="6" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="2" width="6" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="6" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="6" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>`,
az:`<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><text x="1" y="7" font-size="7" font-weight="800" fill="currentColor" font-family="sans-serif">A</text><text x="1" y="14" font-size="7" font-weight="800" fill="currentColor" font-family="sans-serif">Z</text><path d="M12 3v10M10 11l2 2 2-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`};

/* ── Drag ── */
let dragType=null,dragId=null,dragPid=null;
function onProjDragStart(e,pid){dragType="project";dragId=pid;e.dataTransfer.effectAllowed="move";const card=e.currentTarget.closest('.project-card');if(card)setTimeout(()=>card.classList.add('dragging'),0)}
function onProjDragEnd(){dragType=null;dragId=null;document.querySelectorAll('.project-card').forEach(el=>el.classList.remove('dragging','drag-over-top','drag-over-bot'))}
function onProjDragOver(e,pid){
  if(dragType==="project"&&dragId!==pid){e.preventDefault();const el=e.currentTarget,r=el.getBoundingClientRect();el.classList.remove('drag-over-top','drag-over-bot');el.classList.add(e.clientY<r.top+r.height/2?'drag-over-top':'drag-over-bot')}
  else if(dragType==="action"&&dragPid!==pid){e.preventDefault();e.currentTarget.classList.add('drag-over-bot')}
}
function onProjDragLeave(e){e.currentTarget.classList.remove('drag-over-top','drag-over-bot')}
function onProjDrop(e,tid){
  e.preventDefault();e.currentTarget.classList.remove('drag-over-top','drag-over-bot');
  if(dragType==="project"&&dragId&&dragId!==tid){const fi=S.projects.findIndex(p=>p.id===dragId);if(fi===-1)return;const[m]=S.projects.splice(fi,1);let ti=S.projects.findIndex(p=>p.id===tid);const r=e.currentTarget.getBoundingClientRect();if(e.clientY>=r.top+r.height/2)ti++;S.projects.splice(ti,0,m);save();render()}
  else if(dragType==="action"&&dragId&&dragPid!==tid){moveToProject(dragPid,dragId,tid)}
}

function onActDragStart(e,pid,aid){dragType="action";dragId=aid;dragPid=pid;e.dataTransfer.effectAllowed="move";e.currentTarget.classList.add('dragging')}
function onActDragEnd(){dragType=null;dragId=null;dragPid=null;document.querySelectorAll('.action-row,.global-action-row').forEach(el=>el.classList.remove('dragging','drag-over-top','drag-over-bot'));document.querySelectorAll('.urgency-group').forEach(el=>el.classList.remove('drag-over-zone'))}
function onActDragOver(e,pid,aid){if(dragType!=="action"||dragId===aid)return;if(S.tab==="global")return;e.preventDefault();const el=e.currentTarget,r=el.getBoundingClientRect();el.classList.remove('drag-over-top','drag-over-bot');el.classList.add(e.clientY<r.top+r.height/2?'drag-over-top':'drag-over-bot')}
function onActDragLeave(e){e.currentTarget.classList.remove('drag-over-top','drag-over-bot')}
function onActDrop(e,pid,tid){
  e.preventDefault();if(dragType!=="action"||!dragId||dragId===tid)return;
  if(S.tab==="global")return;/* global view uses group drops only */
  let srcP=null,srcIdx=-1;
  S.projects.forEach(p=>{const i=p.actions.findIndex(a=>a.id===dragId);if(i!==-1){srcP=p;srcIdx=i}});
  if(!srcP||srcIdx===-1)return;
  const[moved]=srcP.actions.splice(srcIdx,1);
  const tgtP=fp(pid);if(!tgtP)return;
  let ti=tgtP.actions.findIndex(a=>a.id===tid);
  const r=e.currentTarget.getBoundingClientRect();
  if(e.clientY>=r.top+r.height/2)ti++;
  tgtP.actions.splice(ti,0,moved);
  save();render();
}
/* Global: drop on urgency group changes urgency only, NOT project */
function onGroupDragOver(e,u){if(dragType!=="action")return;e.preventDefault();e.currentTarget.classList.add('drag-over-zone')}
function onGroupDragLeave(e){e.currentTarget.classList.remove('drag-over-zone')}
function onGroupDrop(e,u){
  e.preventDefault();e.currentTarget.classList.remove('drag-over-zone');
  if(dragType!=="action"||!dragId)return;
  const a=fa(dragPid,dragId);
  if(a){a.urgency=u;save();render()}
}

/* ── Status ── */
function toggleActionStatus(pid,aid){
  const p=fp(pid);if(!p)return;const idx=p.actions.findIndex(a=>a.id===aid);if(idx===-1)return;
  const a=p.actions[idx];p.actions.splice(idx,1);
  if(a.status==="done"){a.status="todo";/* keep waitReason */
    const fd=p.actions.findIndex(x=>x.status==="done");
    if(fd===-1)p.actions.push(a);else p.actions.splice(fd,0,a);
  }else{a.status="done";
    const fd=p.actions.findIndex(x=>x.status==="done");
    if(fd===-1)p.actions.push(a);else p.actions.splice(fd,0,a);
  }
  save();render();
}
function toggleWaiting(pid,aid){
  const a=fa(pid,aid);if(!a)return;
  a.status=a.status==="waiting"?"todo":"waiting";
  /* waitReason is KEPT even when toggling off */
  save();render();
}
function updateWaitReason(pid,aid,v){const a=fa(pid,aid);if(a){a.waitReason=v;save()}}

/* ── Trash ── */
function delP(id){
  const p=fp(id);if(!p)return;
  S.trash.push({type:"project",data:JSON.parse(JSON.stringify(p)),date:Date.now()});
  S.projects=S.projects.filter(x=>x.id!==id);save();render();
}
function delA(pid,aid){
  const p=fp(pid);if(!p)return;const a=p.actions.find(x=>x.id===aid);if(!a)return;
  S.trash.push({type:"action",data:JSON.parse(JSON.stringify(a)),pid,pName:pName(p),date:Date.now()});
  p.actions=p.actions.filter(x=>x.id!==aid);save();render();
}
function restoreTrash(idx){
  const item=S.trash[idx];if(!item)return;
  if(item.type==="project"){S.projects.push(item.data);S.openProjects[item.data.id]=true}
  else if(item.type==="action"){const p=fp(item.pid);if(p)p.actions.push(item.data);else{/* project gone, create orphan project */}}
  S.trash.splice(idx,1);save();render();
}
function purgeTrash(idx){S.trash.splice(idx,1);save();render()}
function emptyTrash(){S.trash=[];save();render()}

function collapseAll(){S.projects.forEach(p=>{S.openProjects[p.id]=false});render()}
function toggleTop(pid){const p=fp(pid);if(p){p.top=!p.top;save();render()}}

/* ── Format ── */
function fmtCmd(cmd,val){document.execCommand(cmd,false,val||null);saveActiveEditor()}
function fmtFont(sel){document.execCommand('fontName',false,sel.value);saveActiveEditor()}
function saveActiveEditor(){const el=document.activeElement;if(el&&el.classList.contains('action-text')){const a=fa(el.dataset.pid,el.dataset.aid);if(a){a.text=el.innerHTML;save()}}}
let activeHlBtn=null;
function toggleHlPopup(btn){const popup=btn.parentElement.querySelector('.hl-popup');const isOpen=popup.classList.contains('show');closeAllPopups();if(!isOpen){popup.classList.add('show');activeHlBtn=btn}}
function closeAllPopups(){document.querySelectorAll('.hl-popup.show').forEach(p=>p.classList.remove('show'));activeHlBtn=null}
function applyHl(color,pid,aid){
  const ed=document.querySelector(`.action-text[data-pid="${pid}"][data-aid="${aid}"]`);
  if(ed)ed.focus();
  if(color==='none')document.execCommand('removeFormat',false,null);
  else document.execCommand('hiliteColor',false,color);
  closeAllPopups();const a=fa(pid,aid);if(a&&ed){a.text=ed.innerHTML;save()}
}
document.addEventListener('mousedown',function(e){if(activeHlBtn&&!e.target.closest('.hl-popup')&&!e.target.closest('.fmt-hl-btn'))closeAllPopups()});
function onEditorFocus(el){document.querySelectorAll('.action-body.editing').forEach(b=>b.classList.remove('editing'));el.closest('.action-body').classList.add('editing')}
function onEditorBlur(el){setTimeout(()=>{if(document.activeElement===el)return;const b=el.closest('.action-body');if(b&&!b.contains(document.activeElement))b.classList.remove('editing')},200)}
function setupEditors(){
  document.querySelectorAll('.action-text[contenteditable]').forEach(el=>{
    if(el._ready)return;el._ready=true;
    el.addEventListener('focus',()=>onEditorFocus(el));
    el.addEventListener('blur',()=>onEditorBlur(el));
    el.addEventListener('paste',function(e){
      const items=e.clipboardData&&e.clipboardData.items;if(!items)return;
      for(let i=0;i<items.length;i++){if(items[i].type.indexOf('image')!==-1){
        e.preventDefault();const file=items[i].getAsFile();const reader=new FileReader();
        reader.onload=function(ev){const img=document.createElement('img');img.src=ev.target.result;const sel=window.getSelection();if(sel.rangeCount){const r=sel.getRangeAt(0);r.deleteContents();r.insertNode(img);r.collapse(false)}else el.appendChild(img);const a=fa(el.dataset.pid,el.dataset.aid);if(a){a.text=el.innerHTML;save()}};reader.readAsDataURL(file);break;
      }}
    });
    el.addEventListener('input',function(){const a=fa(el.dataset.pid,el.dataset.aid);if(a){a.text=el.innerHTML;save()}});
  });
}

/* ── Helpers ── */
function projSelectSorted(pid){
  const sorted=[...S.projects].sort((a,b)=>pName(a).localeCompare(pName(b)));
  return sorted.map(p=>`<option value="${p.id}" ${p.id===pid?"selected":""}>${esc(pName(p))}</option>`).join('');
}
function sortActionsForDisplay(actions){
  const active=actions.filter(a=>a.status!=="done");
  const done=actions.filter(a=>a.status==="done");
  // Within active: sort by urgency, then waiting after non-waiting
  active.sort((a,b)=>{
    if(UO[a.urgency]!==UO[b.urgency])return UO[a.urgency]-UO[b.urgency];
    if(a.status==="waiting"&&b.status!=="waiting")return 1;
    if(a.status!=="waiting"&&b.status==="waiting")return -1;
    return 0;
  });
  return{active,done};
}

/* ── Export / Import ── */
function exportData(){
  const data=localStorage.getItem(SK);
  if(!data){alert("Aucune donnée à exporter.");return}
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download="todolist-backup.json";a.click();
  URL.revokeObjectURL(url);
}
function importData(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!parsed.projects){alert("Fichier invalide.");return}
        if(!confirm("Cela remplacera toutes les données actuelles. Continuer ?"))return;
        localStorage.setItem(SK,ev.target.result);
        location.reload();
      }catch{alert("Erreur de lecture du fichier.")}
    };reader.readAsText(file);
  };input.click();
}

/* ── Render ── */
function render(){
  const ta=S.projects.reduce((s,p)=>s+p.actions.length,0);
  const td=S.projects.reduce((s,p)=>s+p.actions.filter(a=>a.status==="done").length,0);
  const tw=S.projects.reduce((s,p)=>s+p.actions.filter(a=>a.status==="waiting").length,0);
  let h=`<div class="header"><h1>📋 Ma Todolist</h1><div class="stats">${S.projects.length} projet${S.projects.length>1?"s":""} · ${td}/${ta} terminée${td>1?"s":""}${tw?" · "+tw+" en attente":""}</div>
  <div style="margin-top:6px;display:flex;justify-content:center;gap:6px">
    <button onclick="exportData()" style="border:1px solid #D1D5DB;border-radius:6px;padding:3px 10px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;background:#fff;color:#6B7280;transition:all .15s" onmouseover="this.style.borderColor='#6366F1';this.style.color='#6366F1'" onmouseout="this.style.borderColor='#D1D5DB';this.style.color='#6B7280'">⬇ Exporter</button>
    <button onclick="importData()" style="border:1px solid #D1D5DB;border-radius:6px;padding:3px 10px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;background:#fff;color:#6B7280;transition:all .15s" onmouseover="this.style.borderColor='#6366F1';this.style.color='#6366F1'" onmouseout="this.style.borderColor='#D1D5DB';this.style.color='#6B7280'">⬆ Importer</button>
  </div></div>
  <div class="tabs">
    <button class="tab-btn ${S.tab==="projects"?"active":""}" onclick="switchTab('projects')">${I.folder} Projets</button>
    <button class="tab-btn ${S.tab==="global"?"active":""}" onclick="switchTab('global')">${I.list} Vue globale</button>
    <button class="tab-btn trash-tab ${S.tab==="trash"?"active":""}" onclick="switchTab('trash')">${I.trash} Corbeille${S.trash.length?" ("+S.trash.length+")":""}</button>
  </div>`;
  if(S.tab==="projects")h+=rPT();

function fmtBar(pid,aid){

function waitBox(a,pid){

function statusBtns(a,pid){

/* ── Projects tab ── */
function rPT(){
  let h=`<div class="toolbar"><div class="toolbar-left">
    <button class="btn-primary" onclick="addProject()">${I.plus} Nouveau projet</button>
    <button class="btn-collapse" onclick="collapseAll()">${I.collapseAll} Tout replier</button></div>
    <div class="filter-btns">
      <button class="btn-filter ${S.sortDeadline?"on":""}" onclick="ts('deadline')">${I.sort} Deadline</button>
      <button class="btn-filter ${S.sortAlpha?"on":""}" onclick="ts('alpha')">${I.az} Z-A</button>
    </div></div>`;
  let ps=[...S.projects];
  // TOP projects first always
  ps.sort((a,b)=>{if(a.top&&!b.top)return -1;if(!a.top&&b.top)return 1;return 0});
  if(S.sortDeadline)ps.sort((a,b)=>{if(a.top!==b.top)return a.top?-1:1;if(!a.deadline)return 1;if(!b.deadline)return -1;return a.deadline.localeCompare(b.deadline)});
  if(S.sortAlpha)ps.sort((a,b)=>{if(a.top!==b.top)return a.top?-1:1;return pName(b).localeCompare(pName(a))});
  if(!ps.length)h+=`<div class="empty-state">Aucun projet pour le moment.<br>Cliquez sur « Nouveau projet » pour commencer !</div>`;
  else ps.forEach(p=>{h+=rP(p)});
  return h;
}

function rP(p){
  const o=S.openProjects[p.id]!==false,t=p.actions.length,d=p.actions.filter(a=>a.status==="done").length,pct=t?d/t*100:0,c=dcc(p.deadline);
  const{active,done}=sortActionsForDisplay(p.actions);
  const sd=S.showDone[p.id];
  let ah="";
  if(o){
    ah=`<div class="actions-list">`;
    active.forEach(a=>{ah+=rA(a,p.id)});
    if(done.length){
      ah+=`<div class="done-toggle" onclick="toggleShowDone('${p.id}')"><span class="chevron ${sd?"open":""}">${I.chevron}</span> ${done.length} terminée${done.length>1?"s":""}</div>`;
      if(sd)done.forEach(a=>{ah+=rA(a,p.id)});

  </div>
  <div class="project-meta"><label>Deadline :<input type="date" value="${p.deadline||""}" onchange="uppd('${p.id}',this.value)" style="border:1px solid ${c}33;color:${c};background:${c}0D;">
  <span class="deadline-tag" style="color:${c}">${dll(p.deadline)}</span></label><span class="done-count">${d}/${t} terminée${d>1?"s":""}</span></div>${ah}
  <div class="project-footer"><button class="btn-delete-project" onclick="delP('${p.id}')">${I.trash} Supprimer le projet</button></div></div>`}

function rA(a,pid){

/* ── Global tab ── */
function rGT(){
  let h=`<div class="toolbar"><div></div><div class="filter-btns">
    <button class="btn-filter ${S.groupByProject?"on-grp":""}" onclick="toggleGroupByProject()">${I.group} Par projet</button>
  </div></div>`;
  let all=[];
  S.projects.forEach(p=>{p.actions.forEach(a=>{all.push({...a,pName:pName(p),pId:p.id,pDeadline:p.deadline,pTop:p.top})})});
  if(!all.length){h+=`<div class="empty-state">Aucune action à afficher.</div>`;return h}

  const groups=[{k:"high",l:"Urgence haute",c:"#DC2626",ln:"#FCA5A5"},{k:"medium",l:"Urgence moyenne",c:"#D97706",ln:"#FCD34D"},{k:"low",l:"Urgence faible",c:"#2563EB",ln:"#93C5FD"}];
  groups.forEach(g=>{
    let items=all.filter(a=>a.urgency===g.k);
    // Sort: active first (waiting after non-waiting), then done
    items.sort((a,b)=>{
      const aD=a.status==="done"?2:a.status==="waiting"?1:0;
      const bD=b.status==="done"?2:b.status==="waiting"?1:0;
      if(aD!==bD)return aD-bD;
      const da=a.deadline||a.pDeadline||"",db=b.deadline||b.pDeadline||"";
      if(!da)return 1;if(!db)return -1;return da.localeCompare(db);
    });
    // Separate active and done for collapsible
    const activeItems=items.filter(a=>a.status!=="done");
    const doneItems=items.filter(a=>a.status==="done");

    h+=`<div class="urgency-group-title" style="color:${g.c}"><span>${g.l} (${items.length})</span><div class="line" style="background:${g.ln}"></div></div>`;
    h+=`<div class="urgency-group" data-urgency="${g.k}" ondragover="onGroupDragOver(event,'${g.k}')" ondragleave="onGroupDragLeave(event)" ondrop="onGroupDrop(event,'${g.k}')">`;

    if(!items.length){h+=`<div style="padding:4px 0;font-size:11px;color:#C5C9D0;text-align:center;font-style:italic">— glisser ici —</div>`}

    const renderItems=(list)=>{
      if(S.groupByProject){
        // Group by project name
        const byProj={};list.forEach(a=>{const k=a.pId;if(!byProj[k])byProj[k]={name:a.pName,items:[]};byProj[k].items.push(a)});
        const projKeys=Object.keys(byProj).sort((a,b)=>byProj[a].name.localeCompare(byProj[b].name));
        projKeys.forEach(k=>{
          const pg=byProj[k];
          h+=`<div class="project-group-label"><span>${esc(pg.name)}${fp(k)&&fp(k).top?`<span class="top-indicator" style="position:static;display:inline-block;font-size:8px;margin-left:4px;vertical-align:middle">TOP</span>`:""}</span><div class="pgline"></div></div>`;
          pg.items.forEach(a=>{h+=rGA(a)});
        });
      }else{
        list.forEach(a=>{h+=rGA(a)});
      }
    };

    renderItems(activeItems);
    if(doneItems.length){
      const sdKey="gd_"+g.k;
      const sdOpen=S["showDoneGlobal_"+g.k];
      h+=`<div class="done-toggle" onclick="toggleShowDoneGlobal('${g.k}')"><span class="chevron ${sdOpen?"open":""}">${I.chevron}</span> ${doneItems.length} terminée${doneItems.length>1?"s":""}</div>`;
      if(sdOpen)renderItems(doneItems);
    }
    h+=`</div>`;
  });
  return h;
}

function rGA(a){
  const u=UM[a.urgency],d=a.status==="done",w=a.status==="waiting",adc=dcc(a.deadline),adl=dll(a.deadline);
  const cls=`global-action-row${d?" done":""}${w?" waiting":""}`;
  const bdr=d?"#E5E7EB":w?"#F59E0B":u.border;
  const p=fp(a.pId);
  return`<div class="${cls}" style="border:1.5px solid ${bdr};background:${d?"#FAFAFA":u.bg}"
    draggable="false" ondragover="onActDragOver(event,'${a.pId}','${a.id}')" ondragleave="onActDragLeave(event)" ondrop="onActDrop(event,'${a.pId}','${a.id}')">
    <span class="drag-handle" draggable="true" ondragstart="onActDragStart(event,'${a.pId}','${a.id}')" ondragend="onActDragEnd()" style="margin-top:3px">${I.grip}</span>
    <div class="urgency-dot" style="background:${d?"#CBD5E1":u.dot}"></div>
    ${p&&p.top?`<span class="top-indicator">TOP</span>`:""}
    <div class="action-body">
      <select class="project-select" onchange="moveToProject('${a.pId}','${a.id}',this.value)" style="align-self:flex-start">${projSelectSorted(a.pId)}</select>
      ${fmtBar(a.pId,a.id)}
      <div class="action-text" contenteditable="true" data-pid="${a.pId}" data-aid="${a.id}" data-placeholder="Décrire l'action…">${a.text||""}</div>
      ${waitBox(a,a.pId)}
      <div class="action-meta">
        <select class="urgency-select" onchange="uau('${a.pId}','${a.id}',this.value)" style="border:1px solid ${d?"#D1D5DB":u.border};color:${d?"#B0B5BF":u.text};background:${d?"#F3F4F6":"#fff"}">
          <option value="high" ${a.urgency==="high"?"selected":""}>Haut</option><option value="medium" ${a.urgency==="medium"?"selected":""}>Moyen</option><option value="low" ${a.urgency==="low"?"selected":""}>Faible</option></select>
        ${I.cal} <input type="date" class="action-deadline-input" value="${a.deadline||""}" onchange="uadl('${a.pId}','${a.id}',this.value)" style="color:${adc}">
        ${adl?`<span class="action-deadline-tag" style="color:${adc}">${adl}</span>`:""}
      </div>
    </div>
    <div class="action-controls">
      ${statusBtns(a,a.pId)}
      <button class="btn-icon btn-trash" onclick="delA('${a.pId}','${a.id}')" title="Supprimer">${I.trash}</button>
    </div></div>`}

/* ── Trash tab ── */
function rTR(){
  if(!S.trash.length)return`<div class="empty-state">La corbeille est vide.</div>`;
  let h=`<div class="toolbar"><div></div><button class="btn-filter" style="border-color:#EF4444;color:#EF4444" onclick="if(confirm('Vider la corbeille ?'))emptyTrash()">Vider la corbeille</button></div>`;
  S.trash.slice().reverse().forEach((item,ri)=>{
    const idx=S.trash.length-1-ri;
    const ago=Math.round((Date.now()-item.date)/60000);
    const timeStr=ago<1?"à l'instant":ago<60?ago+"min":Math.round(ago/60)+"h";
    if(item.type==="project"){
      h+=`<div class="trash-item"><div class="trash-info"><b>Projet</b> : ${esc(item.data.name||"Sans nom")} (${item.data.actions.length} actions) · <i>${timeStr}</i></div><button class="btn-restore" onclick="restoreTrash(${idx})">Restaurer</button><button class="btn-purge" onclick="purgeTrash(${idx})" style="margin-left:4px" title="Supprimer définitivement">✕</button></div>`;
    }else{
      h+=`<div class="trash-item"><div class="trash-info"><b>Action</b> de « ${esc(item.pName)} » · <i>${timeStr}</i></div><button class="btn-restore" onclick="restoreTrash(${idx})">Restaurer</button><button class="btn-purge" onclick="purgeTrash(${idx})" style="margin-left:4px" title="Supprimer définitivement">✕</button></div>`;
    }
  });
  return h;
}

/* ── State mutations ── */
function switchTab(t){S.tab=t;render()}
function ts(t){if(t==="deadline"){S.sortDeadline=!S.sortDeadline;S.sortAlpha=false}if(t==="alpha"){S.sortAlpha=!S.sortAlpha;S.sortDeadline=false}render()}
function toggleGroupByProject(){S.groupByProject=!S.groupByProject;render()}
function toggleShowDone(pid){S.showDone[pid]=!S.showDone[pid];render()}
function toggleShowDoneGlobal(k){S["showDoneGlobal_"+k]=!S["showDoneGlobal_"+k];render()}
function addProject(){const p={id:gid(),number:nn(),name:"",deadline:"",actions:[],top:false};S.projects.push(p);S.openProjects[p.id]=true;S.showDone[p.id]=false;save();render()}
function tp(id){S.openProjects[id]=S.openProjects[id]===false;render()}
function upn(id,v){const p=fp(id);if(p){p.name=v;save()}}
function uppd(id,v){const p=fp(id);if(p){p.deadline=v;save();render()}}
function addAction(pid){const p=fp(pid);if(p){const fd=p.actions.findIndex(a=>a.status==="done");const nA={id:gid(),text:"",urgency:"medium",status:"todo",deadline:"",waitReason:""};if(fd===-1)p.actions.push(nA);else p.actions.splice(fd,0,nA);save();render()}}
function uau(pid,aid,v){const a=fa(pid,aid);if(a){a.urgency=v;save();render()}}
function uadl(pid,aid,v){const a=fa(pid,aid);if(a){a.deadline=v;save();render()}}
function moveToProject(fromPid,aid,toPid){
  if(fromPid===toPid)return;
  const srcP=fp(fromPid);const tgtP=fp(toPid);if(!srcP||!tgtP)return;
  const idx=srcP.actions.findIndex(a=>a.id===aid);if(idx===-1)return;
  const[moved]=srcP.actions.splice(idx,1);
  const fd=tgtP.actions.findIndex(a=>a.status==="done");
  if(fd===-1)tgtP.actions.push(moved);else tgtP.actions.splice(fd,0,moved);
  save();render();
}

load();render();
</script>
