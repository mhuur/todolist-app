  h+=`<span class="pl-tb-count" id="pl-count">${n} devis · ${nLines} équipement${nLines>1?'s':''}</span>`;
  h+=`</div>`;
  h+=`<div class="pl-table-wrap"><div id="pl-table-host"></div></div>`;
  requestAnimationFrame(plRenderTable);
  return h;
}

// ▼ plRenderModal — injecte le modal dans #pl-host (avec focus restore pour préserver les inputs)
function plRenderModal(){
  const host=document.getElementById('pl-host');
  if(!host)return;
  if(!plModalState){host.innerHTML="";return}
  const active=document.activeElement;
  const focusId=(active&&active.id&&active.id.startsWith('pl-'))?active.id:null;
  const focusPos=(focusId&&typeof active.selectionStart==='number')?active.selectionStart:null;
  const st=plModalState;
  const isEdit=!!st.editingId;
  /* Preview ref : exclut le devis courant en édition pour ne pas auto-incrémenter sur soi-même */
  const refPreview=(st.date&&st.supplierId)?(()=>{const s=S.crm.suppliers.find(x=>x.id===st.supplierId);return s?plGenerateRef(st.date,s.name,st.editingId||null):""})():"";
  /* Pas de fermeture au clic sur le fond : seuls « Annuler » et la croix ferment (évite de perdre la saisie par mégarde) */
  let h=`<div class="pl-overlay"><div class="pl-modal">`;
  const refToShow=refPreview;
  h+=`<h3>${I.plus} ${isEdit?'Éditer le devis':'Nouveau devis'}${refToShow?`<span class="pl-ref">${esc(refToShow)}</span>`:""}<button class="pl-close" onclick="plCloseModal()" title="Fermer">×</button></h3>`;
  /* Date — onchange (pas oninput) : sinon le widget date est réinitialisé à chaque keystroke et la saisie est impossible */
  h+=`<div class="pl-row"><label class="pl-lbl">Date du devis</label><input id="pl-date" type="date" class="pl-input" value="${esc(st.date||"")}" onchange="plSetField('date',this.value);plRenderModal()"></div>`;
  /* Fournisseur — recherche live + création inline */
  h+=`<div class="pl-row"><label class="pl-lbl">Fournisseur</label>`;
  if(st.supplierId){
    const sup=S.crm.suppliers.find(s=>s.id===st.supplierId);
    h+=`<div class="pl-pill-row"><span class="pl-pill"><span>${esc(sup?sup.name:"?")}</span><button class="pl-pill-clear" onclick="plClearSupplier()" title="Changer">×</button></span></div>`;
  }else{
    const q=(st.supplierQuery||"").trim();
    const ql=q.toLowerCase();
    const presetProd=((st.lines||[]).find(l=>(l.product||"").trim())||{}).product||"";
    const presetProdL=presetProd.toLowerCase();
    /* Si une sous-cat est preset, on sépare en 2 groupes : ceux qui la proposent, et les autres CRM (dont le pick auto-linkera la sous-cat) */
    let primary=[],secondary=[];
    S.crm.suppliers.forEach(s=>{
      if(ql&&!s.name.toLowerCase().includes(ql))return;
      if(presetProd){
        if(s.products.some(p=>p.toLowerCase()===presetProdL))primary.push(s);
        else secondary.push(s);
      }else primary.push(s);
    });
    primary.sort((a,b)=>a.name.localeCompare(b.name));
    secondary.sort((a,b)=>a.name.localeCompare(b.name));
    const totalMatches=primary.length+secondary.length;
    const exact=q&&S.crm.suppliers.some(s=>s.name.toLowerCase()===ql);
    h+=`<input id="pl-sup-search" type="text" class="pl-input" placeholder="${presetProd?`Fournisseurs qui proposent « ${esc(presetProd)} »…`:'Rechercher ou créer un fournisseur…'}" value="${esc(q)}" oninput="plSearchSupplier(this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();plPickSupplierEnter()}" autocomplete="off">`;
    h+=`<div class="pl-search-list">`;
    if(!totalMatches&&!q)h+=`<div class="pl-search-list-empty">Aucun fournisseur. Tape un nom pour en créer un.</div>`;
    /* Groupe 1 : proposent déjà */
    let shown=0;
    primary.slice(0,8).forEach(s=>{h+=`<div class="pl-search-item" onmousedown="event.preventDefault();plPickSupplier('${s.id}')">${esc(s.name)}</div>`;shown++});
    if(primary.length>8)h+=`<div class="pl-search-list-empty">+ ${primary.length-8} autre(s) qui proposent « ${esc(presetProd)} »… affine ta recherche</div>`;
    /* Groupe 2 : CRM mais ne proposent pas encore — afficher avec mention "ajoute la sous-cat" */
    if(presetProd&&secondary.length){
      const remaining=Math.max(0,8-shown);
      if(primary.length)h+=`<div class="pl-search-list-empty" style="text-align:left;padding:6px 10px;font-size:9px;text-transform:uppercase;letter-spacing:.4px">Autres fournisseurs CRM (ajoutera « ${esc(presetProd)} »)</div>`;
      secondary.slice(0,remaining||4).forEach(s=>{h+=`<div class="pl-search-item" onmousedown="event.preventDefault();plPickSupplier('${s.id}')"><span>${esc(s.name)}</span> <span style="color:#475569;font-size:9px;font-style:italic">→ ajoute la sous-cat</span></div>`});
      if(secondary.length>(remaining||4))h+=`<div class="pl-search-list-empty">+ ${secondary.length-(remaining||4)} autre(s)… affine ta recherche</div>`;
    }
    if(q&&!exact)h+=`<div class="pl-search-item create" onmousedown="event.preventDefault();plCreateAndPickSupplier(${esc(JSON.stringify(q))})">＋ Créer « ${esc(q)} »${presetProd?` (avec « ${esc(presetProd)} »)`:''}</div>`;
    h+=`</div>`;
  }
  h+=`</div>`;
  /* Projet (niveau devis) — combobox autocomplété sur les projets déjà saisis */
  {
    const pj=st.projet||"";
    const psg=plListProjets().filter(s=>s.toLowerCase()!==pj.toLowerCase()).slice(0,8);
    h+=`<div class="pl-row"><label class="pl-lbl">Projet</label><div class="pl-combo-wrap pl-combo-block pl-combo-static"><input id="pl-projet" type="text" class="pl-input" placeholder="Projet associé (optionnel)…" value="${esc(pj)}" autocomplete="off" oninput="plSetProjet(this.value)">`;
    if(psg.length)h+=`<div class="pl-combo-dropdown">${psg.map(s=>`<div class="pl-combo-item" onmousedown="event.preventDefault();plSetProjet(${esc(JSON.stringify(s))});plRenderModal()">${esc(s)}</div>`).join('')}</div>`;
    h+=`</div></div>`;
  }
  /* Lignes d'équipement — un devis = N lignes (sous-cat + champs). Visible une fois le fournisseur choisi. */
  if(st.supplierId){
    h+=`<div class="pl-lines"><div class="pl-lines-hd">Équipements du devis</div>`;
    (st.lines||[]).forEach((line,idx)=>{h+=plRenderLineCard(line,idx,st)});
    h+=`<button class="pl-add-line" onclick="plAddLine()">＋ Ajouter un équipement</button>`;
    h+=`</div>`;
  }
  if(st.err)h+=`<div class="pl-err">${esc(st.err)}</div>`;
  /* Actions */
  const canSave=st.date&&st.supplierId&&(st.lines||[]).some(l=>(l.product||"").trim());
  h+=`<div class="pl-actions"><button class="pl-btn pl-btn-secondary" onclick="plCloseModal()">Annuler</button><button class="pl-btn pl-btn-primary" ${canSave?'':'disabled'} onclick="plSaveQuote()">Enregistrer</button></div>`;
  h+=`</div></div>`;
  host.innerHTML=h;
  /* Focus restore après re-render */
  if(focusId){
    const el=document.getElementById(focusId);
    if(el){el.focus();if(focusPos!==null&&typeof el.setSelectionRange==='function'){try{el.setSelectionRange(focusPos,focusPos)}catch(e){}}}
  }else{
    /* Auto-focus sur la première search visible si rien n'est focused */
    const auto=document.getElementById('pl-sup-search')||document.querySelector('[id^="pl-prod-search-"]')||document.getElementById('pl-draft-name');
    if(auto)auto.focus();
  }
}

// ▼ Renommage / réordonnancement de champ depuis le formulaire de saisie (modifie le schéma de la sous-cat → s'applique partout). lineId → product.
function plFieldRename(lineId,fieldId,v){
  const line=plGetLine(lineId);if(!line||!line.product)return;
  plEnsure();const arr=S.priceLib.schemas[line.product];if(!Array.isArray(arr))return;
  const f=arr.find(x=>x.id===fieldId);if(!f)return;
  const nv=(v||"").trim();
  if(!nv||nv===f.name){plRenderModal();return}
  if(arr.some(x=>x.id!==fieldId&&x.name.toLowerCase()===nv.toLowerCase())){alert("Ce nom de champ existe déjà pour cette sous-catégorie");plRenderModal();return}
  f.name=nv;save();plRenderModal();
}
let plFieldDrag=null; // {lineId, fieldId} — transient
function plFieldDragStart(e,lineId,fieldId){plFieldDrag={lineId:lineId,fieldId:fieldId};try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',fieldId)}catch(_){}}
function plFieldDragEnd(){plFieldDrag=null}
function plFieldDrop(lineId,targetFieldId){
  const drag=plFieldDrag;plFieldDrag=null;
  if(!drag||drag.lineId!==lineId)return;
  const line=plGetLine(lineId);if(!line||!line.product)return;
  plEnsure();const arr=S.priceLib.schemas[line.product];if(!Array.isArray(arr))return;
  const from=arr.findIndex(x=>x.id===drag.fieldId);
  const to=arr.findIndex(x=>x.id===targetFieldId);
  if(from<0||to<0||from===to)return;
  const m=arr.splice(from,1)[0];arr.splice(to,0,m);
  save();plRenderModal();
}

// ▼ Reclasser une ligne dans une autre sous-catégorie en transférant les champs choisis (transfert par nom ; crée les champs absents dans la catégorie cible)
let plReclass=null; // {lineId, fromProduct, toQuery, toProduct, keep:{fieldId:bool}}
function plOpenReclass(lineId){
  const line=plGetLine(lineId);if(!line||!line.product)return;
  plEnsure();
  const fromSchema=S.priceLib.schemas[line.product]||[];
  const keep={};
  fromSchema.forEach(f=>{const v=line.values[f.id];keep[f.id]=(v!==undefined&&v!==null&&v!=="")});
  plReclass={lineId:lineId,fromProduct:line.product,toQuery:"",toProduct:"",keep:keep};
  plRenderReclass();
}
function plCloseReclass(){plReclass=null;plRenderModal()}
function plReclassSetQuery(v){if(plReclass){plReclass.toQuery=v;plRenderReclass()}}
function plReclassPickTarget(name){if(!plReclass)return;plReclass.toProduct=(name||"").trim();plReclass.toQuery="";plRenderReclass()}
function plReclassClearTarget(){if(!plReclass)return;plReclass.toProduct="";plReclass.toQuery="";plRenderReclass()}
function plReclassToggleKeep(fieldId){if(!plReclass)return;plReclass.keep[fieldId]=!plReclass.keep[fieldId];plRenderReclass()}
function plReclassConfirm(){
  if(!plReclass||!plModalState)return;
  const st=plReclass;const line=plGetLine(st.lineId);if(!line)return;
  const toProd=(st.toProduct||"").trim();if(!toProd)return;
  plEnsure();
  const sup=S.crm.suppliers.find(s=>s.id===plModalState.supplierId);
  if(sup&&!sup.products.some(p=>p.toLowerCase()===toProd.toLowerCase()))sup.products.push(toProd);
  if(!S.crm.products.some(p=>p.toLowerCase()===toProd.toLowerCase()))S.crm.products.push(toProd);
  if(!Array.isArray(S.priceLib.schemas[toProd]))S.priceLib.schemas[toProd]=[];
  const fromSchema=S.priceLib.schemas[st.fromProduct]||[];
  const toSchema=S.priceLib.schemas[toProd];
  const newValues={};
  fromSchema.forEach(f=>{
    if(!st.keep[f.id])return;
    let g=toSchema.find(x=>x.name.toLowerCase()===f.name.toLowerCase());
    if(!g){g={id:gid(),name:f.name,type:f.type||'text'};if(f.unit)g.unit=f.unit;if(Array.isArray(f.options))g.options=f.options.slice();toSchema.push(g)}
    const val=line.values[f.id];
    if(val!==undefined)newValues[g.id]=val;
  });
  line.product=toProd;line.values=newValues;
  save();plReclass=null;plRenderModal();
}
// ▼ plRenderReclass — fenêtre 2 panneaux (catégorie actuelle ↔ nouvelle) avec sélection des champs à conserver
function plRenderReclass(){
  const host=document.getElementById('pl-host');if(!host)return;
  if(!plReclass){host.innerHTML="";return}
  const active=document.activeElement;const focusId=(active&&active.id&&active.id.indexOf('pl-rcl')===0)?active.id:null;
  const focusPos=(focusId&&typeof active.selectionStart==='number')?active.selectionStart:null;
  plEnsure();
  const st=plReclass;
  const fromSchema=S.priceLib.schemas[st.fromProduct]||[];
  const line=plGetLine(st.lineId)||{values:{}};
  const toProd=st.toProduct;
  const toSchema=toProd?(S.priceLib.schemas[toProd]||[]):[];
  const toNames=new Set(toSchema.map(f=>(f.name||"").toLowerCase()));
  const fmt=f=>{const v=line.values[f.id];if(v===undefined||v===null||v==="")return "—";if(f.type==='number'){let d=plFormatNumber(v);if(f.unit)d+=' '+f.unit;return d}if(f.type==='date')return plDateFR(v);return String(v)};
  let h=`<div class="pl-overlay"><div class="pl-modal pl-reclass-modal">`;
  h+=`<h3>↪ Reclasser l'équipement<button class="pl-close" onclick="plCloseReclass()" title="Fermer">×</button></h3>`;
  h+=`<div class="pl-rcl-cols">`;
  /* Gauche : catégorie actuelle */
  h+=`<div class="pl-rcl-col"><div class="pl-rcl-coltitle">Catégorie actuelle</div><div class="pl-rcl-cat">${esc(st.fromProduct)}</div>`;
  h+=`<div class="pl-rcl-help">Coche les champs à conserver.</div><div class="pl-rcl-fields">`;
  if(!fromSchema.length)h+=`<div class="pl-fields-empty">Aucun champ.</div>`;
  fromSchema.forEach(f=>{
    const on=!!st.keep[f.id];const exists=toProd&&toNames.has((f.name||"").toLowerCase());
    h+=`<label class="pl-rcl-field${on?' on':''}"><input type="checkbox" ${on?'checked':''} onchange="plReclassToggleKeep('${f.id}')"><span class="pl-rcl-fname">${esc(f.name)}</span><span class="pl-rcl-fval">${esc(fmt(f))}</span>`;
    if(on&&toProd)h+=`<span class="pl-rcl-tag ${exists?'map':'add'}">${exists?'déjà présent':'sera ajouté'}</span>`;
    h+=`</label>`;
  });
  h+=`</div></div>`;
  h+=`<div class="pl-rcl-arrow">→</div>`;
  /* Droite : nouvelle catégorie */
  h+=`<div class="pl-rcl-col"><div class="pl-rcl-coltitle">Nouvelle catégorie</div>`;
  if(toProd){
    h+=`<div class="pl-pill-row"><span class="pl-pill"><span>${esc(toProd)}</span><button class="pl-pill-clear" onclick="plReclassClearTarget()" title="Changer">×</button></span></div>`;
    h+=`<div class="pl-rcl-help">Champs déjà dans cette catégorie :</div><div class="pl-rcl-fields">`;
    if(!toSchema.length)h+=`<div class="pl-fields-empty">Catégorie vide ou nouvelle.</div>`;
    toSchema.forEach(f=>{h+=`<div class="pl-rcl-existing">${esc(f.name)}${f.unit?` <span style="color:#475569">(${esc(f.unit)})</span>`:''}</div>`});
    h+=`</div>`;
  }else{
    const q=(st.toQuery||"").trim();const ql=q.toLowerCase();
    const prods=plListAllProducts().filter(p=>p.toLowerCase()!==st.fromProduct.toLowerCase());
    const matches=prods.filter(p=>!ql||p.toLowerCase().includes(ql));
    const exact=q&&prods.some(p=>p.toLowerCase()===ql);
    h+=`<input id="pl-rcl-search" type="text" class="pl-input" placeholder="Choisir ou créer une sous-catégorie…" value="${esc(q)}" oninput="plReclassSetQuery(this.value)" autocomplete="off">`;
    h+=`<div class="pl-search-list">`;
    if(!matches.length&&!q)h+=`<div class="pl-search-list-empty">Tape un nom pour créer une catégorie.</div>`;
    matches.slice(0,8).forEach(p=>{h+=`<div class="pl-search-item" onmousedown="event.preventDefault();plReclassPickTarget(${esc(JSON.stringify(p))})">${esc(p)}</div>`});
    if(matches.length>8)h+=`<div class="pl-search-list-empty">+ ${matches.length-8} autre(s)…</div>`;
    if(q&&!exact)h+=`<div class="pl-search-item create" onmousedown="event.preventDefault();plReclassPickTarget(${esc(JSON.stringify(q))})">＋ Créer « ${esc(q)} »</div>`;
    h+=`</div>`;
  }
  h+=`</div></div>`;
  const nKeep=fromSchema.filter(f=>st.keep[f.id]).length;
  h+=`<div class="pl-actions"><button class="pl-btn pl-btn-secondary" onclick="plCloseReclass()">Annuler</button><button class="pl-btn pl-btn-primary" ${toProd?'':'disabled'} onclick="plReclassConfirm()">Reclasser${toProd?` (${nKeep})`:''}</button></div>`;
  h+=`</div></div>`;
  host.innerHTML=h;
  if(focusId){const el=document.getElementById(focusId);if(el){el.focus();if(focusPos!==null&&typeof el.setSelectionRange==='function'){try{el.setSelectionRange(focusPos,focusPos)}catch(e){}}}}
}

// ▼ plRenderLineCard — rend une ligne d'équipement du devis (sous-cat scopée + champs dynamiques). lineId encode tous les handlers.
function plRenderLineCard(line,idx,st){
  const sup=S.crm.suppliers.find(s=>s.id===st.supplierId);
  const multi=(st.lines||[]).length>1;
  let h=`<div class="pl-line-card">`;
  h+=`<div class="pl-line-hd"><span class="pl-line-num">Équipement ${idx+1}</span>${multi?`<button class="pl-line-del" onclick="plRemoveLine('${line.id}')" title="Retirer cette ligne">×</button>`:''}</div>`;
  /* Sous-catégorie */
  h+=`<div class="pl-row"><label class="pl-lbl">Sous-catégorie</label>`;
  if(line.product){
    h+=`<div class="pl-pill-row"><span class="pl-pill"><span>${esc(line.product)}</span><button class="pl-pill-clear" onclick="plClearProduct('${line.id}')" title="Changer (les valeurs sont conservées)">×</button></span><button class="pl-mini-btn" onclick="plOpenReclass('${line.id}')" title="Reclasser dans une autre sous-catégorie en transférant les champs choisis">↪ Reclasser</button></div>`;
  }else{
    const q=(line.productQuery||"").trim();
    const ql=q.toLowerCase();
    const prods=sup?sup.products:[];
    const matches=prods.filter(p=>!ql||p.toLowerCase().includes(ql)).sort((a,b)=>a.localeCompare(b));
    const exact=q&&prods.some(p=>p.toLowerCase()===ql);
    h+=`<input id="pl-prod-search-${line.id}" type="text" class="pl-input" placeholder="Rechercher ou créer une sous-catégorie…" value="${esc(q)}" oninput="plSearchProduct('${line.id}',this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();plPickProductEnter('${line.id}')}" autocomplete="off">`;
    h+=`<div class="pl-search-list">`;
    if(!matches.length&&!q)h+=`<div class="pl-search-list-empty">Aucune sous-catégorie pour ce fournisseur. Tape un nom pour en créer une.</div>`;
    matches.slice(0,8).forEach(p=>{h+=`<div class="pl-search-item" onmousedown="event.preventDefault();plPickProduct('${line.id}',${esc(JSON.stringify(p))})">${esc(p)}</div>`});
    if(matches.length>8)h+=`<div class="pl-search-list-empty">+ ${matches.length-8} autre(s)… affine ta recherche</div>`;
    if(q&&!exact)h+=`<div class="pl-search-item create" onmousedown="event.preventDefault();plCreateAndPickProduct('${line.id}',${esc(JSON.stringify(q))})">＋ Créer « ${esc(q)} »</div>`;
    h+=`</div>`;
  }
  h+=`</div>`;
  /* Formulaire dynamique de la sous-cat */
  if(line.product){
    plEnsure();
    const schema=S.priceLib.schemas[line.product]||[];
    const draftHere=st.fieldDraft&&st.fieldDraft.lineId===line.id;
    h+=`<div class="pl-fields"><div class="pl-fields-hd">Champs « ${esc(line.product)} »<span class="pl-fields-hint">renommer / glisser ⠿ s'applique à toute la sous-catégorie</span></div>`;
    if(!schema.length&&!draftHere)h+=`<div class="pl-fields-empty">Aucun champ défini. Ajoute un premier champ ci-dessous.</div>`;
    schema.forEach(f=>{
      const v=line.values[f.id]||"";
      h+=`<div class="pl-field-row" ondragover="event.preventDefault();this.classList.add('pl-fdrag-over')" ondragleave="this.classList.remove('pl-fdrag-over')" ondrop="this.classList.remove('pl-fdrag-over');plFieldDrop('${line.id}','${f.id}')">`;
      h+=`<span class="pl-field-grip" draggable="true" ondragstart="plFieldDragStart(event,'${line.id}','${f.id}')" ondragend="plFieldDragEnd()" title="Glisser pour réordonner">${I.grip}</span>`;
      h+=`<input id="pl-flabel-${line.id}-${esc(f.id)}" class="pl-field-label" value="${esc(f.name)}" onchange="plFieldRename('${line.id}','${f.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()" title="Cliquer pour renommer ce champ (s'applique à toute la sous-catégorie)">`;
      if(f.type==='number'){
        /* Texte formaté : affiché « 69 563 » au repos, brut à l'édition (format au blur → pas de saut de curseur). Stocke le nombre brut. */
        h+=`<div class="pl-num-wrap${f.unit?' has-unit':''}"><input id="pl-val-${line.id}-${esc(f.id)}" type="text" inputmode="decimal" class="pl-input pl-num" value="${esc(plFormatNumber(v))}" placeholder="0" autocomplete="off" onfocus="this.value=plNumClean(this.value)" oninput="plSetValue('${line.id}','${f.id}',plNumClean(this.value))" onblur="var n=plNumClean(this.value);plSetValue('${line.id}','${f.id}',n);this.value=plFormatNumber(n)">`;
        if(f.unit)h+=`<span class="pl-num-unit">${esc(f.unit)}</span>`;
        h+=`</div>`;
      }else if(f.type==='date'){
        h+=`<input id="pl-val-${line.id}-${esc(f.id)}" type="date" class="pl-input" value="${esc(v)}" oninput="plSetValue('${line.id}','${f.id}',this.value)">`;
      }else if(f.type==='select'){
        h+=`<select id="pl-val-${line.id}-${esc(f.id)}" class="pl-select" onchange="plSetValue('${line.id}','${f.id}',this.value)"><option value="">—</option>`;
        (f.options||[]).forEach(o=>{h+=`<option value="${esc(o)}" ${v===o?'selected':''}>${esc(o)}</option>`});
        h+=`</select>`;
      }else{
        /* Texte : saisie 100% native (aucun re-render au focus/clavier) ; suggestions affichées au focus via CSS :focus-within */
        const cur=(v==null?"":String(v));
        const sg=plDistinctValues(line.product,f.id).filter(s=>s.toLowerCase()!==cur.toLowerCase()).slice(0,8);
        h+=`<div class="pl-combo-wrap pl-combo-block pl-combo-static"><input id="pl-val-${line.id}-${esc(f.id)}" type="text" class="pl-input" value="${esc(cur)}" autocomplete="off" oninput="plSetValue('${line.id}','${f.id}',this.value)">`;
        if(sg.length)h+=`<div class="pl-combo-dropdown">${sg.map(s=>`<div class="pl-combo-item" onmousedown="event.preventDefault();plSetValue('${line.id}','${f.id}',${esc(JSON.stringify(s))});plRenderModal()">${esc(s)}</div>`).join('')}</div>`;
        h+=`</div>`;
      }
      h+=`<button class="pl-field-del" onclick="plDelField('${line.id}','${f.id}')" title="Supprimer ce champ">×</button></div>`;
    });
    if(draftHere){
      const fd=st.fieldDraft;
      h+=`<div class="pl-fielddraft">`;
      h+=`<div class="pl-fielddraft-row"><input id="pl-draft-name" type="text" class="pl-input" placeholder="Nom du champ (ex. Prix unitaire)" value="${esc(fd.name||"")}" oninput="plSetDraftField('name',this.value);plRenderModal()"><select class="pl-select" onchange="plSetDraftField('type',this.value);plRenderModal()"><option value="number" ${fd.type==='number'?'selected':''}>Nombre</option><option value="text" ${fd.type==='text'?'selected':''}>Texte</option><option value="date" ${fd.type==='date'?'selected':''}>Date</option><option value="select" ${fd.type==='select'?'selected':''}>Liste déroulante</option></select></div>`;
      const dQ=(fd.name||"").trim().toLowerCase();
      const inCurrent=new Set((S.priceLib.schemas[line.product]||[]).map(f=>(f.name||"").toLowerCase()));
      const suggestions=dQ?plListAllFields().filter(f=>!inCurrent.has(f.name.toLowerCase())&&f.name.toLowerCase().includes(dQ)).slice(0,5):[];
      if(suggestions.length){
        h+=`<div style="margin:6px 0;background:rgba(56,189,248,.04);border:1px solid rgba(56,189,248,.15);border-radius:5px;padding:4px 6px">`;
        h+=`<div style="font-size:9px;color:#5CB8F0;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:2px 4px 4px">${suggestions.length} champ${suggestions.length>1?'s':''} existant${suggestions.length>1?'s':''} — clique pour réutiliser</div>`;
        suggestions.forEach(f=>{
          h+=`<div class="pl-search-item" style="font-size:11px;padding:5px 6px;border-radius:4px;border:none" onmousedown="event.preventDefault();plPickExistingField(${esc(JSON.stringify(f.name))},${esc(JSON.stringify(f.type))},${esc(JSON.stringify(f.unit))},${esc(JSON.stringify((f.options||[]).join(', ')))})"><strong>${esc(f.name)}</strong> <span style="color:#64748B;font-size:9px">— ${esc(plFieldTypeLabel(f))}</span></div>`;
        });
        h+=`</div>`;
      }
      if(fd.type==='number')h+=`<div class="pl-fielddraft-row"><input id="pl-draft-unit" type="text" class="pl-input" placeholder="Unité (ex. €, m³, mg/L)" value="${esc(fd.unit||"")}" oninput="plSetDraftField('unit',this.value)"></div>`;
      if(fd.type==='select')h+=`<div class="pl-fielddraft-row"><input id="pl-draft-options" type="text" class="pl-input" placeholder="Options séparées par virgules (ex. Standard, Premium)" value="${esc(fd.options||"")}" oninput="plSetDraftField('options',this.value)"></div>`;
      h+=`<div class="pl-fielddraft-row"><button class="pl-mini-btn cancel" onclick="plCancelFieldDraft()">Annuler</button><button class="pl-mini-btn" onclick="plConfirmFieldDraft()">Ajouter le champ</button></div>`;
      h+=`</div>`;
    }else{
      h+=`<div style="margin-top:8px"><button class="pl-mini-btn" onclick="plOpenFieldDraft('${line.id}')">＋ Ajouter un champ</button></div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`; /* .pl-line-card */
  return h;
}

/* ── Feedback / Notes ── */
function rFB(){
  if(!S.feedback||!Array.isArray(S.feedback.items))S.feedback={items:[]};
  let h=`<div class="fb-bar"><div class="fb-title">Notes & Remarques</div><button class="fb-copy-btn" onclick="fbCopy()" id="fb-copy-btn">📋 Copier les actions en cours</button></div>`;
  h+=`<div class="fb-subtitle">Note ici les remarques ou bugs à transmettre à Claude. Chaque action peut recevoir des étapes complémentaires, être validée ou supprimée.</div>`;
  h+=`<div class="add-row" style="position:static"><input id="fb-input" placeholder="Nouvelle action / remarque…" value="${esc(S.fbQ||"")}" oninput="S.fbQ=this.value" onkeydown="if(event.key==='Enter'){event.preventDefault();fbAdd()}"><button onclick="fbAdd()">＋</button></div>`;
  const items=[...S.feedback.items].sort((a,b)=>{if(!!a.validated!==!!b.validated)return a.validated?1:-1;return (b.createdAt||0)-(a.createdAt||0)});
  if(!items.length)h+=`<div class="es">Aucune note pour l'instant.</div>`;
  items.forEach(it=>{
    h+=`<div class="fb-card ${it.validated?"fb-done":""}">`;
    h+=`<div class="fb-hd">`;
    h+=`<button class="fb-check ${it.validated?"on":""}" onclick="fbToggleValid('${it.id}')" title="${it.validated?"Marquer en cours":"Valider"}">${I.check}</button>`;
    h+=`<input class="fb-text" value="${esc(it.text||"")}" placeholder="Note…" oninput="fbUpdateText('${it.id}',this.value)">`;
    h+=`<button class="fb-del" onclick="fbDel('${it.id}')" title="Supprimer">${I.trash}</button>`;
    h+=`</div>`;
    (it.steps||[]).forEach((st,idx)=>{
      h+=`<div class="fb-step"><span class="fb-step-bul">↳</span><input class="fb-step-text" data-fb-step="${it.id}-${idx}" value="${esc(st||"")}" placeholder="Étape complémentaire…" oninput="fbUpdateStep('${it.id}',${idx},this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();fbAddStep('${it.id}')}"><button class="fb-step-del" onclick="fbDelStep('${it.id}',${idx})" title="Supprimer étape">✕</button></div>`;
    });
    h+=`<button class="fb-add-step" onclick="fbAddStep('${it.id}')">＋ étape</button>`;
    h+=`</div>`;
  });
  return h;
}

/* Parse a CSS declaration string ("a:b;c:d") into a React style object.
   Lets us keep the design's inline-style strings verbatim. */
function css(str){
  const o = {};
  if(!str) return o;
  str.split(';').forEach(decl=>{
    const i = decl.indexOf(':');
    if(i < 0) return;
    let k = decl.slice(0, i).trim();
    const v = decl.slice(i+1).trim();
    if(!k) return;
    if(k.indexOf('--') === 0){ o[k] = v; }
    else { k = k.replace(/-([a-z])/g, (_,c)=>c.toUpperCase()); o[k] = v; }
  });
  return o;
}

  // Toutes les personnes connues (union de tous les projets), dédupliquées par nom (le projet courant prime pour la couleur).
  knownPeople(){ const st=this.state; const m=new Map(); (st.projects||[]).forEach(p=>{ (p.people||[]).forEach(pp=>{ const k=(pp.name||'').trim().toLowerCase(); if(k&&!m.has(k)) m.set(k,{name:pp.name,color:pp.color}); }); }); (st.people||[]).forEach(pp=>{ const k=(pp.name||'').trim().toLowerCase(); if(k) m.set(k,{name:pp.name,color:pp.color}); }); return m; }
  updateNotes(id,val){ this.patch(id,{notes:val}); }

    ? { tasks: apply(st.tasks) }
    : { projects:(st.projects||[]).map(p=> (p.id!==st.currentProjectId && (p.tasks||[]).some(t=>t.id===id)) ? {...p, tasks:apply(p.tasks)} : p) }; }); }

  addCategory(name){ const id=this.uid(); this.setState(st=>({ categories:[...st.categories,{id,name}], addingCat:false })); }

  deleteCategory(id){ this.setState(st=>{ const cat={...st.filters.cat}; delete cat[id]; const collapsed={...st.collapsed}; delete collapsed['ca:'+id]; const catDep='cat:'+id; return { categories: st.categories.filter(c=>c.id!==id), tasks: st.tasks.map(t=>{ const nt=(t.cat||'')===id ? {...t, cat:''} : t; return (nt.deps && nt.deps.indexOf(catDep)>=0) ? {...nt, deps: nt.deps.filter(d=>d!==catDep)} : nt; }), filters:{...st.filters, cat}, collapsed, catMenuId:null, labelEdit:{type:null,id:null} }; }); }

  reorder(dragId, beforeId, catId){
    if(!dragId || dragId===beforeId) { this.setState({dragId:null,dragOverId:null}); return; }
    this.setState(st=>{
      const tasks=[...st.tasks];
      const di=tasks.findIndex(t=>t.id===dragId);
      if(di<0) return { dragId:null, dragOverId:null };
      const d={...tasks[di], cat:catId};
      tasks.splice(di,1);
      if(beforeId){ const ti=tasks.findIndex(t=>t.id===beforeId); tasks.splice(ti<0?tasks.length:ti,0,d); }
      else { let last=-1; tasks.forEach((t,i)=>{ if((t.cat||'')===catId) last=i; }); tasks.splice(last+1,0,d); }
      return { tasks, dragId:null, dragOverId:null };
    });
  }
  // Réordonne le tableau st.categories (= ordre des groupes au centre). N'affecte PAS la sidebar (qui re-trie par nom). Drop = insérer avant beforeId.
  moveCategory(dragId, beforeId){
    if(!dragId || dragId===beforeId){ this.setState({dragCatId:null,dragOverCatId:null}); return; }
    this.setState(st=>{
      const cats=[...st.categories];
      const di=cats.findIndex(c=>c.id===dragId); if(di<0) return {dragCatId:null,dragOverCatId:null};
      const [moved]=cats.splice(di,1);
      const ti=cats.findIndex(c=>c.id===beforeId);
      if(ti<0) cats.push(moved); else cats.splice(ti,0,moved);
      return { categories:cats, dragCatId:null, dragOverCatId:null };
    });
  }
  setStatusByDrag(dragId,status){
    if(!dragId){ this.setState({dragId:null}); return; }
    this.setState(st=>({ tasks: st.tasks.map(t=> t.id===dragId?{...t,status}:t), dragId:null }));
  }

  // ---- Aujourd'hui (vue globale tous projets ; ordre propre via todayOrder, n'affecte JAMAIS l'ordre de Flux) ----
  // Toutes les tâches marquées today, à travers tous les projets, ordonnées par todayOrder.
  // Projet courant : on lit l'état de travail (st.tasks), pas la copie figée dans st.projects.
  todayTasks(st){
    st = st || this.state;
    const out = [];
    (st.projects||[]).forEach(p=>{
      const isCur = p.id===st.currentProjectId;
      const tasks  = isCur ? st.tasks  : (p.tasks||[]);
      const people = isCur ? st.people : (p.people||[]);
      tasks.forEach(t=>{ if(t.today) out.push({ task:t, projId:p.id, projName:p.name, people }); });
    });
    const order = Array.isArray(st.todayOrder)?st.todayOrder:[];
    const rank = id => { const i=order.indexOf(id); return i<0?1e9:i; };
    out.sort((a,b)=> rank(a.task.id)-rank(b.task.id));   // tri stable : les nouvelles étoilées (rank ∞) gardent l'ordre de découverte
    return out;
  }
  // Bascule l'étoile "today" d'une tâche, où qu'elle soit (projet courant ou autre). Maintient todayOrder.
  toggleToday(id){
    this.setState(st=>{
      const inCur = st.tasks.some(t=>t.id===id);
      let cur = inCur ? st.tasks.find(t=>t.id===id) : null;
      if(!cur){ for(const p of (st.projects||[])){ if(p.id===st.currentProjectId) continue; const tt=(p.tasks||[]).find(t=>t.id===id); if(tt){ cur=tt; break; } } }
      if(!cur) return null;
      const next = !cur.today;
      const tasks = inCur ? st.tasks.map(t=> t.id===id?{...t,today:next}:t) : st.tasks;
      const projects = (st.projects||[]).map(p=> (p.id!==st.currentProjectId && (p.tasks||[]).some(t=>t.id===id))
        ? {...p, tasks:p.tasks.map(t=> t.id===id?{...t,today:next}:t)} : p);
      let order = (Array.isArray(st.todayOrder)?st.todayOrder:[]).slice();
      if(next){ if(order.indexOf(id)<0) order.push(id); } else { order = order.filter(x=>x!==id); }
      return { tasks, projects, todayOrder:order };
    });
  }
  // Valide/dévalide une tâche où qu'elle soit (vue Aujourd'hui = multi-projets).
  toggleDoneAny(id){
    this.setState(st=>{
      const flip = t => t.id===id ? {...t, status: t.status==='done'?'todo':'done'} : t;
      if(st.tasks.some(t=>t.id===id)) return { tasks: st.tasks.map(flip) };
      return { projects: (st.projects||[]).map(p=> (p.id!==st.currentProjectId && (p.tasks||[]).some(t=>t.id===id)) ? {...p, tasks:p.tasks.map(flip)} : p) };
    });
  }
  // Réordonne UNIQUEMENT la vue Aujourd'hui (todayOrder). N'affecte jamais l'ordre de Flux (st.tasks).
  reorderToday(dragId, beforeId){
    if(!dragId || dragId===beforeId){ this.setState({todayDragId:null,todayDragOverId:null}); return; }
    this.setState(st=>{
      const ids = this.todayTasks(st).map(x=>x.task.id);
      const di = ids.indexOf(dragId); if(di<0) return { todayDragId:null, todayDragOverId:null };
      ids.splice(di,1);
      if(beforeId){ const bi=ids.indexOf(beforeId); ids.splice(bi<0?ids.length:bi,0,dragId); }
      else ids.push(dragId);
      return { todayOrder:ids, todayDragId:null, todayDragOverId:null };
    });
  }
  // Trouve une tâche n'importe où (projet courant OU autre projet) + son contexte projet. Pour l'édition depuis la vue Aujourd'hui.
  taskByIdAny(id){ const st=this.state; let t=st.tasks.find(x=>x.id===id); if(t) return { task:t, projId:st.currentProjectId, isCur:true, people:st.people, categories:st.categories }; for(const p of (st.projects||[])){ if(p.id===st.currentProjectId) continue; const tt=(p.tasks||[]).find(x=>x.id===id); if(tt) return { task:tt, projId:p.id, isCur:false, people:p.people||[], categories:p.categories||[] }; } return null; }
  // Ajoute une personne à un projet précis (courant ou autre), renvoie son id. Pour assigner depuis la vue Aujourd'hui (multi-projets).
  addPersonTo(projId,name,color){ const id=this.uid(); const palette=['#3b5bdb','#d6643f','#2c9c6a','#8a5cd6','#c79a1e','#0f9bb0','#c0497e','#5566d6']; this.setState(st=>{ if(projId===st.currentProjectId){ const c=color||palette[st.people.length % palette.length]; return { people:[...st.people,{id,name:(name||'').trim(),color:c}] }; } return { projects:(st.projects||[]).map(p=> p.id===projId ? {...p, people:[...(p.people||[]),{id,name:(name||'').trim(),color:color||palette[(p.people||[]).length % palette.length]}]} : p) }; }); return id; }
  // ---- Aujourd'hui : filtres propres à l'onglet (transient, non persistés) + ajout rapide cross-project ----
  toggleTodayFilter(axis,id){ this.setState(st=>{ const cur=st.todayFilters||{status:{},proj:{},person:{}}; const ax={...(cur[axis]||{})}; if(ax[id]) delete ax[id]; else ax[id]=true; return { todayFilters:{...cur,[axis]:ax} }; }); }
  clearTodayFilters(){ this.setState({ todayFilters:{status:{},proj:{},person:{}} }); }
  // Crée une tâche déjà étoilée (today:true) dans le projet cible (courant ou autre) et l'ajoute en fin de la liste Aujourd'hui.
  addTodayTask(projId,title){ const tx=(title||'').trim(); if(!tx) return; const id=this.uid(); const nt={ id, title:tx, cat:'', status:'todo', due:'', person:'', notes:'', deps:[], checklist:[], today:true }; this.setState(st=>{ const order=Array.isArray(st.todayOrder)?st.todayOrder:[]; const norder=order.indexOf(id)<0?[...order,id]:order.slice(); const tgt=projId||st.currentProjectId; if(tgt===st.currentProjectId || !tgt){ return { tasks:[...st.tasks, nt], todayOrder:norder }; } return { projects:(st.projects||[]).map(p=> p.id===tgt ? {...p, tasks:[...(p.tasks||[]), nt]} : p), todayOrder:norder }; }); }

  // ---- helpers ----
  catName(id){ const c=this.state.categories.find(c=>c.id===id); return c?c.name:'Sans catégorie'; }
  person(id){ return this.state.people.find(p=>p.id===id) || null; }
  formatDue(iso){
    const isDark = this.state.theme!=='clair';
    const soon = isDark ? '#e3ab43' : '#b5651d';
    const over = isDark ? '#f0746d' : '#d04a45';
    if(!iso) return { text:'—', color:'var(--cbox)' };
    const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return { text:'—', color:'var(--cbox)' };
    const now=new Date(); now.setHours(0,0,0,0);
    const diff=Math.round((d-now)/86400000);
    if(diff===0) return { text:"Aujourd'hui", color:soon };
    if(diff===1) return { text:'Demain', color:soon };
    if(diff===-1) return { text:'Hier', color:over };
    const txt=d.getDate()+' '+MONTHS[d.getMonth()];
    return { text:txt, color: diff<0 ? over : 'var(--muted)' };
  }
  checkBox(done, size, accent){
    const a = accent||'#3b5bdb';
    const s = size||15;
    if(done) return `width:${s}px;height:${s}px;border-radius:5px;background:${a};border:1.5px solid ${a};display:flex;align-items:center;justify-content:center;color:#fff;font-size:${s-5}px;flex:none;cursor:pointer;`;
    return `width:${s}px;height:${s}px;border-radius:5px;border:1.6px solid var(--cbox);background:var(--panel);display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;`;
  }
  facetBox(active, accent){
    const a = accent||'#3b5bdb';
    if(active) return `width:15px;height:15px;border-radius:4px;background:${a};border:1.5px solid ${a};color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;flex:none;`;
    return 'width:15px;height:15px;border-radius:4px;border:1.6px solid var(--cbox);background:var(--panel);flex:none;';
  }

  // -------- view model (port of renderVals) --------
  buildVM(){
    const st = this.state;
    const f = st.filters; const ed = st.editing;
    const actS = Object.keys(f.status), actC = Object.keys(f.cat), actP = Object.keys(f.person);
    const anyFilter = actS.length || actC.length || actP.length;
    const allOn = st.bulk==='all';                       // master : toutes les cases cochées
    const showEmpty = !anyFilter && st.bulk!=='none';     // groupes vides visibles seulement hors filtrage
    const showingAll = allOn || (st.bulk!=='none' && !anyFilter);
    const match = t => (!actS.length||actS.includes(t.status)) && (!actC.length||actC.includes(t.cat)) && (!actP.length||actP.includes(t.person));
    const filtered = st.bulk==='none' ? [] : st.tasks.filter(match);
    const taskById = id => st.tasks.find(t=>t.id===id);
    const stop = (e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); };

    const theme = st.theme || 'marine';
    const isDark = theme==='marine' || theme==='indigo' || theme==='ocean';
    this._dark = isDark;
    const STATUS = isDark ? STATUS_DARK : STATUS_LIGHT;
    const accent = st.accent || '#3a8ff0';

    const selA = isDark ? '30' : '14';
    const fillA = isDark ? '26' : '1a';
    const lighten = (hex,amt)=>{ const h=(hex||'').replace('#',''); if(h.length!==6) return hex; let r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16); r=Math.round(r+(255-r)*amt); g=Math.round(g+(255-g)*amt); b=Math.round(b+(255-b)*amt); return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join(''); };
    const D = DEN[st.density] || DEN.confortable;
    const groupBy = st.groupBy || 'cat';
    const le = st.labelEdit || {type:null,id:null};
    const labelEditing = (type,id)=> le.type===type && le.id===id;
    const byName = (a,b)=> (a.name||'').localeCompare(b.name||'', 'fr', {sensitivity:'base'});


    // Shared pill recipe — Personne & Statut chips share identical geometry & type.
    const chipBase = `display:inline-flex;align-items:center;line-height:1;border-radius:20px;padding:${D.stPad};font-size:12px;font-weight:500;white-space:nowrap;`;

    const vm = (t) => {
      const sm = STATUS[t.status];
      const done = t.status==='done';
      const sel = st.selectedId===t.id;
      const isEd = (fld)=> ed.id===t.id && ed.field===fld;
      let rowStyle = `position:relative;display:flex;flex-wrap:nowrap;align-items:center;height:${D.rowH}px;padding:0 ${D.padX}px;border-bottom:1px solid var(--divider);cursor:default;background:var(--panel);`;
      if(sel) rowStyle += `background:${aTint(selA)};box-shadow:inset 3px 0 0 ${accent};`;
      if(isEd('status')) rowStyle += 'z-index:25;';
      if(st.dragOverId===t.id) rowStyle += `border-top:2px solid ${accent};`;
      const depRaw = t.deps[0] || '';
      const isCatDep = depRaw.slice(0,4)==='cat:';
      const dep = (!isCatDep && depRaw) ? taskById(depRaw) : null;
      const depCatName = isCatDep ? this.catName(depRaw.slice(4)) : '';
      const hasDep = isCatDep || !!dep;
      const du = this.formatDue(t.due);
      /* Options du menu « Bloquée par », groupées par catégorie (triées) : chaque catégorie est sélectionnable (bloque par toute la catégorie), puis ses tâches ; tâches sans catégorie en dernier. */
      const depGroups = [];
      st.categories.slice().sort(byName).forEach(c=>{ const tk=st.tasks.filter(x=>x.id!==t.id && (x.cat||'')===c.id).map(x=>({id:x.id,name:x.title})); depGroups.push({ id:c.id, name:c.name, selectable:true, tasks:tk }); });
      const unTk = st.tasks.filter(x=>x.id!==t.id && !x.cat).map(x=>({id:x.id,name:x.title}));
      if(unTk.length) depGroups.push({ id:'', name:'Sans catégorie', selectable:false, tasks:unTk });
      const p = this.person(t.person);
      const statusOptions = SORDER.map(k=>{ const m=STATUS[k]; const on=t.status===k;
        return { key:k, label:m.label, dot:m.dot,
          style:'display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:12.5px;cursor:pointer;color:var(--text);'+(on?'font-weight:600;':''),
          checkStyle:`margin-left:auto;color:${accent};font-size:11px;`+(on?'':'visibility:hidden;'),
          onPick:(e)=>{ stop(e); this.setStatus(t.id,k); } }; });
      let personMenu=[];
      if(isEd('person')){
        const mrow=(on)=>'display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;'+(on?`background:${aTint(selA)};`:'');
        const q=(st.personQuery||'').trim(); const ql=q.toLowerCase();
        const curNames=new Set(st.people.map(pp=>(pp.name||'').trim().toLowerCase()));
        const known=this.knownPeople();
        if(!ql || 'non assigné'.indexOf(ql)>=0) personMenu.push({ label:'Non assigné', initials:'', avatarStyle:'width:18px;height:18px;border-radius:50%;border:1.5px dashed var(--cbox);flex:none;', labelStyle:'font-size:12.5px;color:var(--text3);', checkStyle:`margin-left:auto;color:${accent};font-size:11px;`+(t.person===''?'':'visibility:hidden;'), style:mrow(t.person===''), onPick:(e)=>{ stop(e); this.updatePerson(t.id,''); this.stopPersonEdit(); } });
        st.people.filter(pp=>pp.name.toLowerCase().indexOf(ql)>=0).forEach(pp=>{ const on=t.person===pp.id; personMenu.push({ label:pp.name, initials:'', avatarStyle:`width:10px;height:10px;border-radius:50%;background:${pp.color};flex:none;`, labelStyle:'font-size:12.5px;color:var(--text);'+(on?'font-weight:600;':''), checkStyle:`margin-left:auto;color:${accent};font-size:11px;`+(on?'':'visibility:hidden;'), style:mrow(on), onPick:(e)=>{ stop(e); this.updatePerson(t.id,pp.id); this.stopPersonEdit(); } }); });
        Array.from(known.values()).filter(kp=>{ const k=(kp.name||'').trim().toLowerCase(); return !curNames.has(k) && kp.name.toLowerCase().indexOf(ql)>=0; }).forEach(kp=>{ personMenu.push({ label:kp.name, initials:'', avatarStyle:`width:10px;height:10px;border-radius:50%;background:${kp.color};flex:none;`, labelStyle:'font-size:12.5px;color:var(--text);', checkStyle:'visibility:hidden;', style:mrow(false), onPick:(e)=>{ stop(e); const id=this.addPerson(kp.name,kp.color); this.updatePerson(t.id,id); this.stopPersonEdit(); } }); });
        const exact=ql && known.has(ql);
        if(q && !exact) personMenu.push({ label:'Créer « '+q+' »', initials:'＋', avatarStyle:`width:18px;height:18px;border-radius:50%;background:${aTint(fillA)};color:${accent};font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex:none;`, labelStyle:`font-size:12.5px;color:${accent};font-weight:500;`, checkStyle:'visibility:hidden;', style:mrow(false), onPick:(e)=>{ stop(e); const id=this.addPerson(q); this.updatePerson(t.id,id); this.stopPersonEdit(); } });
      }
      return {
        id:t.id, cat:t.cat, rowStyle, title:t.title,
        dueISO:t.due||'', dueText:du.text, dueColor:du.color,
        personId:t.person||'', personQuery:st.personQuery, personMenu,

        personChip: p ? chipBase + `max-width:100%;overflow:hidden;text-overflow:ellipsis;background:${p.color}${isDark?'33':'18'};color:${isDark?lighten(p.color,0.55):lighten(p.color,-0.12)};` : '',
        titleStyle: `font-size:${D.titleFs}px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;` + (done?'color:var(--muted);text-decoration:line-through;':'color:var(--text);'),
        checkStyle: this.checkBox(done, D.chk, accent), checkMark: done?'✓':'',
        statusStyle: chipBase + `gap:5px;cursor:pointer;background:${sm.bg};color:${sm.fg};`,
        statusLabel:sm.label, statusDot:sm.dot, statusOptions,
        depId: depRaw, depGroups,
        depText: hasDep ? '⛓' : '—', depColor: hasDep ? '#b5651d' : 'var(--cbox)', depTitle: dep ? ('Bloquée par : '+dep.title) : (isCatDep ? ('Bloquée par la catégorie : '+depCatName) : 'Aucune dépendance'),
        edTitle:isEd('title'), showTitle:!isEd('title'),
        edDue:isEd('due'), showDue:!isEd('due'),
        edPerson:isEd('person'), showPerson:!isEd('person'),
        edStatus:isEd('status'),
        edDep:isEd('dep'), showDep:!isEd('dep'),
        stop,
        today: !!t.today,
        onRowToggle: ()=>this.toggleSelect(t.id),
        onCheck: (e)=>{ stop(e); this.toggleDone(t.id); },
        onStar: (e)=>{ stop(e); this.toggleToday(t.id); },
        onDelete: (e)=>{ stop(e); this.askDelete(t.id); },

    const projExact = (st.projects||[]).some(p=>p.name.toLowerCase()===pql);

    return {
      theme, accent,
      projName: curProj?curProj.name:'', hasProject: !!curProj,
      projOpen: st.projOpen, projQuery: st.projQuery, projList, projCreate: !!pq && !projExact,
      onProjToggle:()=>this.setState(s=>({ projOpen:!s.projOpen, projQuery:'' })),
      onProjQuery:(e)=>this.setState({ projQuery:e.target.value }),
      onProjKey:(e)=>{ if(e.key==='Escape'){ this.setState({projOpen:false,projQuery:''}); } else if(e.key==='Enter'){ const q=(this.state.projQuery||'').trim(); if(!q) return; const ql=q.toLowerCase(); const hit=this.state.projects.find(p=>p.name.toLowerCase()===ql) || this.state.projects.find(p=>p.name.toLowerCase().indexOf(ql)>=0); if(hit) this.switchProject(hit.id); else this.createProject(q); } },
      onProjCreate:(e)=>{ stop(e); const q=(this.state.projQuery||'').trim(); if(q) this.createProject(q); },
      headerStyle:`position:sticky;top:0;z-index:3;display:flex;flex-wrap:nowrap;align-items:center;height:${D.hdrH}px;padding:0 ${D.padX}px;background:var(--rail);border-bottom:1px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;`,
      onQuickAdd:(e)=>{ if(e.key==='Enter'){ const v=e.target.value.trim(); if(v){ const ac=Object.keys(st.filters.cat); this.addTask(ac.length===1?ac[0]:'', v); e.target.value=''; } } else if(e.key==='Escape'){ e.target.value=''; e.target.blur(); } },
      onQuickAddBlur:(e)=>{ const v=e.target.value.trim(); if(v){ const ac=Object.keys(st.filters.cat); this.addTask(ac.length===1?ac[0]:'', v); e.target.value=''; } },
      groups, statusFacets, catFacets, personFacets,
      todayView: st.todayView, todayList, todayCount: todayList.length, todayTotal: todayEntriesAll.length, todayHasAny: todayEntriesAll.length>0, todayColHeaderStyle, todayAnyFilter, todayAllStyle,
      todayStatusFacets, todayProjFacets, todayPersonFacets,
      todayAddProj, todayProjOptions,
      onTodayAddProj:(e)=>this.setState({todayAddProj:e.target.value}),
      onTodayQuickAdd:(e)=>{ if(e.key==='Enter'){ const val=e.target.value.trim(); if(val){ this.addTodayTask(this.state.todayAddProj||this.state.currentProjectId, val); e.target.value=''; } } else if(e.key==='Escape'){ e.target.value=''; e.target.blur(); } },
      onTodayQuickAddBlur:(e)=>{ const val=e.target.value.trim(); if(val){ this.addTodayTask(this.state.todayAddProj||this.state.currentProjectId, val); e.target.value=''; } },
      onClearTodayFilters:()=>this.clearTodayFilters(),
      totalCount: st.tasks.length,
      allViewStyle: 'display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;cursor:pointer;font-weight:500;'+(showingAll?`background:${aTint(fillA)};color:${accent};`:'color:var(--text2);'),
      onAllTasks:()=>this.toggleBulk(),
      addingCat: st.addingCat,
      onStartAddCat:()=>this.setState({addingCat:true}),
      onAddCatKey:(e)=>{ if(e.key==='Enter'){ const v=e.target.value.trim(); if(v) this.addCategory(v); } else if(e.key==='Escape'){ this.setState({addingCat:false}); } },
      onAddCatBlur:(e)=>{ const v=e.target.value.trim(); if(v) this.addCategory(v); else this.setState({addingCat:false}); },
      hasSel: !!sel, sel: sel||{}, noteOpen: st.noteOpen, onToggleNote:()=>this.setState(s=>({noteOpen:!s.noteOpen})), onCloseDetail:()=>this.setState({selectedId:null}),
      hasConfirm: !!confirmTask, confirmTitle: confirmTask?confirmTask.title:'',
      onCancelDelete:()=>this.cancelDelete(), onConfirmDelete:()=>this.confirmDelete(), stopModal:(e)=>stop(e),
      danger: isDark
        ? { fg:'#ff9089', bg:'rgba(208,74,69,.16)', border:'rgba(208,74,69,.42)', iconBg:'rgba(208,74,69,.20)', solid:'#cf4f49' }
        : { fg:'#c0524a', bg:'#fbeae8', border:'#f0d5d2', iconBg:'#fbeae8', solid:'#c0524a' },
    };
  }

  renderRow(t){

      <div className="taskrow" data-task="1" style={css(t.rowStyle)} draggable={!t.edTitle}
        onClick={t.onRowToggle} onDragStart={t.onDragStart} onDragOver={t.onDragOver}

          <span style={css(t.checkStyle)}>{t.checkMark}</span>

        <span style={css('width:24px;flex:none;display:flex;align-items:center;justify-content:center;')}>

              <div style={css('position:absolute;top:32px;left:6px;min-width:196px;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 28px rgba(20,22,28,.18);padding:5px;z-index:40;max-height:228px;overflow:auto;')}>
                {t.personMenu.map((o,i)=>
                  <div className="stopt" key={i} onClick={o.onPick} style={css(o.style)}>
                    <span style={css(o.avatarStyle)}>{o.initials}</span>
                    <span style={css(o.labelStyle)}>{o.label}</span>
                    <span style={css(o.checkStyle)}>✓</span>
                  </div>)}
              </div>
            </React.Fragment>}
          {t.showPerson &&
            <span style={css('display:flex;align-items:center;gap:7px;overflow:hidden;')}>
              {t.hasPerson && <span style={css(t.personChip)}>{t.personName}</span>}
              {t.noPerson && <span style={css('font-size:12px;color:var(--cbox);')}>＋ assigner</span>}
            </span>}
        </span>
        {/* STATUS */}
        <span style={css('width:128px;flex:none;position:relative;')}>
          <span onClick={t.onStatusClick} title="Changer le statut" style={css(t.statusStyle)}>
            <span style={css('width:6px;height:6px;border-radius:50%;background:'+t.statusDot+';')}></span>
            {t.statusLabel}
            <span style={css('margin-left:auto;opacity:.5;font-size:9px;padding-left:4px;')}>▾</span>
          </span>
          {t.edStatus &&
            <div style={css('position:absolute;top:32px;left:0;min-width:152px;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 28px rgba(20,22,28,.18);padding:5px;z-index:40;')}>
              {t.statusOptions.map(so=>
                <div className="stopt" key={so.key} onClick={so.onPick} style={css(so.style)}>
                  <span style={css('width:7px;height:7px;border-radius:50%;background:'+so.dot+';')}></span>
                  {so.label}
                  <span style={css(so.checkStyle)}>✓</span>
                </div>)}
            </div>}
        </span>
        {/* DEP */}
        <span className="cell" style={css('width:62px;flex:none;text-align:center;padding:3px 4px;')} onClick={t.onDepClick}>
          {t.edDep &&
            <select className="ied" data-edit="1" value={t.depId} onChange={t.onDepChange} onClick={t.stop} style={css('width:100%;font-size:11px;')}>
              <option value="">Aucune</option>
              {t.depGroups.map(g=>
                <optgroup key={g.id||'none'} label={g.name}>
                  {g.selectable && <option value={'cat:'+g.id}>▸ Toute la catégorie</option>}
                  {g.tasks.map(o=> <option key={o.id} value={o.id}>{o.name}</option>)}
                </optgroup>)}
            </select>}
          {t.showDep && <span title={t.depTitle} style={css("font-size:12px;color:"+t.depColor+";")}>{t.depText}</span>}
        </span>
        <span className="rowdel" onClick={t.onDelete} title="Supprimer la tâche" style={css('position:absolute;right:6px;top:0;height:100%;display:flex;align-items:center;padding:0 8px;font-size:13px;color:var(--muted);background:var(--soft);cursor:pointer;')}>✕</span>
      </div>
    );
  }

                <span style={css("margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);")}>{f.count}</span>
                <span data-personmenu style={css('position:relative;display:flex;align-items:center;')}>
                  <span onClick={f.onMenuToggle} title="Modifier ou supprimer" style={css('cursor:pointer;color:var(--muted);font-size:16px;line-height:1;padding:0 2px;')}>⋮</span>
                  {f.menuOpen &&
                    <div style={css('position:absolute;top:24px;right:0;min-width:150px;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 28px rgba(20,22,28,.18);padding:5px;z-index:50;')}>
                      <div className="stopt" onClick={f.onRename} style={css('padding:7px 10px;border-radius:7px;font-size:12.5px;cursor:pointer;color:var(--text);')}>Renommer</div>
                      <div className="stopt" onClick={f.onDelete} style={css('padding:7px 10px;border-radius:7px;font-size:12.5px;cursor:pointer;color:#e0746d;')}>Supprimer</div>
                    </div>}
                </span>
              </div>)}

          </div>}

          {/* ---------- LEFT FILTER RAIL (Aujourd'hui) ---------- */}
          {todayOnly &&
          <div className="fxcol scrl" style={css('width:236px;flex:none;background:var(--rail);border-right:1px solid var(--line);overflow-y:auto;padding:16px 12px;animation-delay:.02s;')}>

            <div onClick={v.onClearTodayFilters} title="Afficher toutes les tâches du jour" style={css(v.todayAllStyle)}>
              <span style={css('font-size:13px;')}>Toutes les tâches</span>
              <span style={css("margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);")}>{v.todayTotal}</span>
            </div>

            <div style={css("font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--muted);margin:18px 8px 8px;")}>STATUT</div>
            {v.todayStatusFacets.map(f=>
              <div key={f.id} onClick={f.onToggle} style={css('display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text2);')}>
                <span style={css(f.boxStyle)}>{f.check}</span>
                <span style={css('width:7px;height:7px;border-radius:50%;background:'+f.dot+';')}></span>
                <span>{f.label}</span>
                <span style={css("margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);")}>{f.count}</span>
              </div>)}

            <div style={css("font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--muted);margin:18px 8px 8px;")}>PROJETS</div>
            {v.todayProjFacets.map(f=>
              <div key={f.id} onClick={f.onToggle} style={css('display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text2);')}>
                <span style={css(f.boxStyle)}>{f.check}</span>
                <span style={css('flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;')}>{f.label}</span>
                <span style={css("margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);flex:none;")}>{f.count}</span>
              </div>)}
            {!v.todayProjFacets.length && <div style={css('padding:2px 8px;font-size:12px;color:var(--muted);')}>—</div>}

            <div style={css("font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--muted);margin:18px 8px 8px;")}>PERSONNES</div>
            {v.todayPersonFacets.map(f=>
              <div key={f.id} onClick={f.onToggle} style={css('display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text2);')}>
                <span style={css(f.boxStyle)}>{f.check}</span>
                <span style={css(f.avatarStyle)}></span>
                <span style={css('flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;')}>{f.label}</span>
                <span style={css("margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);flex:none;")}>{f.count}</span>
              </div>)}
            {!v.todayPersonFacets.length && <div style={css('padding:2px 8px;font-size:12px;color:var(--muted);')}>—</div>}

          </div>}

          {/* ---------- CENTER ---------- */}
          <div className="fxcol scrl" style={css('flex:1;min-width:0;overflow:auto;background:var(--bg);animation-delay:.08s;')}>
            {(todayOnly || v.todayView) ? (
            <div style={css('min-width:820px;')}>
              {/* column header */}
              <div style={css(v.todayColHeaderStyle)}>
                <span style={css('width:26px;flex:none;')}></span>
                <span style={css('width:24px;flex:none;')}></span>
                <span style={css('flex:1;min-width:0;')}>Tâche</span>
                <span style={css('width:210px;flex:none;')}>Projet</span>
                <span style={css('width:88px;flex:none;')}>Échéance</span>
                <span style={css('width:150px;flex:none;')}>Personne</span>
                <span style={css('width:128px;flex:none;')}>Statut</span>
              </div>
              {v.todayCount===0
                ? <div style={css('padding:48px 24px;text-align:center;color:var(--muted);font-size:13.5px;line-height:1.7;')}>{v.todayHasAny
                    ? <React.Fragment>Aucune tâche ne correspond aux filtres.<br/><span onClick={v.onClearTodayFilters} style={css('color:'+v.accent+';cursor:pointer;')}>Réinitialiser les filtres</span></React.Fragment>
                    : <React.Fragment>Aucune tâche pour aujourd'hui.<br/>Dans l'onglet <b style={css('color:var(--text2);')}>Flux</b>, clique sur l'étoile <span style={css('color:var(--cbox);')}>☆</span> d'une tâche pour l'ajouter ici.</React.Fragment>}</div>
                : v.todayList.map(t=>
                  <div key={t.id} className="taskrow" data-task="1" draggable={t.draggable} style={css(t.rowStyle)}
                    onDragStart={t.onDragStart} onDragEnter={t.onDragEnter} onDragOver={t.onDragOver} onDrop={t.onDrop} onDragEnd={t.onDragEnd}>
                    <span style={css('width:26px;flex:none;display:flex;align-items:center;')} onClick={t.onCheck}><span style={css(t.checkStyle)}>{t.checkMark}</span></span>
                    <span style={css('width:24px;flex:none;display:flex;align-items:center;justify-content:center;')}><span className="fxstar on" onClick={t.onUnstar} title="Retirer d'Aujourd'hui">★</span></span>
                    {/* TITLE */}
                    <span style={css('flex:1;min-width:0;display:flex;align-items:center;overflow:hidden;padding-right:8px;')}>
                      {t.edTitle
                        ? <input className="ied" data-edit="1" value={t.title} onChange={t.onTitleInput} onKeyDown={t.onTitleKey} onBlur={t.onTitleBlur} onClick={t.stop} style={css('flex:1;min-width:0;')} />
                        : <span onClick={t.onTitleClick} onDoubleClick={t.onTitleDbl} title="Clic : ouvrir le détail · double-clic : renommer" style={css(t.titleStyle)}>{t.title}</span>}
                    </span>
                    {/* PROJECT */}
                    <span style={css('width:210px;flex:none;display:flex;align-items:center;overflow:hidden;')}><span style={css(t.projBadgeStyle+'max-width:100%;overflow:hidden;text-overflow:ellipsis;')}>{t.projName}</span></span>
                    {/* DUE */}
                    <span className="cell" style={css('width:88px;flex:none;padding:3px 6px;position:relative;')} onClick={t.onDueClick}>
                      {t.edDue
                        ? <input className="ied" type="date" data-edit="1" value={t.dueISO} onChange={t.onDueChange} onBlur={t.onDueBlur} onClick={t.stop} style={css("width:100%;font-family:'IBM Plex Mono',monospace;font-size:11px;")} />
                        : <span style={css('font-size:12px;color:'+t.dueColor+';')}>{t.dueText||'—'}</span>}
                    </span>
                    {/* PERSON */}
                    <span className="cell" style={css('width:150px;flex:none;padding:3px 6px;overflow:visible;position:relative;')} onClick={t.onPersonClick}>
                      {t.edPerson
                        ? <React.Fragment>
                            <input className="ied" data-edit="1" value={t.personQuery} onChange={t.onPersonQuery} onKeyDown={t.onPersonKey} onClick={t.stop} placeholder="Chercher ou créer…" style={css('width:100%;')} />
                            <div style={css('position:absolute;top:32px;left:6px;min-width:196px;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 28px rgba(20,22,28,.18);padding:5px;z-index:40;max-height:228px;overflow:auto;')}>
                              {t.personMenu.map((o,i)=>
                                <div className="stopt" key={i} onClick={o.onPick} style={css(o.style)}>
                                  <span style={css(o.avatarStyle)}>{o.initials}</span>
                                  <span style={css(o.labelStyle)}>{o.label}</span>
                                  <span style={css(o.checkStyle)}>✓</span>
                                </div>)}
                            </div>
                          </React.Fragment>
                        : (t.hasPerson ? <span style={css(t.personChip)}>{t.personName}</span> : <span style={css('font-size:12px;color:var(--cbox);')}>＋ assigner</span>)}
                    </span>
                    {/* STATUS */}
                    <span style={css('width:128px;flex:none;position:relative;')}>
                      <span onClick={t.onStatusClick} title="Changer le statut" style={css(t.statusStyle)}>
                        <span style={css('width:6px;height:6px;border-radius:50%;background:'+t.statusDot+';')}></span>
                        {t.statusLabel}
                        <span style={css('margin-left:auto;opacity:.5;font-size:9px;padding-left:4px;')}>▾</span>
                      </span>
                      {t.edStatus &&
                        <div style={css('position:absolute;top:32px;left:0;min-width:152px;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 28px rgba(20,22,28,.18);padding:5px;z-index:40;')}>
                          {t.statusOptions.map(so=>
                            <div className="stopt" key={so.key} onClick={so.onPick} style={css(so.style)}>
                              <span style={css('width:7px;height:7px;border-radius:50%;background:'+so.dot+';')}></span>
                              {so.label}
                              <span style={css(so.checkStyle)}>✓</span>
                            </div>)}
                        </div>}
                    </span>
                  </div>)}
              <div style={css('height:40px;')}></div>
            </div>
            ) : (
            <div style={css('min-width:844px;')}>
              {/* column header */}
              <div style={css(v.headerStyle)}>
                <span style={css('width:26px;flex:none;')}></span>
                <span style={css('width:24px;flex:none;')}></span>
                <span style={css('width:480px;flex:none;')}>Tâche</span>
                <span style={css('width:104px;flex:none;')}>Échéance</span>
                <span style={css('width:150px;flex:none;')}>Personne</span>
                <span style={css('width:128px;flex:none;')}>Statut</span>
                <span style={css('width:62px;flex:none;text-align:center;')}>Bloquée par</span>
              </div>

              {v.groups.map(g=>
                <React.Fragment key={g.key}>
                  <div onClick={g.onToggle} draggable={g.catDraggable && !g.editing}
                    onDragStart={g.onGroupDragStart} onDragEnter={g.onGroupDragEnter} onDragOver={g.onDragOver} onDrop={g.onDrop} onDragEnd={g.onGroupDragEnd}
                    style={css(g.headerStyle + g.dropMark + (g.catDraggable && !g.editing ? 'cursor:grab;' : ''))}>
                    <span style={css('width:3px;align-self:stretch;margin:5px 0;border-radius:2px;background:'+g.marker+';')}></span>
                    <span style={css('font-size:9px;color:var(--text3);width:9px;')}>{g.caret}</span>
                    {g.editing
                      ? <input autoFocus onFocus={selectAll} defaultValue={g.name} onKeyDown={g.onNameKey} onBlur={g.onNameBlur} onClick={e=>e.stopPropagation()} style={css(g.nameStyle+'border:1px solid '+v.accent+';border-radius:6px;background:var(--panel);color:var(--text);padding:2px 7px;')} />
                      : <span onClick={g.onNameClick||undefined} title={g.editable?'Cliquer pour renommer':undefined} style={css(g.nameStyle+(g.editable?'cursor:text;':''))}>{g.name}</span>}
                    <span style={css(g.countStyle)}>{g.count}</span>
                  </div>
                  {g.open &&
                    <div>
                      {g.tasks.map(t=> <React.Fragment key={t.id}>{this.renderRow(t)}</React.Fragment>)}
                      <div onDragOver={g.onDragOver} onDrop={g.onDrop} style={css(g.addRowStyle)}>
                        <span style={css('width:26px;flex:none;color:var(--cbox);font-size:15px;')}>＋</span>
                        <span style={css('width:24px;flex:none;')}></span>
                        <input onKeyDown={g.onAddKey} onBlur={g.onAddBlur} placeholder={g.addHint} style={css('flex:1;border:none;background:transparent;font-size:13px;color:var(--text);')} />
                      </div>
                    </div>}
                </React.Fragment>)}
              <div style={css('height:40px;')}></div>
            </div>
            )}
          </div>

          {/* ---------- RIGHT DETAIL PANEL — NOTES ---------- */}
          {v.hasSel &&
            <div data-panel="1" className="fxcol scrl" style={css('position:absolute;top:0;right:0;bottom:0;width:360px;z-index:20;background:var(--panel);border-left:1px solid var(--line);box-shadow:-10px 0 30px rgba(0,0,0,.28);display:flex;flex-direction:column;animation-delay:0s;')}>
              <div style={css('padding:18px 20px 14px;border-bottom:1px solid var(--divider);')}>
                <div style={css("display:flex;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;")}>
                  <span>{v.sel.catLabel}</span>
                  <span style={css('margin-left:auto;cursor:pointer;color:var(--muted);font-size:13px;')} onClick={v.onCloseDetail}>✕</span>
                </div>
                <div style={css('font-size:18px;font-weight:600;line-height:1.3;letter-spacing:-.01em;')}>{v.sel.title}</div>
              </div>
              <div className="scrl" style={css('flex:1;min-height:0;overflow-y:auto;padding:16px 20px 6px;')}>

                {/* progression */}
                <div style={css("display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;")}>
                  <span>ACTIONS</span>
                  {v.sel.checkTotal>0 &&
                    <React.Fragment>
                      <span style={css('color:var(--text2);')}>{v.sel.checkDone}/{v.sel.checkTotal}</span>
                      <span style={css('flex:1;height:4px;border-radius:3px;background:var(--soft);overflow:hidden;position:relative;')}>
                        <span style={css('position:absolute;left:0;top:0;bottom:0;width:'+v.sel.checkPct+'%;background:#22C55E;box-shadow:0 0 8px rgba(34,197,94,.6);border-radius:3px;')}></span>
                      </span>
                    </React.Fragment>}
                </div>

                {/* items */}
                {v.sel.checklist.map(it=>
                  <div key={it.id} className="ckrow" style={css('display:flex;align-items:flex-start;gap:11px;padding:5px 6px;margin:0 -6px;')}>
                    <span className="ckbox" onClick={()=>v.sel.onToggleCheck(it.id)} style={css(ckBox(it.done))}>{it.done?'✓':''}</span>
                    <input value={it.text} onChange={e=>v.sel.onCheckText(it.id, e.target.value)} onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); e.target.blur(); } }} style={css('flex:1;min-width:0;border:none;background:transparent;font-size:13.5px;line-height:1.5;padding:0;color:'+(it.done?'var(--muted)':'var(--text)')+';'+(it.done?'text-decoration:line-through;':''))} />
                    <span className="ckdel" onClick={()=>v.sel.onDeleteCheck(it.id)} title="Supprimer l'action" style={css('flex:none;color:var(--muted);font-size:12px;cursor:pointer;padding:1px 3px;margin-top:2px;')}>✕</span>
                  </div>)}

                {/* ajout */}
                <div style={css('display:flex;align-items:center;gap:11px;padding:6px 6px;margin:0 -6px;')}>
                  <span style={css('width:18px;height:18px;flex:none;display:flex;align-items:center;justify-content:center;color:var(--cbox);font-size:16px;')}>＋</span>
                  <input placeholder="Ajouter une action…" onKeyDown={e=>{ if(e.key==='Enter'){ const val=e.target.value; if(val.trim()){ v.sel.onAddCheck(val); e.target.value=''; } } else if(e.key==='Escape'){ e.target.value=''; e.target.blur(); } }} onBlur={e=>{ const val=e.target.value; if(val.trim()){ v.sel.onAddCheck(val); e.target.value=''; } }} style={css('flex:1;min-width:0;border:none;background:transparent;font-size:13.5px;color:var(--text);')} />
                </div>

                {/* note repliable */}
                <div style={css('margin-top:16px;border-top:1px solid var(--divider);padding-top:14px;')}>
                  {v.noteOpen
                    ? <div>
                        <div style={css("display:flex;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;")}>
                          <span>NOTE</span>
                          <span onClick={v.onToggleNote} title="Replier la note" style={css('margin-left:auto;cursor:pointer;font-size:11px;')}>▾</span>
                        </div>
                        <textarea autoFocus={!(v.sel.notes||'').trim()} value={v.sel.notes} onChange={v.sel.onNotes} placeholder="Détail, contexte, liens…" style={css('width:100%;min-height:120px;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13.5px;line-height:1.6;color:var(--text);background:var(--soft);resize:vertical;')}></textarea>
                      </div>
                    : <div onClick={v.onToggleNote} style={css('display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text2);cursor:pointer;')}><span style={css('font-size:10px;')}>▸</span> {(v.sel.notes||'').trim()?'Voir la note':'Ajouter une note'}</div>}
                </div>

                <div style={css('height:16px;')}></div>
              </div>
              <div style={css('padding:12px 20px 16px;border-top:1px solid var(--divider);')}>
                <div onClick={v.sel.onDelete} style={css('display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:'+v.danger.fg+';cursor:pointer;border:1px solid '+v.danger.border+';border-radius:8px;padding:7px 13px;background:'+v.danger.bg+';')}>✕ Supprimer la tâche</div>
              </div>
            </div>}

        </div>

        {/* ===================== DELETE CONFIRM MODAL ===================== */}
        {v.hasConfirm &&
          <div onClick={v.onCancelDelete} style={css('position:fixed;inset:0;background:rgba(20,22,28,.4);display:flex;align-items:center;justify-content:center;z-index:60;')}>
            <div onClick={v.stopModal} style={css('width:392px;background:var(--panel);border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.34);padding:24px;')}>
              <div style={css('display:flex;align-items:center;gap:11px;margin-bottom:12px;')}>
                <span style={css('width:34px;height:34px;border-radius:9px;background:'+v.danger.iconBg+';color:'+v.danger.fg+';display:flex;align-items:center;justify-content:center;font-size:16px;flex:none;')}>⚠</span>
                <span style={css('font-size:16px;font-weight:600;')}>Supprimer la tâche ?</span>
              </div>
              <div style={css('font-size:13.5px;line-height:1.55;color:var(--text2);margin-bottom:20px;')}>« <b style={css('color:var(--text);')}>{v.confirmTitle}</b> » sera définitivement supprimée. Cette action est irréversible.</div>
              <div style={css('display:flex;justify-content:flex-end;gap:9px;')}>
                <div onClick={v.onCancelDelete} style={css('font-size:13px;padding:8px 16px;border-radius:9px;border:1px solid var(--line);cursor:pointer;color:var(--text2);')}>Annuler</div>
                <div onClick={v.onConfirmDelete} style={css('font-size:13px;font-weight:500;padding:8px 16px;border-radius:9px;background:'+v.danger.solid+';color:#fff;cursor:pointer;')}>Supprimer</div>
              </div>
            </div>
          </div>}

      </div>
    );
  }
}
window.Flux = Flux;
</script>
</body>
</html>
