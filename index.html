// ▼ plRenderModal — injecte le modal dans #pl-host (avec focus restore pour préserver les inputs)
function plRenderModal(){
  const host=document.getElementById('pl-host');
  if(!host)return;
  if(!plModalState){host.innerHTML="";return}
  const active=document.activeElement;
  const focusId=(active&&active.id&&active.id.startsWith('pl-'))?active.id:null;
  const focusPos=(focusId&&typeof active.selectionStart==='number')?active.selectionStart:null;
  const st=plModalState;
  const isEdit=!!st.editingId;
  /* Preview ref : exclut le devis courant en édition pour ne pas auto-incrémenter sur soi-même */
  const refPreview=(st.date&&st.supplierId)?(()=>{const s=S.crm.suppliers.find(x=>x.id===st.supplierId);return s?plGenerateRef(st.date,s.name,st.editingId||null):""})():"";
  /* Pas de fermeture au clic sur le fond : seuls « Annuler » et la croix ferment (évite de perdre la saisie par mégarde) */
  let h=`<div class="pl-overlay"><div class="pl-modal">`;
  const refToShow=refPreview;
  h+=`<h3>${I.plus} ${isEdit?'Éditer le devis':'Nouveau devis'}${refToShow?`<span class="pl-ref">${esc(refToShow)}</span>`:""}<button class="pl-close" onclick="plCloseModal()" title="Fermer">×</button></h3>`;
  /* Date — onchange (pas oninput) : sinon le widget date est réinitialisé à chaque keystroke et la saisie est impossible */
  h+=`<div class="pl-row"><label class="pl-lbl">Date du devis</label><input id="pl-date" type="date" class="pl-input" value="${esc(st.date||"")}" onchange="plSetField('date',this.value);plRenderModal()"></div>`;
  /* Fournisseur — recherche live + création inline */
  h+=`<div class="pl-row"><label class="pl-lbl">Fournisseur</label>`;
  if(st.supplierId){
    const sup=S.crm.suppliers.find(s=>s.id===st.supplierId);
    h+=`<div class="pl-pill-row"><span class="pl-pill"><span>${esc(sup?sup.name:"?")}</span><button class="pl-pill-clear" onclick="plClearSupplier()" title="Changer">×</button></span></div>`;
  }else{
    const q=(st.supplierQuery||"").trim();
    const ql=q.toLowerCase();
    const presetProd=((st.lines||[]).find(l=>(l.product||"").trim())||{}).product||"";
    const presetProdL=presetProd.toLowerCase();
    /* Si une sous-cat est preset, on sépare en 2 groupes : ceux qui la proposent, et les autres CRM (dont le pick auto-linkera la sous-cat) */
    let primary=[],secondary=[];
    S.crm.suppliers.forEach(s=>{
      if(ql&&!s.name.toLowerCase().includes(ql))return;
      if(presetProd){
        if(s.products.some(p=>p.toLowerCase()===presetProdL))primary.push(s);
        else secondary.push(s);
      }else primary.push(s);
    });
    primary.sort((a,b)=>a.name.localeCompare(b.name));
    secondary.sort((a,b)=>a.name.localeCompare(b.name));
    const totalMatches=primary.length+secondary.length;
    const exact=q&&S.crm.suppliers.some(s=>s.name.toLowerCase()===ql);
    h+=`<input id="pl-sup-search" type="text" class="pl-input" placeholder="${presetProd?`Fournisseurs qui proposent « ${esc(presetProd)} »…`:'Rechercher ou créer un fournisseur…'}" value="${esc(q)}" oninput="plSearchSupplier(this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();plPickSupplierEnter()}" autocomplete="off">`;
    h+=`<div class="pl-search-list">`;
    if(!totalMatches&&!q)h+=`<div class="pl-search-list-empty">Aucun fournisseur. Tape un nom pour en créer un.</div>`;
    /* Groupe 1 : proposent déjà */
    let shown=0;
    primary.slice(0,8).forEach(s=>{h+=`<div class="pl-search-item" onmousedown="event.preventDefault();plPickSupplier('${s.id}')">${esc(s.name)}</div>`;shown++});
    if(primary.length>8)h+=`<div class="pl-search-list-empty">+ ${primary.length-8} autre(s) qui proposent « ${esc(presetProd)} »… affine ta recherche</div>`;
    /* Groupe 2 : CRM mais ne proposent pas encore — afficher avec mention "ajoute la sous-cat" */
    if(presetProd&&secondary.length){
      const remaining=Math.max(0,8-shown);
      if(primary.length)h+=`<div class="pl-search-list-empty" style="text-align:left;padding:6px 10px;font-size:9px;text-transform:uppercase;letter-spacing:.4px">Autres fournisseurs CRM (ajoutera « ${esc(presetProd)} »)</div>`;
      secondary.slice(0,remaining||4).forEach(s=>{h+=`<div class="pl-search-item" onmousedown="event.preventDefault();plPickSupplier('${s.id}')"><span>${esc(s.name)}</span> <span style="color:#475569;font-size:9px;font-style:italic">→ ajoute la sous-cat</span></div>`});
      if(secondary.length>(remaining||4))h+=`<div class="pl-search-list-empty">+ ${secondary.length-(remaining||4)} autre(s)… affine ta recherche</div>`;
    }
    if(q&&!exact)h+=`<div class="pl-search-item create" onmousedown="event.preventDefault();plCreateAndPickSupplier(${esc(JSON.stringify(q))})">＋ Créer « ${esc(q)} »${presetProd?` (avec « ${esc(presetProd)} »)`:''}</div>`;
    h+=`</div>`;
  }
  h+=`</div>`;
  /* Projet (niveau devis) — combobox autocomplété sur les projets déjà saisis */
  {
    const pj=st.projet||"";
    const psg=plListProjets().filter(s=>s.toLowerCase()!==pj.toLowerCase()).slice(0,8);
    h+=`<div class="pl-row"><label class="pl-lbl">Projet</label><div class="pl-combo-wrap pl-combo-block pl-combo-static"><input id="pl-projet" type="text" class="pl-input" placeholder="Projet associé (optionnel)…" value="${esc(pj)}" autocomplete="off" oninput="plSetProjet(this.value)">`;
    if(psg.length)h+=`<div class="pl-combo-dropdown">${psg.map(s=>`<div class="pl-combo-item" onmousedown="event.preventDefault();plSetProjet(${esc(JSON.stringify(s))});plRenderModal()">${esc(s)}</div>`).join('')}</div>`;
    h+=`</div></div>`;
  }
  /* Lignes d'équipement — un devis = N lignes (sous-cat + champs). Visible une fois le fournisseur choisi. */
  if(st.supplierId){
    h+=`<div class="pl-lines"><div class="pl-lines-hd">Équipements du devis</div>`;
    (st.lines||[]).forEach((line,idx)=>{h+=plRenderLineCard(line,idx,st)});
    h+=`<button class="pl-add-line" onclick="plAddLine()">＋ Ajouter un équipement</button>`;
    h+=`</div>`;
  }
  if(st.err)h+=`<div class="pl-err">${esc(st.err)}</div>`;
  /* Actions */
  const canSave=st.date&&st.supplierId&&(st.lines||[]).some(l=>(l.product||"").trim());
  h+=`<div class="pl-actions"><button class="pl-btn pl-btn-secondary" onclick="plCloseModal()">Annuler</button><button class="pl-btn pl-btn-primary" ${canSave?'':'disabled'} onclick="plSaveQuote()">Enregistrer</button></div>`;
  h+=`</div></div>`;
  host.innerHTML=h;
  /* Focus restore après re-render */
  if(focusId){
    const el=document.getElementById(focusId);
    if(el){el.focus();if(focusPos!==null&&typeof el.setSelectionRange==='function'){try{el.setSelectionRange(focusPos,focusPos)}catch(e){}}}
  }else{
    /* Auto-focus sur la première search visible si rien n'est focused */
    const auto=document.getElementById('pl-sup-search')||document.querySelector('[id^="pl-prod-search-"]')||document.getElementById('pl-draft-name');
    if(auto)auto.focus();
  }
}

// ▼ Renommage / réordonnancement de champ depuis le formulaire de saisie (modifie le schéma de la sous-cat → s'applique partout). lineId → product.
function plFieldRename(lineId,fieldId,v){
  const line=plGetLine(lineId);if(!line||!line.product)return;
  plEnsure();const arr=S.priceLib.schemas[line.product];if(!Array.isArray(arr))return;
  const f=arr.find(x=>x.id===fieldId);if(!f)return;
  const nv=(v||"").trim();
  if(!nv||nv===f.name){plRenderModal();return}
  if(arr.some(x=>x.id!==fieldId&&x.name.toLowerCase()===nv.toLowerCase())){alert("Ce nom de champ existe déjà pour cette sous-catégorie");plRenderModal();return}
  f.name=nv;save();plRenderModal();
}
let plFieldDrag=null; // {lineId, fieldId} — transient
function plFieldDragStart(e,lineId,fieldId){plFieldDrag={lineId:lineId,fieldId:fieldId};try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',fieldId)}catch(_){}}
function plFieldDragEnd(){plFieldDrag=null}
function plFieldDrop(lineId,targetFieldId){
  const drag=plFieldDrag;plFieldDrag=null;
  if(!drag||drag.lineId!==lineId)return;
  const line=plGetLine(lineId);if(!line||!line.product)return;
  plEnsure();const arr=S.priceLib.schemas[line.product];if(!Array.isArray(arr))return;
  const from=arr.findIndex(x=>x.id===drag.fieldId);
  const to=arr.findIndex(x=>x.id===targetFieldId);
  if(from<0||to<0||from===to)return;
  const m=arr.splice(from,1)[0];arr.splice(to,0,m);
  save();plRenderModal();
}

// ▼ Reclasser une ligne dans une autre sous-catégorie en transférant les champs choisis (transfert par nom ; crée les champs absents dans la catégorie cible)
let plReclass=null; // {lineId, fromProduct, toQuery, toProduct, keep:{fieldId:bool}}
function plOpenReclass(lineId){
  const line=plGetLine(lineId);if(!line||!line.product)return;
  plEnsure();
  const fromSchema=S.priceLib.schemas[line.product]||[];
  const keep={};
  fromSchema.forEach(f=>{const v=line.values[f.id];keep[f.id]=(v!==undefined&&v!==null&&v!=="")});
  plReclass={lineId:lineId,fromProduct:line.product,toQuery:"",toProduct:"",keep:keep};
  plRenderReclass();
}
function plCloseReclass(){plReclass=null;plRenderModal()}
function plReclassSetQuery(v){if(plReclass){plReclass.toQuery=v;plRenderReclass()}}
function plReclassPickTarget(name){if(!plReclass)return;plReclass.toProduct=(name||"").trim();plReclass.toQuery="";plRenderReclass()}
function plReclassClearTarget(){if(!plReclass)return;plReclass.toProduct="";plReclass.toQuery="";plRenderReclass()}
function plReclassToggleKeep(fieldId){if(!plReclass)return;plReclass.keep[fieldId]=!plReclass.keep[fieldId];plRenderReclass()}
function plReclassConfirm(){
  if(!plReclass||!plModalState)return;
  const st=plReclass;const line=plGetLine(st.lineId);if(!line)return;
  const toProd=(st.toProduct||"").trim();if(!toProd)return;
  plEnsure();
  const sup=S.crm.suppliers.find(s=>s.id===plModalState.supplierId);
  if(sup&&!sup.products.some(p=>p.toLowerCase()===toProd.toLowerCase()))sup.products.push(toProd);
  if(!S.crm.products.some(p=>p.toLowerCase()===toProd.toLowerCase()))S.crm.products.push(toProd);
  if(!Array.isArray(S.priceLib.schemas[toProd]))S.priceLib.schemas[toProd]=[];
  const fromSchema=S.priceLib.schemas[st.fromProduct]||[];
  const toSchema=S.priceLib.schemas[toProd];
  const newValues={};
  fromSchema.forEach(f=>{
    if(!st.keep[f.id])return;
    let g=toSchema.find(x=>x.name.toLowerCase()===f.name.toLowerCase());
    if(!g){g={id:gid(),name:f.name,type:f.type||'text'};if(f.unit)g.unit=f.unit;if(Array.isArray(f.options))g.options=f.options.slice();toSchema.push(g)}
    const val=line.values[f.id];
    if(val!==undefined)newValues[g.id]=val;
  });
  line.product=toProd;line.values=newValues;
  save();plReclass=null;plRenderModal();
}
// ▼ plRenderReclass — fenêtre 2 panneaux (catégorie actuelle ↔ nouvelle) avec sélection des champs à conserver
function plRenderReclass(){
  const host=document.getElementById('pl-host');if(!host)return;
  if(!plReclass){host.innerHTML="";return}
  const active=document.activeElement;const focusId=(active&&active.id&&active.id.indexOf('pl-rcl')===0)?active.id:null;
  const focusPos=(focusId&&typeof active.selectionStart==='number')?active.selectionStart:null;
  plEnsure();
  const st=plReclass;
  const fromSchema=S.priceLib.schemas[st.fromProduct]||[];
  const line=plGetLine(st.lineId)||{values:{}};
  const toProd=st.toProduct;
  const toSchema=toProd?(S.priceLib.schemas[toProd]||[]):[];
  const toNames=new Set(toSchema.map(f=>(f.name||"").toLowerCase()));
  const fmt=f=>{const v=line.values[f.id];if(v===undefined||v===null||v==="")return "—";if(f.type==='number'){let d=plFormatNumber(v);if(f.unit)d+=' '+f.unit;return d}if(f.type==='date')return plDateFR(v);return String(v)};
  let h=`<div class="pl-overlay"><div class="pl-modal pl-reclass-modal">`;
  h+=`<h3>↪ Reclasser l'équipement<button class="pl-close" onclick="plCloseReclass()" title="Fermer">×</button></h3>`;
  h+=`<div class="pl-rcl-cols">`;
  /* Gauche : catégorie actuelle */
  h+=`<div class="pl-rcl-col"><div class="pl-rcl-coltitle">Catégorie actuelle</div><div class="pl-rcl-cat">${esc(st.fromProduct)}</div>`;
  h+=`<div class="pl-rcl-help">Coche les champs à conserver.</div><div class="pl-rcl-fields">`;
  if(!fromSchema.length)h+=`<div class="pl-fields-empty">Aucun champ.</div>`;
  fromSchema.forEach(f=>{
    const on=!!st.keep[f.id];const exists=toProd&&toNames.has((f.name||"").toLowerCase());
    h+=`<label class="pl-rcl-field${on?' on':''}"><input type="checkbox" ${on?'checked':''} onchange="plReclassToggleKeep('${f.id}')"><span class="pl-rcl-fname">${esc(f.name)}</span><span class="pl-rcl-fval">${esc(fmt(f))}</span>`;
    if(on&&toProd)h+=`<span class="pl-rcl-tag ${exists?'map':'add'}">${exists?'déjà présent':'sera ajouté'}</span>`;
    h+=`</label>`;
  });
  h+=`</div></div>`;
  h+=`<div class="pl-rcl-arrow">→</div>`;
  /* Droite : nouvelle catégorie */
  h+=`<div class="pl-rcl-col"><div class="pl-rcl-coltitle">Nouvelle catégorie</div>`;
  if(toProd){
    h+=`<div class="pl-pill-row"><span class="pl-pill"><span>${esc(toProd)}</span><button class="pl-pill-clear" onclick="plReclassClearTarget()" title="Changer">×</button></span></div>`;
    h+=`<div class="pl-rcl-help">Champs déjà dans cette catégorie :</div><div class="pl-rcl-fields">`;
    if(!toSchema.length)h+=`<div class="pl-fields-empty">Catégorie vide ou nouvelle.</div>`;
    toSchema.forEach(f=>{h+=`<div class="pl-rcl-existing">${esc(f.name)}${f.unit?` <span style="color:#475569">(${esc(f.unit)})</span>`:''}</div>`});
    h+=`</div>`;
  }else{
    const q=(st.toQuery||"").trim();const ql=q.toLowerCase();
    const prods=plListAllProducts().filter(p=>p.toLowerCase()!==st.fromProduct.toLowerCase());
    const matches=prods.filter(p=>!ql||p.toLowerCase().includes(ql));
    const exact=q&&prods.some(p=>p.toLowerCase()===ql);
    h+=`<input id="pl-rcl-search" type="text" class="pl-input" placeholder="Choisir ou créer une sous-catégorie…" value="${esc(q)}" oninput="plReclassSetQuery(this.value)" autocomplete="off">`;
    h+=`<div class="pl-search-list">`;
    if(!matches.length&&!q)h+=`<div class="pl-search-list-empty">Tape un nom pour créer une catégorie.</div>`;
    matches.slice(0,8).forEach(p=>{h+=`<div class="pl-search-item" onmousedown="event.preventDefault();plReclassPickTarget(${esc(JSON.stringify(p))})">${esc(p)}</div>`});
    if(matches.length>8)h+=`<div class="pl-search-list-empty">+ ${matches.length-8} autre(s)…</div>`;
    if(q&&!exact)h+=`<div class="pl-search-item create" onmousedown="event.preventDefault();plReclassPickTarget(${esc(JSON.stringify(q))})">＋ Créer « ${esc(q)} »</div>`;
    h+=`</div>`;
  }
  h+=`</div></div>`;
  const nKeep=fromSchema.filter(f=>st.keep[f.id]).length;
  h+=`<div class="pl-actions"><button class="pl-btn pl-btn-secondary" onclick="plCloseReclass()">Annuler</button><button class="pl-btn pl-btn-primary" ${toProd?'':'disabled'} onclick="plReclassConfirm()">Reclasser${toProd?` (${nKeep})`:''}</button></div>`;
  h+=`</div></div>`;
  host.innerHTML=h;
  if(focusId){const el=document.getElementById(focusId);if(el){el.focus();if(focusPos!==null&&typeof el.setSelectionRange==='function'){try{el.setSelectionRange(focusPos,focusPos)}catch(e){}}}}
}

// ▼ plRenderLineCard — rend une ligne d'équipement du devis (sous-cat scopée + champs dynamiques). lineId encode tous les handlers.
function plRenderLineCard(line,idx,st){
  const sup=S.crm.suppliers.find(s=>s.id===st.supplierId);
  const multi=(st.lines||[]).length>1;
  let h=`<div class="pl-line-card">`;
  h+=`<div class="pl-line-hd"><span class="pl-line-num">Équipement ${idx+1}</span>${multi?`<button class="pl-line-del" onclick="plRemoveLine('${line.id}')" title="Retirer cette ligne">×</button>`:''}</div>`;
  /* Sous-catégorie */
  h+=`<div class="pl-row"><label class="pl-lbl">Sous-catégorie</label>`;
  if(line.product){
    h+=`<div class="pl-pill-row"><span class="pl-pill"><span>${esc(line.product)}</span><button class="pl-pill-clear" onclick="plClearProduct('${line.id}')" title="Changer (les valeurs sont conservées)">×</button></span><button class="pl-mini-btn" onclick="plOpenReclass('${line.id}')" title="Reclasser dans une autre sous-catégorie en transférant les champs choisis">↪ Reclasser</button></div>`;
  }else{
    const q=(line.productQuery||"").trim();
    const ql=q.toLowerCase();
    const prods=sup?sup.products:[];
    const matches=prods.filter(p=>!ql||p.toLowerCase().includes(ql)).sort((a,b)=>a.localeCompare(b));
    const exact=q&&prods.some(p=>p.toLowerCase()===ql);
    h+=`<input id="pl-prod-search-${line.id}" type="text" class="pl-input" placeholder="Rechercher ou créer une sous-catégorie…" value="${esc(q)}" oninput="plSearchProduct('${line.id}',this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();plPickProductEnter('${line.id}')}" autocomplete="off">`;
    h+=`<div class="pl-search-list">`;
    if(!matches.length&&!q)h+=`<div class="pl-search-list-empty">Aucune sous-catégorie pour ce fournisseur. Tape un nom pour en créer une.</div>`;
    matches.slice(0,8).forEach(p=>{h+=`<div class="pl-search-item" onmousedown="event.preventDefault();plPickProduct('${line.id}',${esc(JSON.stringify(p))})">${esc(p)}</div>`});
    if(matches.length>8)h+=`<div class="pl-search-list-empty">+ ${matches.length-8} autre(s)… affine ta recherche</div>`;
    if(q&&!exact)h+=`<div class="pl-search-item create" onmousedown="event.preventDefault();plCreateAndPickProduct('${line.id}',${esc(JSON.stringify(q))})">＋ Créer « ${esc(q)} »</div>`;
    h+=`</div>`;
  }
  h+=`</div>`;
  /* Formulaire dynamique de la sous-cat */
  if(line.product){
    plEnsure();
    const schema=S.priceLib.schemas[line.product]||[];
    const draftHere=st.fieldDraft&&st.fieldDraft.lineId===line.id;
    h+=`<div class="pl-fields"><div class="pl-fields-hd">Champs « ${esc(line.product)} »<span class="pl-fields-hint">renommer / glisser ⠿ s'applique à toute la sous-catégorie</span></div>`;
    if(!schema.length&&!draftHere)h+=`<div class="pl-fields-empty">Aucun champ défini. Ajoute un premier champ ci-dessous.</div>`;
    schema.forEach(f=>{
      const v=line.values[f.id]||"";
      h+=`<div class="pl-field-row" ondragover="event.preventDefault();this.classList.add('pl-fdrag-over')" ondragleave="this.classList.remove('pl-fdrag-over')" ondrop="this.classList.remove('pl-fdrag-over');plFieldDrop('${line.id}','${f.id}')">`;
      h+=`<span class="pl-field-grip" draggable="true" ondragstart="plFieldDragStart(event,'${line.id}','${f.id}')" ondragend="plFieldDragEnd()" title="Glisser pour réordonner">${I.grip}</span>`;
      h+=`<input id="pl-flabel-${line.id}-${esc(f.id)}" class="pl-field-label" value="${esc(f.name)}" onchange="plFieldRename('${line.id}','${f.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()" title="Cliquer pour renommer ce champ (s'applique à toute la sous-catégorie)">`;
      if(f.type==='number'){
        /* Texte formaté : affiché « 69 563 » au repos, brut à l'édition (format au blur → pas de saut de curseur). Stocke le nombre brut. */
        h+=`<div class="pl-num-wrap${f.unit?' has-unit':''}"><input id="pl-val-${line.id}-${esc(f.id)}" type="text" inputmode="decimal" class="pl-input pl-num" value="${esc(plFormatNumber(v))}" placeholder="0" autocomplete="off" onfocus="this.value=plNumClean(this.value)" oninput="plSetValue('${line.id}','${f.id}',plNumClean(this.value))" onblur="var n=plNumClean(this.value);plSetValue('${line.id}','${f.id}',n);this.value=plFormatNumber(n)">`;
        if(f.unit)h+=`<span class="pl-num-unit">${esc(f.unit)}</span>`;
        h+=`</div>`;
      }else if(f.type==='date'){
        h+=`<input id="pl-val-${line.id}-${esc(f.id)}" type="date" class="pl-input" value="${esc(v)}" oninput="plSetValue('${line.id}','${f.id}',this.value)">`;
      }else if(f.type==='select'){
        h+=`<select id="pl-val-${line.id}-${esc(f.id)}" class="pl-select" onchange="plSetValue('${line.id}','${f.id}',this.value)"><option value="">—</option>`;
        (f.options||[]).forEach(o=>{h+=`<option value="${esc(o)}" ${v===o?'selected':''}>${esc(o)}</option>`});
        h+=`</select>`;
      }else{
        /* Texte : saisie 100% native (aucun re-render au focus/clavier) ; suggestions affichées au focus via CSS :focus-within */
        const cur=(v==null?"":String(v));
        const sg=plDistinctValues(line.product,f.id).filter(s=>s.toLowerCase()!==cur.toLowerCase()).slice(0,8);
        h+=`<div class="pl-combo-wrap pl-combo-block pl-combo-static"><input id="pl-val-${line.id}-${esc(f.id)}" type="text" class="pl-input" value="${esc(cur)}" autocomplete="off" oninput="plSetValue('${line.id}','${f.id}',this.value)">`;
        if(sg.length)h+=`<div class="pl-combo-dropdown">${sg.map(s=>`<div class="pl-combo-item" onmousedown="event.preventDefault();plSetValue('${line.id}','${f.id}',${esc(JSON.stringify(s))});plRenderModal()">${esc(s)}</div>`).join('')}</div>`;
        h+=`</div>`;
      }
      h+=`<button class="pl-field-del" onclick="plDelField('${line.id}','${f.id}')" title="Supprimer ce champ">×</button></div>`;
    });
    if(draftHere){
      const fd=st.fieldDraft;
      h+=`<div class="pl-fielddraft">`;
      h+=`<div class="pl-fielddraft-row"><input id="pl-draft-name" type="text" class="pl-input" placeholder="Nom du champ (ex. Prix unitaire)" value="${esc(fd.name||"")}" oninput="plSetDraftField('name',this.value);plRenderModal()"><select class="pl-select" onchange="plSetDraftField('type',this.value);plRenderModal()"><option value="number" ${fd.type==='number'?'selected':''}>Nombre</option><option value="text" ${fd.type==='text'?'selected':''}>Texte</option><option value="date" ${fd.type==='date'?'selected':''}>Date</option><option value="select" ${fd.type==='select'?'selected':''}>Liste déroulante</option></select></div>`;
      const dQ=(fd.name||"").trim().toLowerCase();
      const inCurrent=new Set((S.priceLib.schemas[line.product]||[]).map(f=>(f.name||"").toLowerCase()));
      const suggestions=dQ?plListAllFields().filter(f=>!inCurrent.has(f.name.toLowerCase())&&f.name.toLowerCase().includes(dQ)).slice(0,5):[];
      if(suggestions.length){
        h+=`<div style="margin:6px 0;background:rgba(56,189,248,.04);border:1px solid rgba(56,189,248,.15);border-radius:5px;padding:4px 6px">`;
        h+=`<div style="font-size:9px;color:#5CB8F0;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:2px 4px 4px">${suggestions.length} champ${suggestions.length>1?'s':''} existant${suggestions.length>1?'s':''} — clique pour réutiliser</div>`;
        suggestions.forEach(f=>{
          h+=`<div class="pl-search-item" style="font-size:11px;padding:5px 6px;border-radius:4px;border:none" onmousedown="event.preventDefault();plPickExistingField(${esc(JSON.stringify(f.name))},${esc(JSON.stringify(f.type))},${esc(JSON.stringify(f.unit))},${esc(JSON.stringify((f.options||[]).join(', ')))})"><strong>${esc(f.name)}</strong> <span style="color:#64748B;font-size:9px">— ${esc(plFieldTypeLabel(f))}</span></div>`;
        });
        h+=`</div>`;
      }
      if(fd.type==='number')h+=`<div class="pl-fielddraft-row"><input id="pl-draft-unit" type="text" class="pl-input" placeholder="Unité (ex. €, m³, mg/L)" value="${esc(fd.unit||"")}" oninput="plSetDraftField('unit',this.value)"></div>`;
      if(fd.type==='select')h+=`<div class="pl-fielddraft-row"><input id="pl-draft-options" type="text" class="pl-input" placeholder="Options séparées par virgules (ex. Standard, Premium)" value="${esc(fd.options||"")}" oninput="plSetDraftField('options',this.value)"></div>`;
      h+=`<div class="pl-fielddraft-row"><button class="pl-mini-btn cancel" onclick="plCancelFieldDraft()">Annuler</button><button class="pl-mini-btn" onclick="plConfirmFieldDraft()">Ajouter le champ</button></div>`;
      h+=`</div>`;
    }else{
      h+=`<div style="margin-top:8px"><button class="pl-mini-btn" onclick="plOpenFieldDraft('${line.id}')">＋ Ajouter un champ</button></div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`; /* .pl-line-card */
  return h;
}

/* ── Feedback / Notes ── */
function rFB(){
  if(!S.feedback||!Array.isArray(S.feedback.items))S.feedback={items:[]};
  let h=`<div class="fb-bar"><div class="fb-title">Notes & Remarques</div><button class="fb-copy-btn" onclick="fbCopy()" id="fb-copy-btn">📋 Copier les actions en cours</button></div>`;
  h+=`<div class="fb-subtitle">Note ici les remarques ou bugs à transmettre à Claude. Chaque action peut recevoir des étapes complémentaires, être validée ou supprimée.</div>`;
  h+=`<div class="add-row" style="position:static"><input id="fb-input" placeholder="Nouvelle action / remarque…" value="${esc(S.fbQ||"")}" oninput="S.fbQ=this.value" onkeydown="if(event.key==='Enter'){event.preventDefault();fbAdd()}"><button onclick="fbAdd()">＋</button></div>`;
  const items=[...S.feedback.items].sort((a,b)=>{if(!!a.validated!==!!b.validated)return a.validated?1:-1;return (b.createdAt||0)-(a.createdAt||0)});
  if(!items.length)h+=`<div class="es">Aucune note pour l'instant.</div>`;
  items.forEach(it=>{
    h+=`<div class="fb-card ${it.validated?"fb-done":""}">`;
    h+=`<div class="fb-hd">`;
    h+=`<button class="fb-check ${it.validated?"on":""}" onclick="fbToggleValid('${it.id}')" title="${it.validated?"Marquer en cours":"Valider"}">${I.check}</button>`;
    h+=`<input class="fb-text" value="${esc(it.text||"")}" placeholder="Note…" oninput="fbUpdateText('${it.id}',this.value)">`;
    h+=`<button class="fb-del" onclick="fbDel('${it.id}')" title="Supprimer">${I.trash}</button>`;
    h+=`</div>`;
    (it.steps||[]).forEach((st,idx)=>{
      h+=`<div class="fb-step"><span class="fb-step-bul">↳</span><input class="fb-step-text" data-fb-step="${it.id}-${idx}" value="${esc(st||"")}" placeholder="Étape complémentaire…" oninput="fbUpdateStep('${it.id}',${idx},this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();fbAddStep('${it.id}')}"><button class="fb-step-del" onclick="fbDelStep('${it.id}',${idx})" title="Supprimer étape">✕</button></div>`;
    });
    h+=`<button class="fb-add-step" onclick="fbAddStep('${it.id}')">＋ étape</button>`;
    h+=`</div>`;
  });
  return h;
}
function fbAdd(){const t=(S.fbQ||"").trim();if(!t)return;if(!S.feedback||!Array.isArray(S.feedback.items))S.feedback={items:[]};S.feedback.items.unshift({id:gid(),text:t,steps:[],validated:false,createdAt:Date.now()});S.fbQ="";save();render();requestAnimationFrame(()=>{const el=document.getElementById('fb-input');if(el)el.focus()})}
function fbDel(id){S.feedback.items=S.feedback.items.filter(x=>x.id!==id);save();render()}
function fbToggleValid(id){const it=S.feedback.items.find(x=>x.id===id);if(!it)return;it.validated=!it.validated;save();render()}
function fbUpdateText(id,v){const it=S.feedback.items.find(x=>x.id===id);if(!it)return;it.text=v;save()}
function fbAddStep(id){const it=S.feedback.items.find(x=>x.id===id);if(!it)return;if(!it.steps)it.steps=[];it.steps.push("");save();render();requestAnimationFrame(()=>{const els=document.querySelectorAll(`[data-fb-step^="${id}-"]`);if(els.length)els[els.length-1].focus()})}
function fbUpdateStep(id,idx,v){const it=S.feedback.items.find(x=>x.id===id);if(!it||!it.steps)return;it.steps[idx]=v;save()}
function fbDelStep(id,idx){const it=S.feedback.items.find(x=>x.id===id);if(!it||!it.steps)return;it.steps.splice(idx,1);save();render()}
function fbBuildText(){const items=(S.feedback.items||[]).filter(it=>!it.validated&&(it.text||"").trim());if(!items.length)return"";let txt="";items.forEach((it,i)=>{txt+=`${i+1}. ${(it.text||"").trim()}\n`;(it.steps||[]).forEach(s=>{const st=(s||"").trim();if(st)txt+=`   - ${st}\n`})});return txt.trimEnd()}
function fbCopy(){const txt=fbBuildText();const btn=document.getElementById('fb-copy-btn');if(!txt){if(btn){const old=btn.textContent;btn.textContent="Aucune action en cours";setTimeout(()=>{btn.textContent=old},1500)}return}const done=()=>{if(btn){const old=btn.textContent;btn.textContent="✓ Copié !";btn.classList.add("copied");setTimeout(()=>{btn.textContent=old;btn.classList.remove("copied")},1800)}};if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(()=>fbCopyFallback(txt,done))}else{fbCopyFallback(txt,done)}}
function fbCopyFallback(txt,done){try{const ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done()}catch(e){prompt("Copie manuellement :",txt)}}

function upNm(id,v){const p=fp(id);if(p){p.name=v;save()}}
function uaU(pid,aid,v){const a=fa(pid,aid);if(a){a.urgency=v;save();render()}}
function uaDL(pid,aid,v){const a=fa(pid,aid);if(a){a.deadline=v;save();render()}}
/* Auth onAuthStateChanged handles load + render */
</script>
